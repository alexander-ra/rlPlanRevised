erative games)\n\u251c\u2500\u2500 SKIP:  Detailed experimental tables (check headline results only)\n\u251c\u2500\u2500 MATH:  \u2192 \"The Shapley Q-value decomposition formula (Eq. 3-5). MUST understand.\n\u2502             Q_shapley_i(s,a) = E_\u03c0[\u03a3_S\u2286N\\{i} (|S|!(n-|S|-1)!/n!) * \n\u2502             (Q(s, a_S\u222a{i}) - Q(s, a_S))]. This is Shapley's formula applied to \n\u2502             Q-values instead of coalition values. The key approximation: sample \n\u2502             random permutations instead of summing over all subsets.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Shapley Q-value solves the credit assignment problem in \n    cooperative MARL. For your SLS implementation: instead of giving all credit to \n    the winner (sparse reward), decompose each state's value into per-agent Shapley \n    contributions. This lets agents learn WHO they're really helping with each action, \n    which is exactly the signal needed for coalition-aware learning.\"\n```\n\n### Supplementary References\n\n- **Li, Kuang, Wang, Liu, Chen, Wu & Xiao (2021, KDD) \u2014 \"Shapley Counterfactual Credits for Multi-Agent Reinforcement Learning\"**  \n  https://arxiv.org/abs/2106.00285  \n  *Combines Shapley values with counterfactual baselines (reminiscent of CFR's counterfactual regret). SKIM Section 3 for the counterfactual Shapley mechanism. Connection: your CFR expertise (Steps 2\u20134) meets cooperative GT here.*\n\n- **Wang, Li, Kaski & Lawry (2025) \u2014 \"Shapley Machine: A Game-Theoretic Framework for N-Agent Ad Hoc Teamwork\"**  \n  https://arxiv.org/abs/2506.11285  \n  *N-agent ad hoc teamwork = implicit coalition formation with unknown teammates. SKIM for the connection between Shapley values and ad hoc team formation.*\n\n- **Meta AI \u2014 \"Human-Level Play in the Game of Diplomacy by Combining Language Models with Strategic Reasoning\" (CICERO, Science 2022)**  \n  https://www.science.org/doi/10.1126/science.ade9097  \n  *The full-press Diplomacy system \u2014 combines language model for negotiation with game-theoretic planning. SKIM for architecture insights only. You will NOT implement language-based negotiation, but the planning component (Section 2) shows how to integrate coalition reasoning into search.*\n\n- **Mukobi et al. (2023) \u2014 \"Welfare Diplomacy: Benchmarking Language Model Cooperation\"**  \n  https://arxiv.org/abs/2310.08901  \n  *LLM agents playing Diplomacy variants. Relevant for Step 12 bridge (LLM agents in strategic settings). SKIM abstract only.*\n\n### Math Flags\n\n\ud83d\udd22 **Shapley value formula** \u2014 Must understand and implement.  \n**WHY:** The Shapley value \u03c6_i(v) = \u03a3_{S\u2286N\\{i}} (|S|!(n-|S|-1)!/n!) * [v(S\u222a{i}) - v(S)] is the central computational tool for this step. It tells you each player's \"fair share\" of coalition value. In SLS: it tells you how much each chip-placement action helped or hurt each potential coalition. For your thesis (Contribution #2): Shapley values in FFA settings are the replacement for exploitability in the 2-player setting \u2014 they measure \"how much does coalition membership benefit each agent?\"\n\n\ud83d\udd22 **The core (linear programming characterization)** \u2014 Must understand the definition.  \n**WHY:** The core of a cooperative game is the set of payoff allocations where no coalition can profitably deviate. If the core is empty, NO coalition structure is stable \u2014 every arrangement of players can be \"broken\" by some subgroup deviating. For SLS: the game almost certainly has an empty core (because the game is zero-sum among 4 players: only 1 wins). This means coalitions are INHERENTLY UNSTABLE \u2014 they will always be betrayed eventually. Understanding this instability is key to modeling coalition dynamics.\n\n\ud83d\udd22 **piKL regularization (Bakhtin et al., Section 2.2)** \u2014 Read the formula.  \n**WHY:** This is the N-player replacement for Nash-based safety from Step 8. Instead of \u03c0_safe = Nash, use \u03c0_safe = human_prior. The regularized policy search minimizes KL(\u03c0, \u03c0_human) subject to performance constraints. For your thesis (Contribution #2): this suggests that safe exploitation in N-player FFA games uses a BEHAVIORAL baseline (from population or from human data) instead of an equilibrium baseline.\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: Coalition-Aware Multi-Agent Training for So Long Sucker\n\n**Language + Framework:** Python 3.10+ / PyTorch / Custom SLS environment (building on Sharan & Adak's framework)\n\nStarting point: Sharan & Adak's SLS implementation + your Step 9 MARL infrastructure (MADDPG, MAPPO) + your Step 10 EGTA analysis\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| SLS environment (extended from Sharan & Adak) | \ud83d\udfe1 AI-ASSISTED | Start from their codebase, extend with coalition tracking and richer state representation. AI helps with GUI integration, you write the game logic extensions. |\n| Coalition detection from action history | \ud83d\udd34 HAND-CODE | This IS the thesis-relevant mechanism: inferring implicit coalitions from observed actions (who is placing whose chips, who captures whose piles). Directly extends Step 7's opponent modeling to alliance modeling. |\n| Shapley value credit assignment for SLS | \ud83d\udd34 HAND-CODE | Adapting Shapley Q-value to the FFA setting. Must understand the decomposition deeply: in a 4-player game, each action's credit is distributed among all possible coalitions. |\n| MARL training with coalition-aware rewards | \ud83d\udd34 HAND-CODE | The core training loop: agents train with Shapley-decomposed rewards instead of sparse winner-takes-all reward. This is the novel training signal that should produce coalition-aware agents. |\n| Spinning top decomposition on SLS meta-game | \ud83d\udd34 HAND-CODE | Apply Step 10's analytical tool to SLS: how much of the 4-player dynamics are transitive (skill) vs cyclic (coalition rock-paper-scissors)? |\n| EGTA evaluation of SLS agent populations | \ud83d\udd34 HAND-CODE | Apply Step 10's EGTA framework to SLS: compute meta-Nash of the SLS agent population. This is the multi-agent evaluation prototype for Contribution #3. |\n| Baseline agents (random, heuristic, DQN from paper) | \ud83d\udfe1 AI-ASSISTED | Standard baselines for comparison. AI drafts, you verify. |\n| Visualization (coalition graphs, Shapley attribution plots) | \ud83d\udfe2 AI-GENERATED | Standard plotting infrastructure. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 SLS Environment Setup + Verification:**\n- \ud83d\udfe1 Get the SLS environment working:\n  ```python\n  # Either use Sharan & Adak's code or implement from rules\n  class SLSGame:\n      def __init__(self, n_players=4, chips_per_player=7):\n          self.n_players = n_players\n          self.hands = {i: [i] * chips_per_player for i in range(n_players)}\n          self.piles = []  # List of lists (each pile = sequence of chip colors)\n          self.eliminated = set()\n          self.current_player = 0\n      \n      def get_legal_actions(self):\n          \"\"\"Actions: place chip X on pile Y (or start new pile).\"\"\"\n          actions = []\n          for chip_color in set(self.hands[self.current_player]):\n              for pile_idx in range(len(self.piles)):\n                  actions.append(('place', chip_color, pile_idx))\n              actions.append(('place', chip_color, 'new'))\n          return actions\n      \n      def step(self, action):\n          \"\"\"Execute action, check for captures, check for eliminations.\"\"\"\n          # Place chip \u2192 check if pile captured \u2192 check if player eliminated\n          ...\n  ```\n- Verify rules against De Carufel & Jerade's formalization\n- Run random games to completion, verify game termination and winner selection\n- **Key verification:** In the 2-player endgame, does the analytical winner (from De Carufel & Jerade) match the simulation? This is your implementation correctness check.\n\n**Day 2 \u2014 Coalition Detection Module:**\n- \ud83d\udd34 Implement coalition inference from action history:\n  ```python\n  class CoalitionDetector:\n      \"\"\"Detect implicit coalitions from observed chip-placement behavior.\"\"\"\n      def __init__(self, n_players):\n          self.n_players = n_players\n          # Help matrix: help[i][j] = how many times player i placed player j's chips\n          self.help_matrix = np.zeros((n_players, n_players))\n          # Harm matrix: harm[i][j] = how many times player i captured player j's chips\n          self.harm_matrix = np.zeros((n_players, n_players))\n      \n      def update(self, player, action, game_state):\n          \"\"\"Update coalition signals after an action.\"\"\"\n          if action[0] == 'place':\n              chip_color = action[1]\n              if chip_color != player:\n                  # Player is playing someone else's chip \u2014 HELP signal\n                  self.help_matrix[player][chip_color] += 1\n          # Also track captures that hurt specific players\n          ...\n      \n      def get_coalition_scores(self):\n          \"\"\"Compute pairwise coalition strength.\n          coalition_score[i][j] = net help from i to j.\"\"\"\n          net_help = self.help_matrix - self.harm_matrix\n          # Symmetrize: coalition between i and j = help[i][j] + help[j][i]\n          coalition_strength = net_help + net_help.T\n          return coalition_strength\n      \n      def detect_coalitions(self, threshold=2.0):\n          \"\"\"Identify active coalitions (pairs/triples with high mutual help).\"\"\"\n          scores = self.get_coalition_scores()\n          coalitions = []\n          for i in range(self.n_players):\n              for j in range(i+1, self.n_players):\n                  if scores[i][j] > threshold:\n                      coalitions.append((i, j, scores[i][j]))\n          return coalitions\n  ```\n- **Connection to Step 7:** This is your opponent model adapted for alliance detection. Step 7 inferred opponent's HAND from behavior. Step 11 infers opponent's ALLIANCES from behavior. Same Bayesian inference principle, different observation space.\n- Test on hand-crafted game histories: create a game log where players 0 and 1 clearly cooperate (always place each other's chips). Does the detector identify it?\n\n**Day 3 \u2014 Shapley Credit Assignment for SLS:**\n- \ud83d\udd34 Implement Shapley Q-value decomposition for SLS:\n  ```python\n  def shapley_credit_assignment(game_state, action, agent_values, n_players=4):\n      \"\"\"Decompose the value of an action into per-agent Shapley credits.\n      \n      For a 4-player game, the action affects all players differently.\n      The Shapley credit for player i = average marginal contribution of i\n      across all possible \"coalition orderings.\"\n      \n      In SLS context: when player 0 places player 1's chip on a pile,\n      the Shapley credit distributes: how much did this help player 1?\n      How much did it hurt players 2, 3? How much did player 0 benefit?\n      \"\"\"\n      credits = np.zeros(n_players)\n      # For each permutation of players, compute marginal contributions\n      for perm in itertools.permutations(range(n_players)):\n          for idx, player in enumerate(perm):\n              # Coalition = players before this one in the permutation\n              coalition_before = set(perm[:idx])\n              coalition_after = coalition_before | {player}\n              # Marginal contribution: value(S+{i}) - value(S)\n              val_before = estimate_coalition_value(game_state, coalition_before, agent_values)\n              val_after = estimate_coalition_value(game_state, coalition_after, agent_values)\n              credits[player] += (val_after - val_before)\n      credits /= np.math.factorial(n_players)\n      return credits\n  \n  def estimate_coalition_value(game_state, coalition, agent_values):\n      \"\"\"Estimate value of a coalition in the current game state.\n      Approximation: expected future reward if coalition members share resources.\"\"\"\n      if not coalition:\n          return 0.0\n      # Sum of individual value estimates for coalition members\n      # with bonus for coalition synergy (shared chip placement)\n      return sum(agent_values[i] for i in coalition) * (1 + 0.1 * len(coalition))\n  ```\n- **Key challenge:** In a competitive game, \"coalition value\" is ambiguous \u2014 there's no shared reward to divide. The adaptation: define coalition value as the INCREASE in winning probability when players cooperate. This requires estimating counterfactuals: \"what would my winning probability be WITHOUT this ally?\"\n- Test on simple game states where coalition value is obvious (e.g., 2 players with many chips vs 2 players nearly eliminated)\n\n**Day 4 \u2014 Coalition-Aware MARL Training:**\n- \ud83d\udd34 Extend your MADDPG or MAPPO from Step 9 with coalition-aware rewards:\n  ```python\n  class CoalitionAwareMAPPO:\n      def __init__(self, n_players, state_dim, action_dim):\n          # Each agent has its own policy + value network\n          self.agents = [PPOAgent(state_dim, action_dim) for _ in range(n_players)]\n          self.coalition_detector = CoalitionDetector(n_players)\n          \n      def compute_rewards(self, game_state, actions, winner):\n          \"\"\"Replace sparse winner-takes-all reward with Shapley-decomposed reward.\"\"\"\n          # Original: reward = +1 for winner, -1 for losers\n          # Coalition-aware: reward = Shapley credit for this action\n          \n          shapley_credits = shapley_credit_assignment(\n              game_state, actions, \n              [a.estimate_value(game_state) for a in self.agents]\n          )\n          \n          # Blend: alpha * sparse_reward + (1-alpha) * shapley_reward  \n          # This gives learning signal throughout the game, not just at end\n          alpha = 0.3\n          sparse = np.zeros(self.n_players)\n          sparse[winner] = 1.0\n          sparse[np.arange(self.n_players) != winner] = -1.0 / (self.n_players - 1)\n          \n          return alpha * sparse + (1 - alpha) * shapley_credits\n  ```\n- Train a population of 4 agents via self-play for 5000+ games\n- Compare:\n  - Sparse reward (winner-takes-all) \u2014 baseline from Sharan & Adak\n  - Shapley-decomposed reward (this step's contribution)\n- Metrics: average game length, win rate vs random, presence of coalition behavior (measured by coalition detector)\n\n**Day 5 \u2014 Population Analysis + Meta-Game Construction:**\n- \ud83d\udd34 Build the SLS meta-game using Step 10's EGTA framework:\n  ```python\n  def build_sls_meta_game(agent_pool, n_games=500):\n      \"\"\"Construct empirical payoff tensor for 4-player SLS.\n      \n      Unlike 2-player games (payoff MATRIX), 4-player games have a \n      payoff TENSOR: payoff[i,j,k,l] = expected reward for agent i \n      when agents j,k,l are opponents.\n      \n      Simplification: compute average reward for each agent type against\n      each combination of opponent types.\n      \"\"\"\n      n_agents = len(agent_pool)\n      # For 4-player: we need to evaluate all 4-tuples of agents\n      payoffs = {}\n      for combo in itertools.combinations_with_replacement(range(n_agents), 4):\n          total_rewards = np.zeros(4)\n          for _ in range(n_games):\n              agents = [agent_pool[i] for i in combo]\n              rewards = play_sls_game(agents)\n              total_rewards += rewards\n          payoffs[combo] = total_rewards / n_games\n      return payoffs\n  ```\n- \ud83d\udd34 Apply spinning top decomposition:\n  - **Challenge:** Balduzzi's decomposition assumes 2-player (antisymmetric payoff matrix). For 4-player SLS, the payoff structure is a TENSOR, not a matrix. \n  - **Adaptation:** Project the 4-player payoff tensor into pairwise matchups \u2014 for each pair of agent types, compute their head-to-head performance when matched in random 4-player games. This gives you a 2D payoff matrix you can decompose.\n  - Compute transitive ratio: expect SLS to have LARGE cyclic component (coalition dynamics = non-transitive: A+B beats C+D, B+C beats A+D, etc.)\n\n**Day 6 \u2014 Comparison + Analysis:**\n- Run the full comparison:\n  | Method | Win Rate vs Random | Avg Game Length | Coalition Score | Shapley Variation |\n  |--------|-------------------|-----------------|-----------------|-------------------|\n  | Random baseline | 25% | X games | ~0 | ~0 |\n  | DQN (Sharan & Adak) | ~40%? | Y games | low | low |\n  | MAPPO (sparse reward) | ? | ? | ? | ? |\n  | MAPPO + Shapley (this step) | ? | ? | higher? | higher? |\n\n- \ud83d\udfe2 Create visualizations:\n  - Coalition detection over time: at each turn, which pairs have positive coalition scores?\n  - Shapley attribution plot: for the winning agent, how did each turn's Shapley credit accumulate?\n  - Coalition formation/dissolution timeline: when do alliances form and when do they break?\n  - Spinning top transitive ratio for SLS meta-game\n\n### Deliverables:\n- [ ] Working SLS environment, verified against De Carufel & Jerade's rules\n- [ ] Coalition detection module (help/harm matrices \u2192 alliance inference)\n- [ ] Shapley credit assignment for SLS adapted to competitive setting\n- [ ] Coalition-aware MAPPO training producing agents that form implicit coalitions\n- [ ] EGTA meta-game analysis for 4-player SLS agent population\n- [ ] Spinning top decomposition adapted for the N-player meta-game\n- [ ] Comparison: sparse reward vs Shapley reward training on SLS\n- [ ] Coalition dynamics visualizations (formation/dissolution over game turns)\n\n### Validation:\n- **SLS environment:** 2-player endgame outcomes match De Carufel & Jerade's analytical results.\n- **Coalition detection:** On hand-crafted cooperative logs, detector correctly identifies the cooperating pair.\n- **Shapley values:** On symmetric game states, all players get equal Shapley credit. On asymmetric states (one player clearly helping another), the helper-helpee pair gets high mutual credit.\n- **Coalition-aware agents:** Agents trained with Shapley rewards should show HIGHER coalition scores (via the detector) than agents trained with sparse rewards. Whether they WIN more is secondary \u2014 the primary validation is that they FORM COALITIONS.\n- **Spinning top on SLS:** Expect significant cyclic component (>50%), confirming that FFA coalition dynamics are non-transitive.\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Survey Skim + Cross-References\n\n- **Reference skim:** Chalkiadakis, Elkind & Wooldridge (2011) \u2014 Chapters 5\u20136  \n  *Dynamic coalition formation and games with externalities. Skim for: does any classical theory address the DYNAMIC coalition case? (Answer: very little \u2014 most theory is static, which is exactly your PhD gap.)*\n\n- **Supplementary skim:** Li et al. (2021, KDD) \u2014 \"Shapley Counterfactual Credits for MARL\"  \n  https://arxiv.org/abs/2106.00285  \n  *Read Section 3: counterfactual Shapley \u2014 combines counterfactual baselines (from your CFR expertise, Steps 2\u20134) with Shapley decomposition. Could this improve your SLS credit assignment?*\n\n- **Supplementary skim:** Wang et al. (2025) \u2014 \"Shapley Machine: N-Agent Ad Hoc Teamwork\"  \n  https://arxiv.org/abs/2506.11285  \n  *Read abstract + method overview. Ad hoc teamwork = joining a team of unknown agents without pre-coordination. This is exactly what happens when a new coalition forms in SLS \u2014 you don't know if your \"ally\" will cooperate or betray.*\n\n- **Forward scan:** Skim arXiv for any new SLS or FFA coalition papers since the freshness scan. Search: \"So Long Sucker\", \"coalition formation competitive\", \"multi-player free-for-all\".\n\n### Day 2 \u2014 PhD Mapping + One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 2] Nash equilibrium \u2192 [Step 11] Nash is nearly useless in FFA games. In a 4-player zero-sum game, Nash tells each player to minimize their maximum loss \u2014 but this ignores coalitions entirely. The \"safe\" strategy according to Nash might be terrible if other players coordinate. This is the fundamental limitation that motivates Contribution #2.\n    - [Step 7] Opponent model (hand inference from actions) \u2192 [Step 11] Coalition detector (alliance inference from actions). Same Bayesian principle: observe behavior \u2192 update beliefs. In Step 7, you infer what cards the opponent HOLDS. In Step 11, you infer which players are ALIGNED. The state space changes; the methodology doesn't.\n    - [Step 8] Safe exploitation (bounded deviation from Nash) \u2192 [Step 11] In FFA games, the \"safe baseline\" shifts from Nash to BEHAVIORAL PRIOR (piKL from Bakhtin et al.). This is the most important theoretical insight of Phase E: as games become multi-player, EQUILIBRIUM-BASED safety becomes intractable and is replaced by EMPIRICAL/BEHAVIORAL safety.\n    - [Step 9] MADDPG/MAPPO \u2192 [Step 11] MARL training extended to 4 players. Centralized critic now sees ALL agents' observations \u2014 the critic can learn coalition structure implicitly.\n    - [Step 10] Spinning top decomposition \u2192 [Step 11] CONFIRMED: SLS meta-game has large cyclic component (coalition dynamics ARE non-transitive). This validates Step 10's prediction.\n    - [Step 10] EGTA \u2192 [Step 11] EGTA on the 4-player payoff tensor is the evaluation mechanism. But the tensor dimensionality explosion (payoff_matrix \u2192 payoff_tensor) is a challenge.\n    - [Step 11] Shapley credit in FFA \u2192 prediction: [Step 13] Playtech's multi-table poker data may contain implicit coalitions (chip dumping, soft-play). The coalition detector from Step 11 could be adapted for collusion detection in real poker data. This directly connects to Contribution #3.\n    - [Step 11] Dynamic coalition instability \u2192 prediction: [Step 14] The evaluation framework must handle non-stationary opponent populations where coalition structures shift mid-evaluation. Standard exploitability (fixed opponent assumption) breaks down.\n  - **Confusions:**\n    - [Step 11] The Shapley value assumes the grand coalition is optimal and asks \"how to divide the gains fairly.\" But in SLS, the grand coalition makes no sense (only 1 player wins). How should the Shapley decomposition be adapted for purely competitive settings where coalition help is TEMPORARY? \u2192 PARTIALLY ADDRESSED (use Shapley for credit, not for payoff division)\n    - [Step 11] Coalition detection from action history is noisy \u2014 a player might place another's chip for strategic reasons (not alliance). Can the detector distinguish \"genuine alliance\" from \"strategic manipulation\"? \u2192 OPEN (relates to deception detection, potentially Step 13)\n    - [Step 11] In 4-player SLS, there are only 3 possible pairwise coalitions ({01,23}, {02,13}, {03,12}) plus 4 possible 3-vs-1 coalitions. For larger N (e.g., 6-player poker), the coalition space explodes. How to scale? \u2192 OPEN (for thesis scaling work)\n    - [Step 8\u219211] Step 8 proved: safe exploitation is optimal in 2-player zero-sum games (deviate from Nash only against exploitable opponents). In 4-player SLS: (a) Nash is intractable, (b) game is not zero-sum pairwise (coalitions create positive-sum subgames between allies). What IS the \"safe\" strategy? \u2192 OPEN (THIS IS THE CORE OF CONTRIBUTION #2)\n    - [Step 10\u219211] The spinning top decomposition on the projected 2D payoff matrix may lose information about 3-player and 4-player coalition effects. Is there a proper multi-player spinning top decomposition? \u2192 OPEN (potentially novel contribution)\n\n## Exit Checklist\n\n- [ ] SLS environment working and verified against formal rules + endgame analysis\n- [ ] Coalition detection module tested on hand-crafted and learned game histories\n- [ ] Shapley credit assignment implemented and verified on symmetric/asymmetric game states\n- [ ] Coalition-aware MAPPO agents trained and showing coalition behavior (measured by detector)\n- [ ] Can explain from memory: Shapley value formula and what it means in FFA settings\n- [ ] Can explain from memory: the core of a cooperative game and why SLS likely has an empty core\n- [ ] Can explain from memory: why Nash equilibrium fails as a safety baseline in N-player FFA games\n- [ ] Can explain from memory: piKL regularization and why behavioral priors replace Nash in N-player settings\n- [ ] EGTA meta-game constructed for SLS agent population (payoff tensor, not matrix)\n- [ ] Spinning top decomposition applied \u2014 cyclic component quantified for SLS\n- [ ] Comparison table: sparse reward vs Shapley reward agents on SLS\n- [ ] All \ud83d\udd34 components hand-coded (coalition detector, Shapley credit, coalition-aware training, meta-game analysis, spinning top adaptation)\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 2\u201310 + new confusions + thesis gap crystallization)\n- [ ] PhD connection documented (N-player safety gap = Contribution #2 core, coalition detector = Contribution #1 extension, EGTA on SLS = Contribution #3 prototype)\n- [ ] Step notes committed to repo\n\n> **[P2] Fallback Benchmarks:** If So Long Sucker proves too complex or brittle, documented alternatives:\n> - (a) 3-player Leduc with side agreements\n> - (b) Goofspiel (already referenced in Step 9)\n> - (c) Simplified custom 4-player game\n\n> **[P3] Contribution #2 scope narrowing (echo from Step 8):** Contribution #2 is **tractable heuristics + empirical validation on small N-player games**, not a general N-player safety theorem. Adjust PhD Connection accordingly.\n",
  "step_12": "# Step 12 \u2014 Sequence Models + LLM Agents in Strategic Settings\n\n**Duration:** 10 days (Tier 3)  \n**Dependencies:** Step 5 (Neural Equilibrium Approximation), Step 7 (Opponent Modeling)  \n**Phase:** F \u2014 Data-Driven Approaches  \n\n### PhD Connection\n\nThis step bridges the thesis's FORMAL tools (Steps 2\u20138: CFR, equilibrium, exploitation) to the DATA-DRIVEN paradigm:\n\n- **Contribution #1 (Behavioral Adaptation):** The state tensor encoding (cards, position, pot, stacks, betting history) designed here carries directly to the Playtech behavioral analysis pipeline (Step 13). The encoding IS the foundation of the behavioral adaptation framework \u2014 how you represent game state determines what behavioral patterns you can detect. This step prototypes the encoding on small games; Step 13 scales it to real data.\n\n- **Contribution #2 (Multi-Agent Safe Exploitation):** ARDT demonstrates that safe (minimax) strategies can emerge from offline data without explicit game-theoretic computation. This opens a path for Contribution #2: instead of computing Nash equilibria for N-player games (intractable, as shown in Step 11), learn safe strategies directly from behavioral data. The minimax conditioning on return-to-go is the offline analog of safe exploitation.\n\n- **Contribution #3 (Evaluation Methodology):** The comparison table (CFR vs DT vs ARDT vs BC vs LLM on Kuhn Poker) is a microcosm of the evaluation framework: multiple agent architectures, same game, standardized metrics (exploitability, behavioral statistics). This prototype scales to the full evaluation framework in Step 14.\n\n- **Bridge to Step 13:** Everything in this step's implementation \u2014 the state tensor encoding, the trajectory dataset format, the DT training pipeline \u2014 transfers to Playtech's anonymized hand history data. Step 12 builds the prototype on synthetic Kuhn/Leduc data; Step 13 applies it to real poker data.\n\n- **LLM angle for job market:** 3/10 target job postings mention LLM skills. This step demonstrates fluency with the LLM paradigm, positioning you for both the AI researcher path (combining formal methods with LLMs) and the fraud/risk path (LLM-based anomaly description and reasoning).\n\n---\n\n> **Phase Overview:** The preceding phases developed methods entirely within synthetic, self-play environments. Phase F will bridge the gap between theoretical methods and real-world behavioral data. Step 12 introduces sequence models (Decision Transformers) and assesses large language model agents in strategic settings. Step 13 applies the resulting pipeline to anonymized real-world poker hand histories, constructing player embeddings, behavioral classification systems, and a collusion detection module.\n\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Videos](#videos)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (1 day)](#phase-2-exploration-1-day)\n  - [Morning: Decision Transformer on a Game Task](#morning-decision-transformer-on-a-game-task)\n  - [Afternoon: LLM Agent on TextArena](#afternoon-llm-agent-on-textarena)\n- [Phase 3: Targeted Reading (2 days)](#phase-3-targeted-reading-2-days)\n  - [Paper 1: Chen, Lu, Rajeswaran, Lee, Grover, Laskin, Abbeel, Srinivas & Mordatch \u2014 \"Decision Transformer: Reinforcement Learning via Sequence Modeling\" (2021)](#paper-1-chen-lu-rajeswaran-lee-grover-laskin-abbeel-srinivas-mordatch-decision-transformer-reinforcement-learning-via-sequence-modeling-2021)\n  - [Paper 2: Paster, McIlraith & Ba \u2014 \"You Can't Count on Luck\" (2022)](#paper-2-paster-mcilraith-ba-you-cant-count-on-luck-2022)\n  - [Paper 3: Tang, Marques, Kamalaruban & Bogunovic \u2014 \"Adversarially Robust Decision Transformer\" (2024, NeurIPS 2024)](#paper-3-tang-marques-kamalaruban-bogunovic-adversarially-robust-decision-transformer-2024-neurips-2024)\n  - [Paper 4: Guertler, Cheng, Yu, Liu, Choshen & Tan \u2014 \"TextArena\" (2025)](#paper-4-guertler-cheng-yu-liu-choshen-tan-textarena-2025)\n  - [Paper 5: Janner, Li & Levine \u2014 \"Offline Reinforcement Learning as One Big Sequence Modeling Problem\" (2021)](#paper-5-janner-li-levine-offline-reinforcement-learning-as-one-big-sequence-modeling-problem-2021)\n  - [Supplementary Reading (skim as time permits):](#supplementary-reading-skim-as-time-permits)\n  - [Math Flags:](#math-flags)\n- [Phase 4: Implementation (4 days)](#phase-4-implementation-4-days)\n  - [Project: Decision Transformer for Kuhn/Leduc Poker + LLM Agent Evaluation on TextArena](#project-decision-transformer-for-kuhnleduc-poker-llm-agent-evaluation-on-textarena)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Survey Skim + Cross-References](#day-1-survey-skim-cross-references)\n  - [Day 2 \u2014 PhD Mapping + One-Pager + Learning Log](#day-2-phd-mapping-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand TWO distinct but converging paradigms:\n\n**Paradigm A \u2014 Sequence Modeling for Offline RL (Decision Transformer):** Instead of learning a value function like Q-learning, what if you reformulate RL as a SEQUENCE prediction problem? Given a history of (state, action, reward) triples, predict the next action \u2014 conditioned on the DESIRED future return. The transformer architecture handles this naturally: it's already designed to predict the next token given a sequence. The breakthrough insight: you can train on a static dataset of past games (no environment interaction needed), and at test time, you simply condition on \"I want high reward\" and the model produces good actions.\n\n**Paradigm B \u2014 LLM Agents in Strategic Games:** What if you give a powerful language model (GPT-4, Claude, etc.) the rules of a game in natural language and let it PLAY? No RL training, no game tree search \u2014 just prompt engineering, in-context learning, and reasoning. This is radically different from everything in Steps 1\u201311. It works shockingly well in some settings (Diplomacy via CICERO) and fails embarrassingly in others (simple logical games). The key question: WHERE does LLM strategic reasoning work, where does it fail, and can it be COMBINED with game-theoretic methods?\n\nEnd of day: you should be able to explain to a non-expert: \"There are two ways to use modern AI for game playing beyond classical RL. First, you can treat game histories as text sequences and train a transformer to predict good moves \u2014 this is the Decision Transformer approach. Second, you can just ask a large language model like GPT-4 to play a game by giving it the rules in plain English \u2014 and sometimes it plays surprisingly well, especially in games involving negotiation and deception. Both approaches have serious limitations: the sequence model struggles with luck-based games, and the LLM sometimes makes illegal moves or terrible strategic blunders. The frontier research question is how to combine these approaches with the game-theoretic methods we've already studied.\"\n\n### Videos\n\n- **Stanford CS25: Decision Transformer: RL via Sequence Modeling**  \n  https://www.youtube.com/watch?v=qndXrHcV1sM  \n  Duration: ~1h21m | Channel: Stanford Online  \n  *Aditya Grover presents the Decision Transformer: how return-to-go conditioning works, the GPT-2 backbone adaptation for RL, and comparison with traditional RL approaches.*\n\n- **Decision Transformer: RL via Sequence Modeling (Research Paper Explained)**  \n  https://www.youtube.com/watch?v=-buULmf7dec  \n  Duration: ~57m | Channel: Yannic Kilcher  \n  *Detailed paper walkthrough of the Decision Transformer architecture: tokenization of (return, state, action) triples, conditioning on desired returns, and key experimental results.*\n\n- **Stanford CS224R \u2014 Lecture 9: RL for LLMs \u2014 Preference Optimization (Spring 2025)**  \n  https://www.youtube.com/watch?v=XKLGuwvSKvI  \n  Duration: ~1h3m | Speaker: Archit Sharma (Gemini team, lead DPO author) | Stanford  \n  *Guest lecture covering how RL is applied to large language models via preference optimization (DPO). The bridge between sequence models and strategic reasoning.*\n\n- **Stanford CS224R \u2014 Lecture 10: RL for LLM Reasoning (Spring 2025)**  \n  https://www.youtube.com/watch?v=O2VpNnwB4lM  \n  Duration: ~1h11m | Speaker: Aviral Kumar (CMU) | Stanford  \n  *How reinforcement learning improves LLM reasoning capabilities. Directly relevant to understanding how LLM agents might learn strategic reasoning in games.*\n\n### Blog Posts / Accessible Reads\n\n- **Lilian Weng \u2014 \"The Prompt Report: A Systematic Survey of Prompting Techniques\" (blog)**  \n  https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/  \n  *Background on prompt engineering techniques that LLM game agents rely on: chain-of-thought, in-context learning, role prompting. You'll need this to understand how TextArena agents are constructed.*\n\n- **TextArena documentation & leaderboard**  \n  https://www.textarena.ai/  \n  https://github.com/LeonGuertler/TextArena  \n  *Browse the games list: 57+ environments spanning negotiation, deception, strategy. Check the TrueSkill leaderboard: which LLMs dominate? Which game types are hardest? This gives you the landscape.*\n\n- **Hugging Face Blog \u2014 \"Decision Transformer\" tutorial**  \n  https://huggingface.co/blog/decision-transformers  \n  *Hands-on tutorial with code. Good for getting a quick implementation running before diving into the papers.*\n\n---\n\n## Phase 2: Exploration (1 day)\n\n### \ud83c\udfae Interactive Exploration\n- **[LLM 3D Visualization](https://bbycroft.net/llm)** \u2014 In-depth interactive 3D visualization of the Transformer architecture, showing how attention blocks filter information.\n\n\n### Morning: Decision Transformer on a Game Task\n\n1. **Run the HuggingFace Decision Transformer example:**\n   ```bash\n   pip install transformers datasets torch\n   ```\n   - Use the `edbeeching/decision_transformer_gym_replay` dataset on HuggingFace\n   - Train a DT on Atari or MuJoCo if compute allows; otherwise use the pre-trained checkpoint\n   - **Key experiment:** Vary the return-to-go conditioning:\n     - Condition on low return \u2192 observe: DT should produce poor play\n     - Condition on medium return \u2192 observe: DT should produce average play\n     - Condition on high return \u2192 observe: DT should produce good play\n     - **Condition on IMPOSSIBLE return** (higher than ever seen in data) \u2192 observe: what happens? Does DT extrapolate or collapse? This is the critical limitation (see Paster et al., 2022)\n\n2. **Hands-on with stochasticity:**\n   - If possible, run DT on a stochastic environment (e.g., a simple card game if available, or add noise to a deterministic environment)\n   - Observe: does conditioning on high return produce genuinely skilled play, or does it just reproduce lucky trajectories? This is the fundamental problem flagged by Paster et al.\n\n### Afternoon: LLM Agent on TextArena\n\n3. **Set up TextArena:**\n   ```bash\n   pip install textarena\n   ```\n   - Browse available games: `textarena.list_games()`\n   - Pick a simple strategic game (e.g., a negotiation or deduction game)\n   - Play a game manually (human vs LLM) to understand the interface\n   - **Key experiment:** Run GPT-4 (or Claude, or an open model) against a random baseline:\n     - Does the LLM understand the rules? (Check for illegal move attempts)\n     - Does the LLM reason strategically? (Look for evidence of planning, bluffing, theory of mind)\n     - Does the LLM adapt to opponent behavior? (Play multiple rounds \u2014 does it exploit patterns?)\n   - **Connection to Step 7:** Compare the LLM's implicit opponent modeling (in-context) with the explicit Bayesian opponent model from Step 7. Which is more systematic? Which is more flexible?\n\n4. **Quick sanity check \u2014 LLM on Kuhn Poker:**\n   - Write a simple Kuhn Poker text interface (you have the environment from Step 2)\n   - Prompt an LLM to play Kuhn Poker. Does it discover that bluffing with a Jack is sometimes optimal? Does it understand the information asymmetry?\n   - This connects ALL of Steps 2\u20138 to the LLM paradigm: you know the Nash equilibrium for Kuhn Poker. Can an LLM find it through REASONING alone, without training?\n\n---\n\n## Phase 3: Targeted Reading (2 days)\n\n### Paper 1: Chen, Lu, Rajeswaran, Lee, Grover, Laskin, Abbeel, Srinivas & Mordatch \u2014 \"Decision Transformer: Reinforcement Learning via Sequence Modeling\" (2021)\nhttps://arxiv.org/abs/2106.01345\n\n- **READ:** Sections 1\u20133 (Introduction, Preliminaries, Decision Transformer)\n  - KEY INSIGHT: RL reformulated as conditional sequence generation. The return-to-go token replaces the reward-maximization objective.\n  - Architecture: GPT-2 backbone, input = (R\u0302\u2081, s\u2081, a\u2081, R\u0302\u2082, s\u2082, a\u2082, ...). Each modality (return, state, action) gets its own embedding + learned positional encoding.\n  - Training: standard cross-entropy / MSE loss on action prediction, conditioned on return-to-go and state history.\n- **READ:** Section 4 (Experiments) \u2014 Table 1 especially\n  - DT matches or exceeds CQL and behavior cloning on offline Atari and MuJoCo tasks\n  - KEY OBSERVATION: DT is competitive without any temporal difference learning, Bellman backup, or value function. Pure supervised learning on (state, action, return) sequences.\n- **SKIM:** Section 5 (Discussion)\n- **SKIP:** Appendix details on specific environments (unless you're replicating)\n- **PhD Connection:** The state representation (cards, position, pot, stacks, betting history) from the original docPlan maps directly to the DT input tokenization. Hand histories become sequences. Return-to-go = desired winrate. This is the *architecture* for Step 13's Playtech behavioral cloning.\n\n### Paper 2: Paster, McIlraith & Ba \u2014 \"You Can't Count on Luck\" (2022)\nhttps://arxiv.org/abs/2205.15967\n\n- **READ:** Sections 1\u20133 (Introduction, Problem formulation, Theoretical results)\n  - KEY INSIGHT: In stochastic environments, high-return trajectories often OVERREPRESENT lucky outcomes rather than skilled decisions. Conditioning DT on high return-to-go amplifies luck, not skill.\n  - Theorem 2.1: formal bound on suboptimality of return-conditioned policies in stochastic MDPs.\n- **READ:** Section 4 (Experiments)\n  - Coin-flip MDP experiment: DT learns to predict \"heads\" (lucky), not the optimal strategy\n  - Stochastic offline RL environments: DT significantly underperforms CQL when stochasticity is high\n- **SKIM:** Section 5 (Related work)\n- **MATH:** \ud83d\udd22 Work through Theorem 2.1 with pen and paper. This is the formal reason why DT on poker (a stochastic game) requires careful modifications.\n- **PhD Connection:** CRITICAL. Poker hand histories are highly stochastic (card deals). A naive DT trained on Playtech data will associate \"good outcomes\" with \"lucky cards,\" not \"good strategy.\" The fix: condition on STRATEGIC quality metrics (e.g., EV of decisions) rather than raw win/loss. This insight shapes the Step 13 data pipeline design.\n\n### Paper 3: Tang, Marques, Kamalaruban & Bogunovic \u2014 \"Adversarially Robust Decision Transformer\" (2024, NeurIPS 2024)\nhttps://arxiv.org/abs/2407.18414\n\n- **READ:** Sections 1\u20133 (Introduction, Preliminaries, ARDT method)\n  - KEY INSIGHT: In adversarial games, the return-to-go is not just a function of your policy \u2014 it depends on the OPPONENT's strategy. ARDT conditions on MINIMAX returns-to-go: the best return achievable against the WORST-CASE opponent.\n  - Minimax expectile regression: learns both \"what is the best I can do\" and \"what is the worst my opponent can do\" from offline data.\n- **READ:** Section 4 (Experiments)\n  - Sequential games with full data coverage: ARDT produces Nash Equilibrium strategies!\n  - Continuous adversarial RL + large games with partial coverage: ARDT achieves highest worst-case returns\n- **SKIM:** Proofs / detailed math (only work through if time permits)\n- **PhD Connection:** ARDT connects Step 5 (equilibrium computation) to the sequence model paradigm. If Nash can emerge from offline sequence modeling with the right conditioning, this may provide an alternative path to equilibrium strategies that doesn't require CFR at all. Direct bridge: Step 5's Deep CFR vs Step 12's ARDT \u2014 two roads to the same destination?\n\n### Paper 4: Guertler, Cheng, Yu, Liu, Choshen & Tan \u2014 \"TextArena\" (2025)\nhttps://arxiv.org/abs/2504.11442\n\n- **READ:** Entire paper (5 pages \u2014 short)\n  - 57+ competitive text-based game environments  \n  - TrueSkill scoring system for LLM evaluation\n  - Game categories: negotiation, deception, theory of mind, strategy\n  - Which LLMs perform best? On which game types?\n- **KEY OBSERVATION:** TextArena tests *social* intelligence (negotiation, deception) \u2014 the exact capabilities that game-theoretic methods DON'T capture. This is the complement to your CFR/MARL toolkit: formal methods handle exploitability and equilibrium, LLMs handle negotiation and persuasion.\n- **PhD Connection:** TextArena games map to \"soft\" strategic settings where behavioral signals matter more than equilibrium computation. This connects to Step 7's opponent modeling: can an LLM's in-context \"model\" of the opponent complement or replace explicit Bayesian inference?\n\n### Paper 5: Janner, Li & Levine \u2014 \"Offline Reinforcement Learning as One Big Sequence Modeling Problem\" (2021)\nhttps://arxiv.org/abs/2106.02039\n\n- **READ:** Sections 1\u20133 (Introduction, discretization, Trajectory Transformer architecture)\n  - KEY DIFFERENCE from DT: Trajectory Transformer (TT) models EVERYTHING as tokens \u2014 states, actions, AND rewards \u2014 and uses beam search at inference time instead of simple conditioning.\n  - TT can do PLANNING (via beam search over future trajectories), while DT does only generation.\n- **SKIM:** Experiments on MuJoCo benchmarks\n- **SKIP:** Detailed ablations\n- **PhD Connection:** Beam search over game trajectories is conceptually similar to Monte Carlo Tree Search (Steps 3\u20134). The sequence model world is converging with the game AI world. TT's planning via beam search connects to ReBeL's search (Step 6) \u2014 both search over future sequences to find good actions.\n\n### Supplementary Reading (skim as time permits):\n\n- **Kumar et al. (2020) \u2014 \"Conservative Q-Learning\"** (arXiv:2006.04779): The value-based offline RL baseline. SKIM Section 3 (CQL penalties) to understand the alternative to sequence modeling. You need to know when CQL > DT and vice versa.\n\n- **Zhang et al. (2025) \u2014 \"Divide-Fuse-Conquer\"** (arXiv:2505.16401): State-of-the-art LLM game training on TextArena. SKIM for: how they partition games by difficulty, how model merging works, what performance level Qwen2.5-32B achieves vs Claude 3.5.\n\n- **Guo et al. (2023) \u2014 \"Suspicion-Agent\"** (arXiv:2309.17277): GPT-4 with theory-of-mind planning for Werewolf and Avalon. SKIM for: the planning module architecture \u2014 it explicitly models other players' beliefs, connecting to Step 7's opponent modeling.\n\n### Math Flags:\n\n\ud83d\udd22 **Paster et al. Theorem 2.1** \u2014 Work through with pen and paper. Understand the formal bound on return-conditioned policy suboptimality in stochastic MDPs. This is the mathematical reason why naive DT on poker data will fail.  \n**WHY this can't be substituted by algorithmic understanding:** The theorem directly constrains what information you can extract from poker hand history data \u2014 it tells you the gap between \"best outcome\" (lucky) and \"best strategy\" (skilled). Without this, you'll misinterpret DT results on Playtech data.\n\n\ud83d\udd22 **ARDT minimax expectile regression** \u2014 Understand how expectile regression at different quantiles captures best-case and worst-case returns from the same offline dataset. This is a specific statistical technique (not standard ML) that you need to understand for the implementation.  \n**WHY this can't be substituted by algorithmic understanding:** This is a specific loss function modification \u2014 you need to implement it correctly, and understanding the math ensures you get the quantile semantics right.\n\n---\n\n## Phase 4: Implementation (4 days)\n\n### Project: Decision Transformer for Kuhn/Leduc Poker + LLM Agent Evaluation on TextArena\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Kuhn Poker DT data pipeline (state encoding) | \ud83d\udd34 HAND-CODE | The state representation is thesis-critical \u2014 same tensor design carries to Playtech data. Must deeply understand each feature. |\n| Decision Transformer training loop | \ud83d\udfe1 AI-ASSISTED | Use HuggingFace DT implementation as base, adapt for poker state/action spaces. Understand the architecture but don't rewrite the transformer from scratch. |\n| ARDT minimax return conditioning | \ud83d\udd34 HAND-CODE | The minimax expectile regression is the novel component \u2014 must implement the loss function yourself to understand the adversarial conditioning. |\n| TextArena LLM agent wrapper | \ud83d\udfe2 AI-GENERATED | Boilerplate API integration code \u2014 no deep understanding needed for wrapper/prompt formatting. |\n| LLM strategic reasoning evaluation | \ud83d\udd34 HAND-CODE | Designing evaluation metrics for LLM game play (illegal moves, strategic quality, opponent adaptation) requires domain expertise from Steps 2\u20137. |\n| Comparison analysis + visualizations | \ud83d\udfe1 AI-ASSISTED | Analysis code with manual interpretation of results. |\n\n**Day 1 \u2014 Kuhn/Leduc Decision Transformer: Data Pipeline**\n\n- \ud83d\udd34 Build the data pipeline for offline RL on poker:\n  ```python\n  class PokerTrajectoryDataset:\n      \"\"\"Convert poker game histories into Decision Transformer input format.\n      \n      Each trajectory = one complete hand (deal \u2192 betting rounds \u2192 showdown).\n      Tokenization: (return-to-go, state, action) triples per decision point.\n      \n      State representation (will carry to Playtech in Step 13):\n        - cards: one-hot encoding of hole cards (2 for Kuhn, 2 for Leduc)\n        - board: one-hot encoding of community cards (0 for Kuhn, 1 for Leduc)\n        - position: binary indicator (dealer/non-dealer)\n        - pot: normalized pot size (pot / starting_stack)\n        - stack: normalized remaining stack\n        - betting_history: sequence of actions encoded as integers\n                           (fold=0, check=1, call=2, bet=3, raise=4)\n        - round_flag: current betting round (preflop/postflop)\n      \"\"\"\n      \n      def __init__(self, game_type='kuhn', n_trajectories=50000):\n          self.game_type = game_type\n          self.trajectories = []\n          self.generate_data(n_trajectories)\n      \n      def generate_data(self, n):\n          \"\"\"Generate trajectories by running trained CFR agents (from Step 3)\n          against each other. This gives near-Nash data \u2014 the quality of data\n          matters for DT training.\"\"\"\n          # Use your CFR solver from Step 3 to generate strategy profiles\n          # Play games using those profiles, record full trajectories\n          for _ in range(n):\n              trajectory = self.play_one_hand()\n              self.trajectories.append(trajectory)\n      \n      def encode_state(self, game_state):\n          \"\"\"Encode game state as a fixed-dim tensor.\n          THIS IS THE CRITICAL FUNCTION \u2014 same encoding will be reused \n          on Playtech data in Step 13.\"\"\"\n          cards_enc = self.encode_cards(game_state.hole_cards)\n          board_enc = self.encode_cards(game_state.board_cards)\n          position = [1.0 if game_state.is_dealer else 0.0]\n          pot = [game_state.pot / game_state.starting_stack]\n          stack = [game_state.stack / game_state.starting_stack]\n          history = self.encode_history(game_state.action_sequence)\n          round_flag = self.encode_round(game_state.current_round)\n          return np.concatenate([cards_enc, board_enc, position, \n                                  pot, stack, history, round_flag])\n      \n      def compute_return_to_go(self, trajectory, timestep):\n          \"\"\"Return-to-go = sum of future rewards from this point.\n          For poker: reward = final payoff (positive or negative chips won).\n          WARNING (Paster et al.): this conflates skill with luck.\n          Future work (Step 13): replace with EV-based returns.\"\"\"\n          return sum(r for _, _, r in trajectory[timestep:])\n  ```\n- Generate 50K+ Kuhn Poker trajectories using your CFR agent from Step 3\n- Generate 50K+ Leduc Poker trajectories if time permits\n- Verify data quality: distribution of returns should match known game values\n\n**Day 2 \u2014 Decision Transformer Training on Poker**\n\n- \ud83d\udfe1 Adapt the HuggingFace Decision Transformer for poker:\n  ```python\n  from transformers import DecisionTransformerConfig, DecisionTransformerModel\n  \n  config = DecisionTransformerConfig(\n      state_dim=STATE_DIM,        # Your state encoding dimension\n      act_dim=ACTION_DIM,         # Number of poker actions\n      max_length=20,              # Max timesteps per hand (poker hands are short)\n      max_ep_len=20,\n      hidden_size=128,            # Smaller than default \u2014 poker is a small game\n      n_layer=3,\n      n_head=4,\n      activation_function='relu',\n  )\n  model = DecisionTransformerModel(config)\n  ```\n- Train the DT on your Kuhn Poker data\n- **Key experiments:**\n  1. **Return conditioning test:** Generate actions at different return-to-go levels\n     - High return-to-go: does DT play closer to Nash?\n     - Low return-to-go: does DT play worse? (It should \u2014 this validates conditioning works)\n  2. **Stochasticity test (Paster et al.'s warning):**\n     - Train on mixed data: near-Nash play + random play\n     - Condition on high return \u2192 does DT learn Nash strategy or lucky card selection?\n     - Measure: action prediction accuracy BY CARD \u2014 if DT's \"good play\" depends on the card rather than the situation, it's learning luck, not skill\n  3. **Comparison with behavioral cloning:**\n     - Simple BC: predict action from state (no return conditioning)\n     - DT: predict action from (return-to-go, state history)\n     - Are they different on Kuhn Poker? (Expected: minimal difference on small games, larger difference on Leduc)\n\n**Day 3 \u2014 ARDT Implementation for Adversarial Poker**\n\n- \ud83d\udd34 Implement the minimax return-to-go conditioning from ARDT:\n  ```python\n  class AdversariallyRobustDT:\n      \"\"\"Decision Transformer with minimax return conditioning.\n      \n      Standard DT: condition on \u03c4 (target return) \u2192 generate actions that \n      historically achieved return \u03c4.\n      \n      ARDT: condition on \u03c4_minimax = max_\u03c0 min_opponent E[return | \u03c0, opponent]\n      \u2192 generate actions that achieve high return EVEN AGAINST the worst opponent.\n      \n      Implementation: expectile regression on returns-to-go at different quantiles\n      to estimate worst-case and best-case returns from the offline data.\n      \"\"\"\n      \n      def __init__(self, dt_model, tau=0.9):\n          self.dt = dt_model\n          self.tau = tau  # Expectile parameter: 0.5 = symmetric, 0.9 = pessimistic\n          \n      def expectile_loss(self, pred, target):\n          \"\"\"Asymmetric loss: penalize underestimates more than overestimates.\n          This gives us a PESSIMISTIC estimate of return \u2014 the worst-case\n          return-to-go under adversarial opponent behavior.\"\"\"\n          diff = target - pred\n          weight = torch.where(diff > 0, self.tau, 1 - self.tau)\n          return (weight * diff.pow(2)).mean()\n      \n      def compute_minimax_return(self, states, returns):\n          \"\"\"Estimate the minimax return-to-go for each state.\n          This replaces the raw return-to-go with an adversarially robust estimate.\n          The key idea: among all trajectories passing through this state,\n          what return do you achieve against the WORST opponent?\"\"\"\n          # Train an expectile regression model on (state \u2192 return-to-go)\n          # with high tau (e.g., tau=0.9) to get pessimistic estimates\n          return self.expectile_model(states)\n      \n      def train_step(self, batch):\n          \"\"\"Modified DT training: use minimax returns instead of raw returns.\"\"\"\n          states, actions, raw_returns = batch\n          minimax_returns = self.compute_minimax_return(states, raw_returns)\n          # Feed minimax returns as the return-to-go conditioning\n          predicted_actions = self.dt(minimax_returns, states)\n          action_loss = F.cross_entropy(predicted_actions, actions)\n          return action_loss\n  ```\n- **Experiment:** Train ARDT on Kuhn Poker data generated from MIXED opponents:\n  - 50% near-Nash opponents (produced by your CFR solver)\n  - 50% exploitable opponents (loose-passive, tight-aggressive from Step 7)\n  - Compare: standard DT vs ARDT when TESTED against a Nash opponent (worst case)\n  - Expected: ARDT should produce near-Nash play even when trained on mixed data, while standard DT may learn to exploit the weak opponents and fail against Nash\n- **Validation:** Compare ARDT's extracted strategy with the known Nash equilibrium for Kuhn Poker (from Step 2). Use exploitability metric from Step 2 to quantify gap.\n\n**Day 4 \u2014 LLM Agent Evaluation on TextArena + Kuhn Poker**\n\n- \ud83d\udfe2 Set up TextArena LLM agent:\n  ```python\n  import textarena as ta\n  \n  # Pick a strategic game \u2014 e.g., negotiation or deduction\n  env = ta.make(\"SpyFall-v0\")  # or another deception/deduction game\n  \n  # Create LLM agent (use whatever API you have access to)\n  agent = ta.agents.OpenRouterAgent(\n      model=\"anthropic/claude-3.5-sonnet\",\n      system_prompt=\"You are a strategic game player. Think step by step.\"\n  )\n  \n  # Run evaluation: LLM vs LLM, LLM vs random\n  results = ta.evaluate(env, [agent, ta.agents.RandomAgent()], n_games=50)\n  ```\n- \ud83d\udd34 Build Kuhn Poker LLM evaluation:\n  ```python\n  class KuhnPokerLLMAgent:\n      \"\"\"Wrapper to test LLM play on Kuhn Poker.\n      Uses the Kuhn environment from Step 2.\"\"\"\n      \n      def __init__(self, llm_client, system_prompt=None):\n          self.llm = llm_client\n          self.system_prompt = system_prompt or self.default_prompt()\n      \n      def default_prompt(self):\n          return \"\"\"You are playing Kuhn Poker. Rules:\n          - 3-card deck: Jack, Queen, King (King > Queen > Jack)\n          - Each player gets 1 card, sees only their own\n          - Betting: check/bet \u2192 check/call/fold\n          - Higher card wins at showdown\n          Think about: what card does your opponent likely have? \n          Should you bluff? What's the optimal strategy?\"\"\"\n      \n      def get_action(self, game_state):\n          prompt = f\"\"\"Current state:\n          Your card: {game_state.my_card}\n          Pot: {game_state.pot}\n          Betting history: {game_state.action_history}\n          Legal actions: {game_state.legal_actions}\n          \n          Choose your action and explain your reasoning.\"\"\"\n          response = self.llm.complete(self.system_prompt, prompt)\n          action = self.parse_action(response, game_state.legal_actions)\n          return action\n  ```\n- **Key evaluation metrics (\ud83d\udd34 hand-design these):**\n  1. **Illegal move rate:** How often does the LLM attempt an illegal action?\n  2. **Exploitability:** Extract the LLM's empirical strategy profile (over many hands) and compute exploitability using the exact game solver from Step 2\n  3. **Bluff frequency:** Does the LLM bluff with Jack? (Nash says ~1/3 of the time.) Does it value bet with King? (Nash says always.)\n  4. **Opponent adaptation:** If you change the opponent from Nash to always-call, does the LLM stop bluffing? (A good exploitative agent would \u2014 see Step 8)\n  5. **Reasoning quality:** Read the LLM's explanations. Does it demonstrate theory of mind? Information-theoretic reasoning? Or is it just pattern-matching?\n- **Comparison table (the step's key output):**\n  | Agent | Exploitability (mbb/h) | Bluff Freq (J) | Value Bet Freq (K) | Illegal Move % | Adapts to Opp? |\n  |-------|----------------------|-----------------|--------------------|----|---|\n  | Nash CFR (Step 2) | 0 | 1/3 | 1.0 | 0 | No |\n  | DT (high return) | ? | ? | ? | 0 | No |\n  | ARDT (minimax) | ? | ? | ? | 0 | No |\n  | Behavioral cloning | ? | ? | ? | 0 | No |\n  | LLM (no prompting) | ? | ? | ? | ? | ? |\n  | LLM (CoT prompting) | ? | ? | ? | ? | ? |\n  | LLM (game theory prompt) | ? | ? | ? | ? | ? |\n  - The game theory prompt: tell the LLM about Nash equilibrium for Kuhn Poker and ask it to approximate it. Does it? How close?\n\n### Deliverables:\n- [ ] Poker trajectory dataset (50K+ Kuhn hands) with state encoding matching thesis tensor design\n- [ ] Decision Transformer trained on Kuhn Poker; return conditioning validated\n- [ ] Stochasticity experiment demonstrating the Paster et al. (2022) luck-vs-skill issue\n- [ ] ARDT implementation with minimax expectile regression, tested on Kuhn Poker\n- [ ] ARDT strategy compared to known Nash equilibrium (exploitability measurement)\n- [ ] TextArena LLM agent running on at least one strategic game\n- [ ] Kuhn Poker LLM evaluation: exploitability, bluff frequency, illegal moves, opponent adaptation\n- [ ] Comparison table: Nash CFR vs DT vs ARDT vs BC vs LLM on Kuhn Poker\n\n### Validation:\n- **DT return conditioning:** Low return-to-go produces worse play than high return-to-go (measured by exploitability).\n- **Stochasticity test:** DT's action prediction accuracy varies by card dealt \u2014 confirming it partially learns luck, not just skill.\n- **ARDT vs DT:** ARDT should produce lower exploitability when tested against Nash opponents, especially when trained on mixed (Nash + exploitable) opponent data.\n- **ARDT vs known Nash:** On Kuhn Poker, ARDT's extracted strategy should be within 50 mbb/h of Nash exploitability. (If it's zero, that's remarkable and matches the paper's claims for full-coverage settings.)\n- **LLM exploitability:** An honest comparison \u2014 the LLM will likely have HIGHER exploitability than any trained model. The interesting finding is WHERE it fails (e.g., suboptimal bluffing frequency, failure to adapt).\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Survey Skim + Cross-References\n\n- **Reference skim:** Kumar et al. (2020) \u2014 CQL Sections 1\u20133  \n  *Understand the value-based offline RL alternative: CQL penalizes Q-values for unseen actions (pessimism principle). Compare with DT's sequence modeling approach. When is CQL better than DT? (Answer from Paster et al.: CQL handles stochasticity better because it doesn't condition on return.)*\n\n- **Supplementary skim:** Zhang et al. (2025) \u2014 \"Divide-Fuse-Conquer\"  \n  https://arxiv.org/abs/2505.16401  \n  *Skim Section 3: the divide-fuse-conquer pipeline for LLM game training. Note: they use TextArena as testbed. How does their Qwen2.5-32B compare to the Claude/GPT models on the leaderboard?*\n\n- **Supplementary skim:** Guo et al. (2023) \u2014 \"Suspicion-Agent\"  \n  https://arxiv.org/abs/2309.17277  \n  *Skim the planning module: how GPT-4 simulates other players' intentions. Connect to Step 7: explicit theory of mind via LLM vs explicit Bayesian opponent model \u2014 two implementations of the same concept.*\n\n- **Supplementary skim:** Maugin & Cazenave (2025) \u2014 \"SpinGPT\"  \n  *Skim for: how they combine LLM reasoning with CFR-based strategy. This is the most direct bridge between the formal game-solving track (Steps 2\u20136) and the LLM track (this step).*\n\n- **Forward scan:** Check arXiv for any new papers on Decision Transformer + games, or LLM agents + strategic reasoning, since the freshness scan at the start of this step.\n\n### Day 2 \u2014 PhD Mapping + One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 2] Kuhn Poker Nash equilibrium \u2192 [Step 12] used as ground truth to evaluate DT, ARDT, and LLM agents. The exact Nash solution is the benchmark that all other methods are measured against.\n    - [Step 3] CFR agent \u2192 [Step 12] used as DATA GENERATOR. The quality of DT training data depends on the quality of the generating agent. Near-Nash CFR data = high-quality offline data. Random data = low-quality.\n    - [Step 5] Deep CFR (neural equilibrium) \u2192 [Step 12] ARDT offers an ALTERNATIVE path to equilibrium strategies: instead of iterating CFR with neural networks, just do supervised learning on an offline game dataset with adversarially robust conditioning. Same destination, different road.\n    - [Step 7] Bayesian opponent model \u2192 [Step 12] LLM agents do implicit opponent modeling via in-context reasoning. Same function (infer opponent's state from behavior), radically different implementation (statistics vs language).\n    - [Step 8] Safe exploitation \u2192 [Step 12] ARDT's minimax conditioning is the offline RL analog of safe exploitation: play well against the WORST-CASE opponent. The safety guarantee transfers from online (Step 8) to offline (Step 12) settings.\n    - [Step 11] CICERO/Welfare Diplomacy \u2192 [Step 12] CICERO is the most complete LLM+game AI system. Step 11 analyzed the strategic planning component; Step 12 analyzes the language model component. Together, they give the full picture.\n    - [Step 12] Poker state tensor encoding \u2192 prediction: [Step 13] Same encoding applied to Playtech data. The DT pipeline is the PROTOTYPE for Step 13's real-world behavioral analysis pipeline.\n    - [Step 12] Paster et al. stochasticity warning \u2192 prediction: [Step 13] Must condition on decision EV, not outcome, when building the Playtech pipeline. Return-to-go conflates luck with skill in poker.\n  - **Confusions:**\n    - [Step 12] DT conditions on return-to-go, but in poker the return depends heavily on card deal (luck). Paster et al. say this means DT will fail. ARDT's fix (minimax conditioning) helps, but does it fully solve the problem? In Kuhn Poker (3 cards, tiny game), we can verify. In full poker (10^160 information sets), unclear. \u2192 PARTIALLY ADDRESSED (ARDT helps; full solution may need EV-based conditioning, deferred to Step 13)\n    - [Step 12] LLM agents understand game rules through language, but their strategic reasoning is inconsistent (sometimes optimal, sometimes terrible). Can we QUANTIFY when LLM reasoning is reliable? What game properties predict LLM success? \u2192 OPEN (TextArena evaluation may give partial answers)\n    - [Step 12] ARDT recovers Nash in full-coverage settings (Tang et al.'s claim). But offline poker data has PARTIAL coverage (not all states visited). How does ARDT degrade with partial coverage? \u2192 OPEN (tested on Kuhn, but Kuhn is too small to stress this)\n    - [Step 7\u219212] Bayesian opponent model (Step 7) is precise but requires explicit state representation and prior specification. LLM opponent model (Step 12) is flexible but imprecise and uncontrollable. Is there a principled way to COMBINE them? (e.g., LLM generates hypotheses, Bayesian model evaluates them) \u2192 OPEN (potentially novel contribution)\n    - [Step 5\u219212] Deep CFR iterates to equilibrium via self-play. ARDT reaches equilibrium from offline data without self-play. When would you prefer one over the other? \u2192 PARTIALLY ADDRESSED (ARDT needs offline data, Deep CFR needs a simulator. For real-world domains like Playtech where you HAVE data but NOT a perfect simulator, ARDT may be preferred.)\n\n## Exit Checklist\n\n- [ ] Decision Transformer trained on Kuhn Poker offline data with return conditioning validated\n- [ ] Stochasticity experiment completed: DT's luck-vs-skill confusion quantified\n- [ ] ARDT minimax conditioning implemented and tested (\ud83d\udd34 hand-coded loss function)\n- [ ] ARDT produces near-Nash play on Kuhn Poker (within 50 mbb/h exploitability)\n- [ ] TextArena LLM agent tested on at least one strategic game\n- [ ] LLM evaluation on Kuhn Poker: exploitability, bluff frequency, illegal moves, adaptation metrics computed\n- [ ] Comparison table completed: Nash CFR vs DT vs ARDT vs BC vs LLM\n- [ ] Poker state tensor encoding documented and verified (same encoding to be reused in Step 13)\n- [ ] Can explain from memory: Decision Transformer architecture (return-to-go conditioning, GPT-2 backbone)\n- [ ] Can explain from memory: why DT fails in stochastic environments (Paster et al. Theorem 2.1)\n- [ ] Can explain from memory: ARDT's minimax expectile regression and why it recovers Nash\n- [ ] Can explain from memory: strengths and limitations of LLM agents in strategic games\n- [ ] All \ud83d\udd34 components hand-coded (state encoding, ARDT loss function, LLM evaluation metrics)\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 2\u201311 + new confusions + PhD bridge notes)\n- [ ] PhD connection documented (state encoding \u2192 Step 13, ARDT \u2192 Contribution #2 offline path, comparison table \u2192 Contribution #3 prototype)\n- [ ] Step notes committed to repo\n",
  "step_13": "# Step 13 \u2014 Behavioral Analysis Pipelines + Real-World Data\n\n**Duration:** 14 days (Tier 2)  \n**Dependencies:** Step 7 (Opponent Modeling), Step 12 (Sequence Models + LLM Agents)  \n**Phase:** F \u2014 Data-Driven Approaches  \n\n### PhD Connection\n\nThis step is the PRACTICAL CORE of the thesis \u2014 it connects all theoretical work to real-world application:\n\n- **Contribution #1 (Behavioral Adaptation Framework):** The pipeline IS the framework:\n  - State tensor encoding \u2192 behavioral representation\n  - player2vec embeddings \u2192 style discovery (unsupervised)\n  - Bayesian player modeling (from Step 7) \u2192 online style refinement\n  - BC model \u2192 action prediction baseline\n  - Temporal analysis \u2192 style shift detection (future extension)\n  - Together: a complete framework for representing, classifying, and tracking player behavior from raw game data. This is directly publishable as a pipeline paper + Playtech case study.\n\n- **Contribution #2 (Multi-Agent Safe Exploitation):** The real-world data establishes the empirical basis:\n  - The gap between real player behavior and GTO play (measured here) is the EXPLOITATION OPPORTUNITY.\n  - Step 8's safe exploitation theory + Step 13's behavioral pipeline = a complete SYSTEM: detect opponent weakness from data \u2192 exploit it safely.\n  - In the N-player setting (6-max tables): the multi-player modeling challenges from Steps 9\u201311 meet real data.\n\n- **Contribution #3 (Evaluation Methodology):** The collusion detection module is a direct contribution:\n  - Collusion detection in online poker is an OPEN PROBLEM with very few published solutions.\n  - Your approach (co-occurrence analysis + chip dumping + soft play + player2vec-based anomaly detection) combines techniques from Steps 7, 11, and 12 into a novel detection pipeline.\n  - This is directly relevant to the fraud/risk career path (5/5 fraud job postings map to Steps 7, 8, 13).\n  - Playtech co-authorship potential: if the detection pipeline finds real anomalies in Playtech data, the resulting paper has both academic and industry value.\n\n- **Bridge to Step 14:** The evaluation metrics developed here (action prediction accuracy, style classification accuracy, collusion detection precision/recall) feed into the formal evaluation framework of Step 14. Step 14 asks \"how do we evaluate agents?\" \u2014 Step 13 provides the real-world data benchmark.\n\n- **November publication target:** Step 13's pipeline + Playtech case study is the STRONGEST candidate for the first publication. It combines: (a) novel methodology (player2vec for poker + collusion detection), (b) real-world data (Playtech), (c) practical value (iGaming industry), (d) accessible framing (fraud detection). A paper titled \"Behavioral Analysis and Collusion Detection in Online Poker via Transformer-Based Player Embeddings\" would be suitable for IEEE Transactions on Games, AAAI Workshop on AI for Social Good, or a similar venue.\n\n---\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Videos](#videos)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Playtech Data Familiarization + Parsing](#day-1-playtech-data-familiarization-parsing)\n  - [Day 2: Feature Engineering + Initial Statistics](#day-2-feature-engineering-initial-statistics)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Paper 1: Wang, Honari-Jahromi, Katsarou, Mikheeva, Panagiotakopoulos, Asadi & Smirnov \u2014 \"player2vec: A Language Modeling Approach to Understand Player Behavior in Games\" (2024)](#paper-1-wang-honari-jahromi-katsarou-mikheeva-panagiotakopoulos-asadi-smirnov-player2vec-a-language-modeling-approach-to-understand-player-behavior-in-games-2024)\n  - [Paper 2: Kumar, Hong, Singh & Levine \u2014 \"When Should We Prefer Offline Reinforcement Learning Over Behavioral Cloning?\" (2022, ICLR)](#paper-2-kumar-hong-singh-levine-when-should-we-prefer-offline-reinforcement-learning-over-behavioral-cloning-2022-iclr)\n  - [Paper 3: DeLong & Bhatt \u2014 \"Towards Collusion Detection in Poker\" (2020)](#paper-3-delong-bhatt-towards-collusion-detection-in-poker-2020)\n  - [Paper 4: Yan & Browne \u2014 \"Collusion Detection in Online Poker\" (2016)](#paper-4-yan-browne-collusion-detection-in-online-poker-2016)\n  - [Paper 5: Southey, Bowling, Larson, Piccione, Burch, Billings & Rayner \u2014 \"Bayes' Bluff: Opponent Modelling in Poker\" (2005)](#paper-5-southey-bowling-larson-piccione-burch-billings-rayner-bayes-bluff-opponent-modelling-in-poker-2005)\n  - [Supplementary Reading (skim as time permits):](#supplementary-reading-skim-as-time-permits)\n  - [Math Flags:](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: Playtech Behavioral Analysis Pipeline \u2014 From Hand Histories to Player Profiles, Style Classification, and Collusion Detection](#project-playtech-behavioral-analysis-pipeline-from-hand-histories-to-player-profiles-style-classification-and-collusion-detection)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Survey Skim + Cross-References](#day-1-survey-skim-cross-references)\n  - [Day 2 \u2014 PhD Mapping + One-Pager + Learning Log](#day-2-phd-mapping-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY real-world behavioral data is different from simulated data (and harder), WHAT you can extract from poker hand histories (player styles, anomalies, collusion signals), and HOW this connects everything from Steps 7\u201312 into a practical pipeline. The key mental shift: in Steps 2\u201311, you've been building game solvers and opponent models. Now you flip the perspective \u2014 instead of computing WHAT the optimal strategy is, you analyze WHAT actual humans DO, and use the gap between their behavior and theory to classify, model, and detect anomalies.\n\nEnd of day: you should be able to explain to a non-expert: \"Online poker sites like Playtech record every hand played \u2014 who bet, how much, who folded, who won. That's millions of hands. From this data, we can learn: (1) what kind of player someone is \u2014 aggressive vs passive, loose vs tight, predictable vs erratic; (2) whether someone is playing suspiciously \u2014 maybe two accounts are controlled by the same person and they're helping each other at the same table (collusion); and (3) whether a bot is playing instead of a human, because bots behave with inhuman consistency. To do all this, we need a DATA PIPELINE that converts raw hand histories into structured tensors, trains models on them, and flags anomalies. That pipeline is what this step builds.\"\n\n### Videos\n\n- **StatQuest: K-means clustering**  \n  https://www.youtube.com/watch?v=4b5d3muPQmA  \n  Duration: ~9m | Channel: StatQuest with Josh Starmer  \n  *Intuitive visual explanation of k-means clustering \u2014 the core unsupervised method used for player style classification. Covers the algorithm, picking K via elbow plots, and applications to multidimensional data.*\n\n- **Bayes theorem, the geometry of changing beliefs**  \n  https://www.youtube.com/watch?v=HZGCoVF3YvM  \n  Duration: ~15m | Channel: 3Blue1Brown  \n  *The Bayesian inference backbone of player type classification. Prior beliefs about player types, updated by observed actions, converging to a posterior \u2014 exactly the player modeling pipeline.*\n\n- **Stanford CS224R \u2014 Lecture 2: Imitation Learning (Spring 2025)**  \n  https://www.youtube.com/watch?v=WxRDyObrm_M  \n  Duration: ~1h7m | Instructor: Chelsea Finn (Stanford)  \n  *Behavioral cloning and learning from demonstrations. The same paradigm used for modeling player behavior from hand histories \u2014 predict what the player did from the game state.*\n\n- **Stanford CS224R \u2014 Lecture 7: Offline RL (Spring 2025)**  \n  https://www.youtube.com/watch?v=lRDaXnPIzks  \n  Duration: ~1h8m | Instructor: Chelsea Finn (Stanford)  \n  *Learning from static behavioral datasets without environment interaction. Directly relevant to learning from hand history logs: the key challenges of distribution shift and data quality.*\n\n- **Stanford CS230 \u2014 Lecture 3: Full Cycle of a DL Project (Autumn 2025)**  \n  https://www.youtube.com/watch?v=MGqQuQEUXhk  \n  Duration: ~1h7m | Instructor: Andrew Ng (Stanford)  \n  *End-to-end machine learning project pipeline: data collection, feature engineering, model training, evaluation, deployment. The practical pipeline discipline needed for real-world behavioral analysis.*\n\n### Blog Posts / Accessible Reads\n\n- **Playtech internal documentation (if accessible)**  \n  *Your Playtech connection gives you access to anonymized hand histories. Before touching the data, understand: what format is it in? What fields are available? Are there privacy constraints? What's the data volume per day/week?*\n\n- **PokerTracker / Hold'em Manager documentation**  \n  https://www.pokertracker.com/ | https://www.holdemmanager.com/  \n  *These are the most popular player tracking tools used by commercial poker players. They extract exactly the player statistics (VPIP, PFR, AF, WTSD, W$SD, etc.) that define player styles. Read their stat definitions \u2014 these are the feature engineering targets for your pipeline.*\n\n- **Wikipedia \u2014 \"Online poker collusion\"**  \n  https://en.wikipedia.org/wiki/Cheating_in_online_poker  \n  *Overview of collusion types: information sharing (signaling hole cards), chip dumping (intentionally losing to a partner), soft play (not betting against a partner). Each collusion type produces specific statistical signatures you can detect.*\n\n- **2+2 Forums \u2014 \"Bot detection and collusion\" discussions**  \n  https://forumserver.twoplustwo.com/  \n  *Community wisdom on collusion and bot indicators. Practitioners often describe subtle signals (timing tells, bet sizing patterns, session co-occurrence) that don't appear in academic papers. Skim a few threads for feature engineering ideas.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Understanding UMAP](https://pair-code.github.io/understanding-umap/)** \u2014 Interactive visualization tool for UMAP to build intuition on how behavioral sequences get clustered into 2D spaces.\n\n\n### Day 1: Playtech Data Familiarization + Parsing\n\n1. **Obtain and inspect Playtech data:**\n   - Work with your Playtech contact to get a dataset of anonymized hand histories\n   - Target: ~50K\u2013100K hands from cash game tables (6-max or full-ring)\n   - **Inspect the raw format:**\n     ```python\n     import pandas as pd\n     \n     # Load a sample of hand histories\n     # Format will depend on Playtech's export \u2014 likely CSV, JSON, or proprietary\n     sample = pd.read_csv('playtech_hands_sample.csv')  # or equivalent\n     print(sample.columns.tolist())\n     print(sample.head(10))\n     print(f\"Total hands: {len(sample)}\")\n     print(f\"Unique players: {sample['player_id'].nunique()}\")\n     print(f\"Date range: {sample['timestamp'].min()} to {sample['timestamp'].max()}\")\n     ```\n   - **Key questions to answer:**\n     - How many hands per player on average?\n     - What's the distribution of table sizes? (2-max, 6-max, 9-max)\n     - What stakes are covered?\n     - Are there enough hands per player for meaningful modeling? (Rule of thumb: need 500+ hands for stable statistics)\n   - **Privacy checklist:** Ensure all player IDs are anonymized (no real identifiers), confirm with Playtech that this data use is approved for academic research\n\n2. **Build the hand history parser:**\n   - \ud83d\udd34 HAND-CODE the parser \u2014 this is thesis-critical infrastructure:\n     ```python\n     clas
