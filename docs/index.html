come training data. The MCCFR logic is identical to Step 3, but now the strategy comes from the neural network instead of a table. |\n| Reservoir sampling memory buffer | \ud83d\udfe1 AI-ASSISTED | Reservoir sampling is a well-known algorithm (Vitter 1985). AI drafts it, you verify correctness \u2014 that each element has equal probability of being in the buffer. |\n| Strategy network (average policy distillation) | \ud83d\udfe1 AI-ASSISTED | Second network that learns the average of all advantage network predictions. Follows the same pattern as the advantage network but with different training data (strategies instead of advantages). |\n| NFSP implementation for comparison | \ud83d\udfe1 AI-ASSISTED | You already understand the architecture from the paper. AI drafts the DQN + supervised learning pipeline, you review and verify convergence. The value is in comparing against Deep CFR, not in rebuilding DQN from scratch (done in Step 1). |\n| Training loop, hyperparameter search, logging | \ud83d\udfe2 AI-GENERATED | Standard PyTorch training plumbing. |\n| Comparison plots (Deep CFR vs MCCFR vs NFSP) | \ud83d\udfe2 AI-GENERATED | Matplotlib visualizations. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 State Encoding + Advantage Network:**\n- \ud83d\udd34 Design the Leduc information state tensor:\n  - Hand card: one-hot (3 values for J/Q/K, or 6 if tracking suits)\n  - Community card: one-hot (3 values + \"not yet revealed\")\n  - Action history: fixed-length encoding (sequence of actions, padded)\n  - Pot size: normalized float\n  - Total: ~20-30 dimensional input vector\n- \ud83d\udd34 Build the advantage network:\n  - Input: info state tensor (dim ~25)\n  - Hidden: 2 layers of 64 units, ReLU activation\n  - Output: CF value per action (dim = num_actions, typically 3: fold/call/raise)\n  - Loss: MSE between predicted CF values and sampled CF values from MCCFR traversal\n  - One network per player (2 total)\n\n**Days 2\u20133 \u2014 MCCFR Traversal \u2192 Neural Training Loop:**\n- \ud83d\udd34 Implement the Deep CFR training loop:\n  1. For each iteration t = 1, ..., T:\n     a. For player p = 1, 2:\n        - Run external-sampling MCCFR traversal using current advantage network's predictions as the strategy\n        - Collect (info_state, sampled_CF_values) pairs\n        - Store pairs in player p's reservoir buffer\n     b. Train each player's advantage network on its reservoir buffer for E epochs\n  2. After all T iterations, train the strategy network on the collected average strategies\n- \ud83d\udfe1 AI-ASSISTED: Reservoir sampling buffer (ensure uniform-at-random retention)\n- Run on Kuhn first (should converge quickly \u2014 small game validates the pipeline)\n- Run on Leduc \u2014 compare exploitability against tabular MCCFR at [100, 500, 1000, 5000] MCCFR iterations vs [10, 50, 100, 200] Deep CFR iterations\n\n**Day 4 \u2014 Strategy Network + NFSP:**\n- \ud83d\udfe1 AI-ASSISTED: Strategy network \u2014 a separate MLP trained on (info_state, average_strategy) pairs. This is the OUTPUT of Deep CFR: the Nash approximation.\n- \ud83d\udfe1 AI-ASSISTED: NFSP implementation for Leduc:\n  - Best-response network: DQN (from Step 1 knowledge) trained via self-play\n  - Average-policy network: supervised learning on replay buffer\n  - Anticipatory parameter \u03b7 = 0.1\n- Run NFSP for 100k episodes, measure exploitability every 10k\n\n**Day 5 \u2014 Comparison + GPU Profiling:**\n- Run full comparison on Leduc:\n  | Method | Exploitability | Training Time | Memory |\n  |--------|---------------|---------------|--------|\n  | Tabular MCCFR (Step 3, 50k iter) | baseline | ? | ? |\n  | Deep CFR (100 outer iter) | ? | ? | ? |\n  | NFSP (100k episodes) | ? | ? | ? |\n  \n- Generate convergence plots: exploitability vs training iterations, exploitability vs wall time\n- GPU profiling: this is the first step using GPU. Monitor:\n  - GPU utilization during training\n  - Memory usage per network\n  - Training throughput (samples/second)\n  - *Log these numbers \u2014 they inform compute budget planning for Steps 6+*\n- If available: try extending to a larger game (e.g., Extended Leduc from Step 4) and observe how Deep CFR handles it without explicit abstraction\n\n**Day 6 \u2014 Validation + Documentation:**\n- Cross-validate against OpenSpiel's Deep CFR:\n  - Run OpenSpiel Deep CFR on Leduc with matching hyperparameters\n  - Compare exploitability and strategy probabilities at specific info states\n  - Should agree within ~20% (neural methods have inherent variance)\n- Run ablation: what happens if you remove reservoir sampling and just use all data? (Answer: the strategy network overfits to later iterations)\n- Document: which method would you choose for Leduc-scale games? For NLHE-scale?\n\n### Deliverables:\n- [ ] Information state tensor encoding for Leduc (reusable in Steps 6\u20138)\n- [ ] Deep CFR implementation: advantage networks (2) + strategy network + reservoir sampling + MCCFR traversal\n- [ ] NFSP implementation for comparison\n- [ ] Convergence comparison: Deep CFR vs tabular MCCFR vs NFSP (exploitability + wall time)\n- [ ] GPU profiling report (utilization, memory, throughput)\n- [ ] All code committed with README\n\n### Validation:\n- **Deep CFR on Kuhn:** Should reach exploitability < 0.01 within 50 iterations. Strategy should match Step 2/3 Nash closely.\n- **Deep CFR on Leduc:** Should reach exploitability < 0.1 within 100 iterations. Better than NFSP at equivalent training time.\n- **NFSP on Leduc:** Should converge to exploitability < 0.2 within 100k episodes. Slower but less precise than Deep CFR.\n- **Cross-validation:** OpenSpiel Deep CFR and your implementation should produce strategies with exploitability within 50% of each other on Leduc (neural stochasticity makes exact matching impossible, but order-of-magnitude should match).\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Reference Skim + Gap Fill\n\n- **Reference skim (paper):** Rudolph et al. (2025) \"Reevaluating Policy Gradient Methods for IIGs\" \u2014 read abstract + Section 3 (experiments) + Table 1. *Critical perspective: if naive policy gradient CAN work in IIGs (which this paper argues), what's the TRUE value of Deep CFR over simpler RL approaches? This shapes your thesis methodology decisions.*\n\n- **Reference skim (paper):** Xu et al. (2025) \"Deep Predictive Discounted CFR\" \u2014 read abstract + Section 3. Note: uses discounted regret (from DCFR/LCFR) combined with predictive targets. Could provide a minor implementation improvement. *Forward preview for Step 6.*\n\n- **Forward preview:** Skim Brown et al. (2020) \"Combining Deep RL and Search for Imperfect-Information Games\" (ReBeL) abstract. *You'll read this fully in Step 6, but see how it builds on value networks similar to Deep CFR.*\n\n- **Forward preview:** Skim Schmid et al. (2023) \"Student of Games\" abstract. *See how Growing-Tree CFR (GT-CFR) extends the Deep CFR paradigm to both perfect and imperfect info games.*\n\n### Day 2 \u2014 One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 1] DQN (S&B Ch 9 + Mnih 2015) \u2192 [Step 5] NFSP uses DQN as its best-response learner. The same replay buffer + target network architecture from Atari now computes best responses in poker.\n    - [Step 1] Neural network function approximation \u2192 [Step 5] Deep CFR replaces tabular regret storage with MLP advantage networks. Same principle: when the state space is too large for a table, learn a function instead.\n    - [Step 3] External-sampling MCCFR \u2192 [Step 5] Deep CFR's traversal is IDENTICAL to external-sampling MCCFR, except the strategy at each info state comes from the advantage network instead of a regret table. Same sampling, different lookup mechanism.\n    - [Step 3] VR-MCCFR baseline subtraction \u2192 [Step 5] DREAM uses similar baseline subtraction for variance reduction. Step 3's optional paper is now directly relevant.\n    - [Step 4] Hand-crafted abstraction \u2192 [Step 5] Deep CFR's neural approximation REPLACES explicit abstraction. Instead of grouping states by hand, the network learns which states are similar by training on CF values. This is the progression: manual compression (Step 4) \u2192 learned compression (Step 5).\n    - [Step 5] Advantage networks predict counterfactual values at each info state \u2192 prediction: [Step 6] DeepStack's value network does the SAME thing but at the depth-limit boundary of a search tree.\n  - **Confusions:**\n    - [Step 5] Deep CFR trains advantage networks iteratively \u2014 network from iteration t uses strategy from iteration t-1. But each network is trained from scratch on the reservoir buffer, not fine-tuned. Why? Wouldn't fine-tuning be faster? \u2192 OPEN (hypothesis: fresh training prevents catastrophic forgetting of early iteration data)\n    - [Step 5] NFSP's anticipatory parameter \u03b7 = 0.1 works for Leduc. Would the same \u03b7 work for larger games? How to tune it? \u2192 OPEN (check in Step 6 when analyzing Pluribus/ReBeL)\n    - [Step 3\u21925] Deep CFR uses external sampling (traverse all own actions, sample opponent). DREAM uses outcome sampling. My Step 3 confusion about external vs outcome sampling tradeoffs now has a concrete answer: in the NEURAL setting, outcome sampling is better because the network generalizes across unvisited states. \u2192 PARTIALLY RESOLVED by Step 5\n\n## Exit Checklist\n\n- [ ] Deep CFR implementation working and producing convergent strategies on Leduc\n- [ ] NFSP implementation working and producing convergent strategies on Leduc\n- [ ] Convergence comparison completed: Deep CFR vs tabular MCCFR vs NFSP\n- [ ] Can explain from memory: how advantage networks replace tabular regret (the loss function, the training loop)\n- [ ] Can explain from memory: difference between Deep CFR and NFSP architectures\n- [ ] Can explain from memory: role of reservoir sampling in Deep CFR\n- [ ] GPU profiling completed (know the compute cost of neural methods)\n- [ ] Information state encoding designed and documented (reusable for Steps 6\u20138)\n- [ ] Cross-validated against OpenSpiel's Deep CFR\n- [ ] All \ud83d\udd34 components hand-coded\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 1\u20134 + new confusions + resolved confusions)\n- [ ] Step notes committed to repo\n",
  "step_06": "# Step 6 \u2014 End-to-End Game AI Architectures (Pluribus \u2192 ReBeL \u2192 Student of Games)\n\n**Duration:** 21 days (Tier 1)  \n**Dependencies:** Step 3 (CFR Variants + MC Methods), Step 4 (Game Abstraction + Scaling), Step 5 (Neural Equilibrium Approximation)  \n**Phase:** C \u2014 Neural Methods for Games  \n\n### PhD Connection\n\nThis step is the **architectural foundation** for the entire thesis. Every subsequent step (7\u201315) builds on the systems studied here:\n- **Contribution #1 (Behavioral Adaptation Framework):** ReBeL's PBS representation provides the starting point. Your thesis extends PBS to include beliefs about opponent strategy types, creating a richer state representation for adaptive play. DeepStack's continual re-solving provides the template for real-time strategy adjustment.\n- **Contribution #2 (Multi-Agent Safe Exploitation):** Pluribus demonstrates that Nash-based approaches work empirically for N-player games but provides NO safety guarantee. This gap is your thesis contribution. The theoretical tools from Steps 4 (subgame solving safety) and 6 (depth-limited solving bounds) provide the starting point for developing N-player guarantees.\n- **Contribution #3 (Evaluation Methodology):** The exploitability metric used across ALL five systems is the evaluation backbone. Student of Games' unified framework for perfect + imperfect info provides the template for a domain-agnostic evaluation framework.\n\n---\n\n## Table of Contents\n- [Phase 1: Intuition (2 days)](#phase-1-intuition-2-days)\n  - [Day 1: The Poker AI Progression (DeepStack \u2192 Libratus \u2192 Pluribus)](#day-1-the-poker-ai-progression-deepstack-libratus-pluribus)\n  - [Day 2: The Unification Progression (ReBeL \u2192 Student of Games)](#day-2-the-unification-progression-rebel-student-of-games)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Architecture Mapping \u2014 Draw Before You Code](#day-1-architecture-mapping-draw-before-you-code)\n  - [Day 2: Run Existing Implementations](#day-2-run-existing-implementations)\n- [Phase 3: Targeted Reading (4 days)](#phase-3-targeted-reading-4-days)\n  - [Paper 1: Moravcik et al. \u2014 \"DeepStack: Expert-Level Artificial Intelligence in Heads-Up No-Limit Poker\" (2017)](#paper-1-moravcik-et-al-deepstack-expert-level-artificial-intelligence-in-heads-up-no-limit-poker-2017)\n  - [Paper 2: Brown & Sandholm \u2014 \"Superhuman AI for Heads-Up No-Limit Poker: Libratus Beats Top Professionals\" (2018)](#paper-2-brown-sandholm-superhuman-ai-for-heads-up-no-limit-poker-libratus-beats-top-professionals-2018)\n  - [Paper 3: Brown & Sandholm \u2014 \"Superhuman AI for Multiplayer Poker\" (Pluribus, 2019)](#paper-3-brown-sandholm-superhuman-ai-for-multiplayer-poker-pluribus-2019)\n  - [Paper 4: Brown, Bakhtin, Lerer & Hu \u2014 \"Combining Deep Reinforcement Learning and Search for Imperfect-Information Games\" (ReBeL, 2020)](#paper-4-brown-bakhtin-lerer-hu-combining-deep-reinforcement-learning-and-search-for-imperfect-information-games-rebel-2020)\n  - [Paper 5: Schmid et al. \u2014 \"Student of Games: A Unified Learning Algorithm for Both Perfect and Imperfect Information Games\" (2023)](#paper-5-schmid-et-al-student-of-games-a-unified-learning-algorithm-for-both-perfect-and-imperfect-information-games-2023)\n  - [Paper 6: Brown & Sandholm \u2014 \"Depth-Limited Solving for Imperfect-Information Games\" (2018)](#paper-6-brown-sandholm-depth-limited-solving-for-imperfect-information-games-2018)\n  - [Supplementary References](#supplementary-references)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (10 days)](#phase-4-implementation-10-days)\n  - [Project: ReBeL-Lite for Leduc Hold'em + Architecture Comparison Framework](#project-rebel-lite-for-leduc-holdem-architecture-comparison-framework)\n  - [Sub-phase Breakdown (10 days):](#sub-phase-breakdown-10-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (3 days)](#phase-5-consolidation-3-days)\n  - [Day 1 \u2014 Book Chapter Skim + Supplementary Papers](#day-1-book-chapter-skim-supplementary-papers)\n  - [Day 2 \u2014 Architecture Synthesis + PhD Mapping](#day-2-architecture-synthesis-phd-mapping)\n  - [Day 3 \u2014 One-Pager + Learning Log](#day-3-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (2 days)\n\nThe goal: understand the EVOLUTION of game-solving architectures and WHY each system exists. This isn't about memorizing papers \u2014 it's about understanding a 7-year design progression:\n- **DeepStack (2017):** \"What if we use neural networks to estimate values at the bottom of a search tree, like AlphaGo but for poker?\"\n- **Libratus (2017):** \"What if we compute a coarse blueprint strategy offline, then refine it in real-time for specific situations?\"\n- **Pluribus (2019):** \"What if we extend this to 6 players, where Nash equilibrium doesn't even technically apply?\"\n- **ReBeL (2020):** \"What if we unify search and learning into a single framework, like AlphaZero but for imperfect info?\"\n- **Student of Games (2023):** \"What if we unify PERFECT and IMPERFECT information games in ONE algorithm?\"\n\nEnd of phase: you should be able to draw the architecture diagram of each system and explain how component A of system N became component B of system N+1.\n\n### Day 1: The Poker AI Progression (DeepStack \u2192 Libratus \u2192 Pluribus)\n\n- **How DeepMind Conquered Go With Deep Learning (AlphaGo) \u2014 Two Minute Papers #42**  \n  https://www.youtube.com/watch?v=IFmj5M5Q5jg  \n  Duration: ~3m | Channel: Two Minute Papers  \n  *Quick accessible intro to the AlphaGo paradigm: deep learning + Monte Carlo tree search. The perfect-information template that ReBeL and Student of Games later extend to imperfect information.*\n\n- **AlphaZero: Shedding new light on the grand games of chess, shogi and Go**  \n  https://www.youtube.com/watch?v=7L2sUGcOgh0  \n  Duration: ~5m | Channel: DeepMind  \n  *Short overview of AlphaZero's self-play paradigm: learning from scratch, no human knowledge, mastering chess/shogi/Go in hours. The architecture all poker AI systems build upon.*\n\n- **AI for Imperfect-Information Games: Beating Top Humans in No-Limit Poker**  \n  https://www.youtube.com/watch?v=McV4a6umbAY  \n  Duration: ~1h | Speaker: Noam Brown | Channel: Microsoft Research  \n  *Full Libratus/DeepStack/Pluribus architecture walkthrough: blueprint computation, abstraction, subgame solving, and the three-module system that beat top professionals.*\n\n### Day 2: The Unification Progression (ReBeL \u2192 Student of Games)\n\n- **Combining Deep Reinforcement Learning and Search for Imperfect-Information Games (ReBeL)**  \n  https://www.youtube.com/watch?v=mCldyXOYNok  \n  Duration: ~35m | Speaker: Noam Brown  \n  *Brown presents ReBeL: the first algorithm that treats imperfect-info game solving like AlphaZero treats chess. Public belief states + CFR at leaf nodes + learned value network.*\n\n- **Player of Games: All the games, one algorithm! (w/ author Martin Schmid)**  \n  https://www.youtube.com/watch?v=U0mxx7AoNz0  \n  Duration: ~54m | Channel: Yannic Kilcher  \n  *Interview with the Student of Games author. Covers how one algorithm handles both perfect-info (Go, chess) AND imperfect-info (poker, Scotland Yard) games.*\n\n### Blog Posts / Accessible Reads\n\n- **Science Magazine \u2014 \"Superhuman AI for multiplayer poker\" (Brown & Sandholm, 2019)**  \n  https://www.science.org/doi/10.1126/science.aay2400  \n  *Pluribus paper in Science. Read first 3 pages for the accessible overview of the 6-player architecture.*\n\n- **Science Advances \u2014 \"Student of Games\" (Schmid et al., 2023)**  \n  https://www.science.org/doi/10.1126/sciadv.adg3256  \n  *The Student of Games Science Advances publication. Read the introduction for the unification argument.*\n\n- **Meta AI Blog \u2014 \"ReBeL: Combining deep reinforcement learning and search\" (2020)**  \n  https://ai.meta.com/blog/rebel-a-general-game-playing-ai-bot-that-excels-at-poker-and-more/  \n  *Accessible explanation of ReBeL with diagrams.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Emergent Behavior Interactive](https://ncase.me/crowds/)** \u2014 Understand complex system behavior that occurs when AI mechanisms (like solvers and neural nets) are combined and run end-to-end.\n\n\n### Day 1: Architecture Mapping \u2014 Draw Before You Code\n\nThis step has MORE reading and LESS coding than previous steps. The value is in understanding system DESIGN, not algorithm implementation. Day 1 is a design exercise.\n\n1. **Draw the architecture diagram for each system (pen and paper or digital):**\n   \n   For each system, draw a box diagram showing:\n   - Offline components (computed before play)\n   - Online components (computed during play)\n   - The flow between them\n   - Where neural networks appear\n   - Where CFR/MCCFR appears\n   - Where search appears\n   \n   **DeepStack:**\n   ```\n   [Training phase: Generate random poker situations \u2192 Solve with CFR \u2192 \n    Train value network to predict solution values] \u2192\n   [Play phase: At each decision \u2192 Build local subgame \u2192 Use value network \n    at depth limit \u2192 Solve subgame with CFR \u2192 Act]\n   ```\n   \n   **Libratus:**\n   ```\n   [Offline: Abstract NLHE \u2192 Solve with MCCFR \u2192 Blueprint strategy] \u2192\n   [Play phase: Follow blueprint UNLESS at key decision \u2192 \n    Subgame solve (real-time CFR with safety guarantee) \u2192 Act] \u2192\n   [Post-session: Self-improvement \u2014 fix blueprint weaknesses found during play]\n   ```\n   \n   **Pluribus:**\n   ```\n   [Offline: Abstract 6-max NLHE \u2192 Solve with MCCFR \u2192 Blueprint] \u2192\n   [Play phase: Follow blueprint OR depth-limited search with \n    modified RBP (Real-time Blueprint Pruning) \u2192 Act]\n   ```\n   \n   **ReBeL:**\n   ```\n   [Training loop (like AlphaZero): \n    Self-play using public belief states (PBS) \u2192 \n    Generate (PBS, value) training pairs \u2192\n    Train value network on PBS \u2192 Repeat] \u2192\n   [Play phase: Search over PBS tree using trained value network]\n   ```\n   \n   **Student of Games:**\n   ```\n   [Training: Growing-Tree CFR (GT-CFR) \u2014 grow game tree incrementally \u2192\n    Train value + policy networks on GT-CFR data \u2192\n    Use networks to guide further GT-CFR tree growth \u2192 Repeat] \u2192\n   [Play phase: Search using trained networks (works for perfect AND imperfect info)]\n   ```\n\n2. **Create a comparison table (fill in from videos + papers):**\n   | Feature | DeepStack | Libratus | Pluribus | ReBeL | Student of Games |\n   |---------|-----------|----------|----------|-------|-----------------|\n   | Year | 2017 | 2017 | 2019 | 2020 | 2023 |\n   | Players | 2 | 2 | 6 | 2+ | 2+ |\n   | Game type | HUNL | HUNL | 6-max NL | Any IIG | Any game |\n   | Blueprint | No (online) | Yes (offline) | Yes (offline) | No (learned) | No (learned) |\n   | Neural component | Value net | None | None | Value net | Value + policy |\n   | Search component | CFR re-solve | Subgame solve | Depth-limited | PBS search | GT-CFR search |\n   | Abstraction | No | Yes | Yes | No | No |\n   | Perfect info too? | No | No | No | No | **Yes** |\n\n### Day 2: Run Existing Implementations\n\n1. **OpenSpiel: Explore available architectures:**\n   ```python\n   import pyspiel\n   \n   # Check what IIG algorithms are available\n   print([g for g in dir(pyspiel) if 'game' in g.lower()])\n   \n   # Run CFR variants you know on different game sizes\n   # Compare solve time: Kuhn vs Leduc vs Liar's Dice\n   for game_name in [\"kuhn_poker\", \"leduc_poker\", \"liars_dice\"]:\n       game = pyspiel.load_game(game_name)\n       print(f\"{game_name}: {game.num_distinct_actions()} actions, \"\n             f\"info state shape: {game.information_state_tensor_shape()}\")\n   ```\n\n2. **If a ReBeL or Student of Games implementation is available in OpenSpiel or GitHub:**\n   - Run it on a small game\n   - Observe the training loop structure \u2014 how does it alternate between self-play and network training?\n   - *Note: Full implementations may not be publicly available. If so, read the released code (e.g., Facebook's ReBeL release: https://github.com/facebookresearch/rebel) and trace the architecture.*\n\n3. **Explore Liar's Dice as a new testbed:**\n   ```python\n   game = pyspiel.load_game(\"liars_dice\")\n   # Liar's Dice is larger than Leduc, has bluffing dynamics, \n   # and was used to evaluate DeepStack and Student of Games\n   ```\n   - Run your Step 3 MCCFR on Liar's Dice \u2014 observe convergence\n   - *This game is large enough to feel the limitations of tabular methods, motivating the architectures you're studying*\n\n4. **Questions to answer by end of Day 2:**\n   - What's the key architectural difference between DeepStack and Libratus? (online re-solving vs. offline blueprint)\n   - What problem does Pluribus solve that Libratus doesn't? (multi-player equilibrium)\n   - How does ReBeL avoid the need for abstraction or blueprints? (public belief states + learned values)\n   - What does Student of Games do that ReBeL doesn't? (unified framework for perfect AND imperfect info)\n\n---\n\n## Phase 3: Targeted Reading (4 days)\n\n### Paper 1: Moravcik et al. \u2014 \"DeepStack: Expert-Level Artificial Intelligence in Heads-Up No-Limit Poker\" (2017)\n\nhttps://arxiv.org/abs/1701.01724\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (Continual Re-Solving \u2014 how DeepStack operates without a \n\u2502          pre-computed blueprint by re-solving the game from scratch at each \n\u2502          decision point using a depth-limited lookahead),\n\u2502          Section 3 (Deep Counterfactual Value Networks \u2014 the neural networks \n\u2502          that estimate values at the depth limit of the search tree, trained \n\u2502          offline on random poker subgames),\n\u2502          Section 4 (Experiments \u2014 results against professional poker players)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the \"intuition + computation\" framing),\n\u2502          Section 5 (Discussion)\n\u251c\u2500\u2500 SKIP:  Supplementary material on hand histories (unless you want poker strategy analysis)\n\u251c\u2500\u2500 MATH:  \u2192 \"Equation 2 (Continual re-solving with value network) \u2014 understand \n\u2502             how the value network at depth d replaces a full subtree traversal.\n\u2502             This is the KEY architectural innovation: instead of computing Nash\n\u2502             for the ENTIRE game (impossible for NLHE), DeepStack computes Nash\n\u2502             for a SMALL subtree and uses the network for the 'rest of the game.'\n\u2502             Same idea as AlphaGo's value network, but adapted for imperfect info.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"DeepStack treats poker like a sequence of small, solvable games\n    stitched together by a value network. At each decision, it asks: 'If I solve\n    this local situation perfectly and use the network for everything beyond, \n    what's my best action?' No blueprint, no abstraction \u2014 just local solving\n    + learned evaluation.\"\n```\n\n### Paper 2: Brown & Sandholm \u2014 \"Superhuman AI for Heads-Up No-Limit Poker: Libratus Beats Top Professionals\" (2018)\n\n**Link:** https://www.science.org/doi/10.1126/science.aao1733  \nhttp://www.cs.cmu.edu/~noamb/papers/17-IJCAI-Libratus.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section: \"Blueprint computation\" (how Libratus uses abstracted MCCFR \n\u2502          to compute a coarse strategy for the entire game),\n\u2502          Section: \"Subgame solving\" (how Libratus improves the blueprint in \n\u2502          real-time at specific decision points \u2014 this uses the safe subgame \n\u2502          solving from Step 4's Brown & Sandholm 2017 paper),\n\u2502          Section: \"Self-improvement\" (the third module \u2014 post-session refinement\n\u2502          where Libratus identifies situations it handled poorly and re-solves them)\n\u251c\u2500\u2500 SKIM:  Introduction, Results section\n\u251c\u2500\u2500 SKIP:  Extended match details (human-interest reporting, not technical)\n\u251c\u2500\u2500 MATH:  \u2192 \"No new math beyond what you've seen in Steps 2\u20135. The innovation is \n\u2502             ARCHITECTURAL \u2014 how the three components (blueprint + subgame solve + \n\u2502             self-improve) compose into a system. Understand the data flow.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Libratus is a 3-module system where each module compensates for\n    the others' weaknesses: (1) blueprint handles the average case with abstraction,\n    (2) subgame solving fixes abstraction errors at specific decision points,\n    (3) self-improvement patches systematic weaknesses found during play. This\n    modular design principle recurs across all subsequent systems.\"\n```\n\n### Paper 3: Brown & Sandholm \u2014 \"Superhuman AI for Multiplayer Poker\" (Pluribus, 2019)\n\n**Link:** https://www.science.org/doi/10.1126/science.aay2400  \n**Alt link:** https://arxiv.org/abs/1911.07559 (extended version)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (Methods \u2014 the full 6-player architecture: MCCFR blueprint\n\u2502          with Linear CFR + depth-limited search with modified RBP),\n\u2502          Section 2.1 (Blueprint strategy \u2014 how MCCFR is adapted for 6 players:\n\u2502          use \"everyone vs. everyone\" training, not just player-vs-player),\n\u2502          Section 2.2 (Real-time search \u2014 how depth-limited search works when \n\u2502          Nash equilibrium is ILL-DEFINED for 6 players: Pluribus uses a \n\u2502          modified search that assumes opponents stick to the blueprint \n\u2502          beyond a certain depth)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 3 (Results \u2014 10,000 hands against professionals),\n\u2502          Section 4 (Discussion)\n\u251c\u2500\u2500 SKIP:  Supplementary hand analysis\n\u251c\u2500\u2500 MATH:  \u2192 \"Section 2.2 (Modified search for multiplayer) \u2014 understand the key\n\u2502             dilemma: in 2-player zero-sum, Nash equilibrium guarantees you can't\n\u2502             lose. In 6-player, there IS no single Nash equilibrium \u2014 opponents\n\u2502             can collude against you. Pluribus handles this pragmatically, not\n\u2502             theoretically: search assuming opponents follow blueprint, then\n\u2502             adapting. NOT proven safe \u2014 empirically effective.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Pluribus proves that Nash-equilibrium-based approaches work \n    empirically for multiplayer games even though they LACK theoretical \n    guarantees beyond 2-player zero-sum. This is important for your thesis:\n    extending safety guarantees to N-player settings (Contribution #2) is \n    an OPEN PROBLEM that Pluribus deliberately sidesteps.\"\n```\n\n### Paper 4: Brown, Bakhtin, Lerer & Hu \u2014 \"Combining Deep Reinforcement Learning and Search for Imperfect-Information Games\" (ReBeL, 2020)\n\nhttps://arxiv.org/abs/2007.13544 (NeurIPS 2020)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Public Belief States \u2014 THE key theoretical innovation: \n\u2502          representing the game state as a probability distribution over all \n\u2502          possible private information, conditioned on publicly observed actions.\n\u2502          This is what makes search in IIGs tractable without abstraction),\n\u2502          Section 4 (The ReBeL algorithm \u2014 the full training loop: generate \n\u2502          PBS values via CFR at leaf nodes, train a value network on (PBS, value)\n\u2502          pairs, use the trained network for deeper search. Exactly like AlphaZero\n\u2502          but with PBS instead of board states),\n\u2502          Section 5 (Experiments \u2014 Liar's Dice and HUNL results)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the AlphaZero parallel),\n\u2502          Section 2 (Background),\n\u2502          Section 6 (Discussion)\n\u251c\u2500\u2500 SKIP:  Appendix proofs (read theorem statements only)\n\u251c\u2500\u2500 MATH:  \u2192 \"Definition 1 (Public Belief State) \u2014 MUST understand. A PBS is a \n\u2502             vector of probabilities: for each possible private information \n\u2502             assignment (e.g., each possible hand), what's the probability of\n\u2502             that assignment given the publicly observed action history? This\n\u2502             is the state representation that makes imperfect-info search work.\n\u2502             It's the imperfect-info analog of a board position in chess.\"\n\u2502          \u2192 \"Theorem 1 (Sound PBS-based search) \u2014 read the STATEMENT. This \n\u2502             guarantees that searching over PBS space converges to a Nash \n\u2502             equilibrium. This is the theoretical foundation for ReBeL.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"ReBeL solves the holy grail problem: how to do AlphaZero-style\n    search in imperfect-information games. The answer is Public Belief States \u2014 \n    instead of searching over game positions (which are hidden in IIGs), search \n    over PROBABILITY DISTRIBUTIONS of what position you might be in. Combined \n    with CFR at leaf nodes and a learned value network, this enables search \n    without abstraction or blueprints.\"\n```\n\n### Paper 5: Schmid et al. \u2014 \"Student of Games: A Unified Learning Algorithm for Both Perfect and Imperfect Information Games\" (2023)\n\nhttps://arxiv.org/abs/2112.03178 (Science Advances 2023)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (Growing-Tree CFR \u2014 GT-CFR: the algorithm that incrementally\n\u2502          builds a game tree guided by policy networks, instead of requiring the\n\u2502          full tree. This is what enables combined perfect + imperfect info),\n\u2502          Section 3 (The Student of Games framework \u2014 how GT-CFR + value networks\n\u2502          + policy networks compose into a unified algorithm),\n\u2502          Section 4.2 (Imperfect-info experiments \u2014 poker and Scotland Yard results),\n\u2502          Section 4.3 (Perfect-info experiments \u2014 Go results)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the unification argument),\n\u2502          Section 4.1 (Setup),\n\u2502          Section 5 (Discussion)\n\u251c\u2500\u2500 SKIP:  Appendix details on Go training (not relevant to your thesis domain)\n\u251c\u2500\u2500 MATH:  \u2192 \"Algorithm 1 (GT-CFR) \u2014 trace the algorithm carefully. The key\n\u2502             difference from vanilla CFR: instead of traversing the ENTIRE tree,\n\u2502             GT-CFR grows the tree incrementally, guided by the policy network.\n\u2502             Where the tree hasn't been expanded, it uses value network estimates.\n\u2502             This is how it handles games too large for full traversal.\"\n\u2502          \u2192 \"Theorem 1 (Convergence of GT-CFR) \u2014 read statement only. Guarantees\n\u2502             that GT-CFR converges to Nash as the tree grows.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Student of Games unifies perfect-info (AlphaZero approach) and\n    imperfect-info (CFR approach) into ONE algorithm. For perfect-info subtrees,\n    it reduces to MCTS-like search. For imperfect-info, it reduces to CFR-like\n    iteration. The policy network decides WHERE to expand the tree, making it\n    efficient for both types. THIS is the generalization proof your professors want:\n    a single algorithm framework that subsumes both chess/Go AI and poker AI.\"\n```\n\n### Paper 6: Brown & Sandholm \u2014 \"Depth-Limited Solving for Imperfect-Information Games\" (2018)\n\nhttps://arxiv.org/abs/1805.08195 (NeurIPS 2018)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Depth-limited solving \u2014 the theoretical framework for \n\u2502          cutting off search at a fixed depth and using estimated leaf values.\n\u2502          Fundamental to ALL architectures above: DeepStack, Libratus, Pluribus,\n\u2502          ReBeL all use some form of depth-limited solving),\n\u2502          Section 4 (Using learned values at the depth limit \u2014 the connection\n\u2502          between this theoretical framework and neural value estimation)\n\u251c\u2500\u2500 SKIM:  Abstract, Sections 1\u20132, Section 5 (Experiments)\n\u251c\u2500\u2500 SKIP:  Convergence proofs (read statements)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Exploitability bound for depth-limited solving) \u2014 read\n\u2502             the STATEMENT. This bound is what tells you: 'if your value network\n\u2502             estimates are off by \u03b5, the full strategy's exploitability increases\n\u2502             by at most f(\u03b5).' This is the error propagation guarantee that makes\n\u2502             depth-limited search trustworthy. Critical for Step 8 (safe exploitation).\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Depth-limited solving is the UNIFYING theoretical concept across\n    all five architectures. Every system cuts off the game tree at some depth and \n    uses an estimate for 'everything beyond.' DeepStack uses a trained value \n    network. Libratus uses the blueprint. Pluribus uses the blueprint with \n    rollouts. ReBeL uses a learned PBS value. The theory in this paper is what \n    guarantees they all work.\"\n```\n\n### Supplementary References\n\n- **Milec, Kova\u0159\u00edk & Lis\u00fd (2025) \u2014 \"Adapting Beyond the Depth Limit\"**  \n  https://arxiv.org/abs/2501.10464  \n  *Studies opponent adaptation beyond the search depth. SKIM abstract + Section 3. Bridges Step 6 \u2192 Step 8 (safe exploitation). Key question: can depth-limited search-based systems adapt to sub-rational opponents while maintaining robustness?*\n\n- **Kub\u00ed\u010dek & Lis\u00fd (2023/2025) \u2014 \"Look-ahead Search on Top of Policy Networks in IIGs\"**  \n  https://arxiv.org/abs/2312.15220  \n  *Explores adding test-time search on top of policy networks trained via RL/CFR. SKIM abstract + Section 2. Relevant to the search-vs-learning tradeoff.*\n\n- **Zarick et al. (2020) \u2014 \"Unlocking the Potential of Deep Counterfactual Value Networks\"**  \n  https://arxiv.org/abs/2007.10442  \n  *Improvements to DeepStack-style value network training. SKIM for practical insights if implementing value networks.*\n\n### Math Flags\n\n\ud83d\udd22 **Public Belief State definition (Brown et al., ReBeL, Def. 1)** \u2014 Must understand fully.  \n**WHY this can't be substituted:** PBS is the core state representation for imperfect-info search. Your thesis (opponent modeling in Step 7) will likely need to track beliefs about opponent strategies \u2014 essentially, you're building a more nuanced PBS. If you don't understand the standard PBS definition, you can't extend it.\n\n\ud83d\udd22 **Depth-limited solving exploitability bound (Brown & Sandholm 2018, Theorem 1)** \u2014 Must understand the statement and what it depends on.  \n**WHY:** This bound quantifies how value network errors propagate to exploitability. For your thesis's safe exploitation component (Contribution #1), you need to know: if your opponent model is wrong by \u03b5, how much can you lose? This theorem provides the template for that analysis.\n\n\ud83d\udd22 **GT-CFR convergence (Schmid et al., Theorem 1)** \u2014 Read statement.  \n**WHY:** Student of Games is the most general framework in this step. Understanding its convergence guarantee tells you what conditions your thesis framework needs to satisfy.\n\n---\n\n## Phase 4: Implementation (10 days)\n\n### Project: ReBeL-Lite for Leduc Hold'em + Architecture Comparison Framework\n\nThis step's implementation is different from Steps 3\u20135. The primary output is UNDERSTANDING OF SYSTEM DESIGN, not just algorithmic implementation. The implementation focuses on ReBeL (the most general and instructive architecture) as a concrete case study, while the other architectures are studied through paper analysis and diagram construction.\n\n**Language + Framework:** Python 3.10+ / PyTorch\n\nStarting point: Your Leduc engine (Step 3) + Deep CFR (Step 5) + abstraction pipeline (Step 4).\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Public Belief State (PBS) representation + update logic | \ud83d\udd34 HAND-CODE | PBS is the core theoretical concept. You must understand: how to initialize a belief (uniform over possible hands), how to update it given observed actions (Bayesian update using action probabilities), and how to represent it as a tensor. This is YOUR thesis's belief representation foundation. |\n| PBS-based CFR at leaf nodes (mini-CFR solver within search) | \ud83d\udd34 HAND-CODE | ReBeL uses CFR to solve local subgames at search leaves. This connects Step 3's CFR to the search framework. You must hand-code this to understand how CFR operates WITHIN a search tree, not just on a complete game. |\n| PBS value network (predicts expected value given a public belief state) | \ud83d\udd34 HAND-CODE | The network that estimates game value from a PBS. This is analogous to AlphaZero's value head but for imperfect info. Input: PBS tensor. Output: expected payoff. Training data comes from PBS-CFR solutions. Core to both ReBeL and DeepStack architectures. |\n| ReBeL training loop (self-play \u2192 PBS-CFR \u2192 value network training \u2192 repeat) | \ud83d\udd34 HAND-CODE | The training loop IS ReBeL. Understanding how search data feeds network training which feeds better search is the key intellectual content. |\n| Architecture comparison framework (tables, diagrams, written analysis) | \ud83d\udfe1 AI-ASSISTED | Comparison tables and written analysis. AI helps structure, you fill in the analysis from your paper readings. |\n| Search tree expansion logic | \ud83d\udfe1 AI-ASSISTED | Tree data structures and traversal. AI drafts template, you implement the PBS-specific logic. |\n| Hyperparameter tuning, logging, experiment management | \ud83d\udfe2 AI-GENERATED | Standard training infrastructure. |\n| Plotting (training curves, PBS visualizations, architecture diagrams) | \ud83d\udfe2 AI-GENERATED | Visualizations. |\n\n### Sub-phase Breakdown (10 days):\n\n**Days 1\u20132 \u2014 Architecture + PBS Representation:**\n- \ud83d\udd34 Design the Public Belief State representation for Leduc:\n  - PBS = vector of probabilities over all possible private information assignments\n  - In Leduc: each player can hold one of 6 cards. PBS for player 1 = 6-dim probability vector (one per possible hand)\n  - Two-player PBS: a probability matrix over (hand_p1, hand_p2) \u2014 constrained by dealt cards\n  - Update rule: given observed action a at info set I, update PBS using Bayes' rule:\n    ```\n    P(hand | action_history + a) \u221d P(a | hand, info_set) \u00d7 P(hand | action_history)\n    ```\n  - Implement: `PBS.update(action, acting_player)` \u2014 the Bayesian update\n  - Test: verify belief updates are correct on Kuhn (simple enough to verify by hand)\n- Design the overall ReBeL-Lite architecture:\n  - Training: Iterate (self-play PBS episodes \u2192 solve PBS positions with CFR \u2192 train value net on solutions \u2192 repeat)\n  - Search: Given PBS \u2192 build local game tree of depth d \u2192 CFR at leaves \u2192 estimate leaf PBS values with network\n\n**Days 3\u20134 \u2014 PBS-CFR (Local Solver):**\n- \ud83d\udd34 Implement CFR that operates on PUBLIC BELIEF STATES rather than information sets:\n  - Input: a PBS (probability distribution over hands)\n  - Operation: run CFR iterations over the local game tree, starting from the given PBS\n  - Output: strategy at each info set + expected value for the given PBS\n  - This is your Step 3 CFR adapted to work within a search tree depth window\n- Difference from Step 3 CFR: instead of starting from the root (where all hands are equally likely), you start from an ARBITRARY belief state (because the search may reach this PBS from different paths)\n- Test on Kuhn: solve the full game using PBS-CFR starting from the initial PBS. Should match your Step 2/3 Nash solution.\n\n**Days 5\u20136 \u2014 PBS Value Network + Training Data:**\n- \ud83d\udd34 Implement the PBS value network:\n  - Input: PBS tensor (the probability distribution over possible private information)\n  - Architecture: MLP (PBS_dim \u2192 128 \u2192 128 \u2192 1) predicting expected value for the acting player\n  - Training data: (PBS, value_from_CFR_solution) pairs generated by PBS-CFR\n- \ud83d\udd34 Generate training data:\n  - Sample random PBS positions in Leduc (random action histories \u2192 compute resulting PBS)\n  - Solve each PBS with PBS-CFR (your standalone solver)\n  - Collect (PBS, expected_value) pairs\n  - Train value network via supervised learning (MSE loss)\n- Validate: check that trained network's value predictions correlate with CFR solutions (R\u00b2 > 0.9)\n\n**Days 7\u20138 \u2014 ReBeL Training Loop:**\n- \ud83d\udd34 Implement the full ReBeL-Lite training loop:\n  1. Initialize random value network\n  2. For each training iteration:\n     a. Play self-play games using current value network for depth-limited search\n     b. At depth limit: query value network for PBS value estimate\n     c. Above depth limit: run K iterations of CFR using value network at leaves\n     d. Collect (PBS, CFR_value) training pairs from the search\n     e. Train value network on collected pairs\n  3. After N iterations, evaluate: compute exploitability of the policy implied by the value network\n- Run for 100+ outer iterations on Leduc\n- Plot: exploitability vs training iterations (should steadily decrease)\n- Compare against: (a) Deep CFR from Step 5, (b) tabular MCCFR from Step 3\n\n**Days 9\u201310 \u2014 Architecture Comparison + Documentation:**\n- \ud83d\udfe1 AI-ASSISTED: Create the comprehensive architecture comparison:\n  \n  1. **Comparison table** (filled in from your paper readings + implementation experience):\n     | Feature | DeepStack | Libratus | Pluribus | ReBeL | SoG |\n     |---------|-----------|----------|----------|-------|-----|\n     | Offline compute | Value net training | Blueprint MCCFR | Blueprint MCCFR | Self-play + net training | GT-CFR + net training |\n     | Online compute | Continual re-solve | Subgame solve | Depth-limited search | PBS search + CFR | GT-CFR search |\n     | Uses abstraction? | No | Yes | Yes | No | No |\n     | Uses neural nets? | Yes (value) | No | No | Yes (value) | Yes (value + policy) |\n     | Players | 2 | 2 | 6 | 2+ | 2+ |\n     | Perfect info too? | No | No | No | No | Yes |\n     | Key innovation | Online re-solving | Modular system | Multi-player | PBS framework | Unified perfect/imperfect |\n  \n  2. **Evolution diagram**: Draw how each system builds on the previous\n  3. **Component reuse analysis**: Which Step 3\u20135 components appear in which architecture?\n     - MCCFR \u2192 appears in Libratus (blueprint), Pluribus (blueprint)\n     - Deep CFR value networks \u2192 DeepStack, ReBeL, SoG all use similar value nets\n     - Abstraction \u2192 Libratus, Pluribus. NOT in DeepStack, ReBeL, SoG (replaced by neural approximation)\n     - PBS \u2192 ReBeL, SoG\n\n- Cross-validate ReBeL-Lite against published results:\n  - Exploitability on Leduc should comparable to Deep CFR\n  - Training should show clear improvement over untrained random play\n\n- Document the architecture comparison as a structured analysis\n\n### Deliverables:\n- [ ] PBS representation module (init, Bayesian update, tensor encoding) \u2014 working on Kuhn and Leduc\n- [ ] PBS-CFR local solver operating on arbitrary belief states\n- [ ] PBS value network trained on Leduc, predictions correlating with CFR solutions\n- [ ] ReBeL-Lite training loop \u2014 self-play \u2192 PBS-CFR \u2192 value network \u2192 repeat\n- [ ] Architecture comparison table (all 5 systems) with analysis\n- [ ] Architecture evolution diagram\n- [ ] Component reuse analysis (which Steps 3\u20135 building blocks appear where)\n- [ ] All code committed with README\n\n### Validation:\n- **PBS updates:** Beliefs must sum to 1, must correctly zero out impossible hands (e.g., if a card is on the board, no player holds it). Verify on Kuhn by hand.\n- **PBS-CFR on Kuhn:** Should reproduce full-game Nash equilibrium when starting from initial uniform PBS.\n- **PBS-CFR on Leduc:** Exploitability should match Step 3's CFR within 10%.\n- **PBS value network:** R\u00b2 > 0.9 between predicted values and CFR-solved values on held-out test PBS positions.\n- **ReBeL-Lite:** Exploitability should decrease monotonically across training iterations. After 100+ iterations, should be within 2x of Deep CFR's exploitability on Leduc.\n\n---\n\n## Phase 5: Consolidation (3 days)\n\n### Day 1 \u2014 Book Chapter Skim + Supplementary Papers\n\n- **Reference skim:** Brown & Sandholm (2018) \"Depth-Limited Solving\" \u2014 if not fully absorbed during Phase 3, revisit Section 3 and the exploitability bound. This paper is the theoretical glue across all architectures.\n\n- **Supplementary skim:** Milec et al. (2025) \"Adapting Beyond the Depth Limit\" \u2014 read abstract + Section 3. *Key connection to Step 8: what happens when your depth-limited search encounters an opponent who deviates from expectations beyond the depth limit? This is the bridge to safe exploitation.*\n\n- **Supplementary skim:** Kub\u00ed\u010dek & Lis\u00fd (2025) \"Look-ahead Search on Policy Networks in IIGs\" \u2014 read abstract. *Notes for Step 15: is learned search replacing hand-coded search?*\n\n- Review: which architecture components do you NOT yet understand well enough for the whiteboard test?\n\n### Day 2 \u2014 Architecture Synthesis + PhD Mapping\n\n- **Write the architecture evolution essay (1\u20132 pages, committed to repo):**\n  - The evolution from \"solve everything offline\" (Libratus) \u2192 \"solve nothing offline, learn instead\" (ReBeL/SoG)\n  - The evolution from \"abstraction-based\" (Libratus/Pluribus) \u2192 \"neural-approximation-based\" (DeepStack/ReBeL/SoG)\n  - The convergence toward AlphaZero-style \"self-play + search + network\" for imperfect info\n  - Where the OPEN problems remain:\n    - Multi-player safety guarantees (Pluribus sidesteps this)\n    - Opponent adaptation beyond the depth limit (Milec et al. 2025)\n    - Real-time compute budget constraints\n\n- **Map each architecture to your thesis contributions:**\n  - Contribution #1 (Behavioral Adaptation): ReBeL's PBS is the natural starting point for belief-based opponent modeling. Your innovation: extending PBS to include BELIEFS ABOUT THE OPPONENT'S STRATEGY TYPE, not just their hand.\n  - Contribution #2 (Multi-Agent Safe Exploitation): Pluribus's lack of multiplayer safety guarantees IS the gap. Your thesis fills it.\n  - Contribution #3 (Evaluation Methodology): The exploitability metric used across all 5 systems becomes your evaluation backbone.\n\n### Day 3 \u2014 One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 3] MCCFR \u2192 [Step 6] appears as the blueprint computation engine in Libratus and Pluribus. Same algorithm, different scale.\n    - [Step 4] Abstraction \u2192 [Step 6] required by Libratus/Pluribus but ABSENT in DeepStack/ReBeL/SoG. Neural approximation replaced hand-crafted abstraction. The progression: manual (Step 4) \u2192 learned (Step 5) \u2192 integrated into architecture (Step 6).\n    - [Step 4] Subgame solving (Brown & Sandholm 2017) \u2192 [Step 6] the online refinement mechanism in Libratus. Same algorithm, now embedded in a system.\n    - [Step 5] Deep CFR advantage networks \u2192 [Step 6] DeepStack's value networks and ReBeL's PBS value network are conceptually identical \u2014 neural networks predicting game values at specific states. Deep CFR trains on info states, ReBeL trains on public belief states.\n    - [Step 5] NFSP's anticipatory parameter \u2192 [Step 6] Pluribus's \"search assuming opponents follow blueprint\" is a similar pragmatic tradeoff between Nash play and adaptation.\n    - [Step 1] AlphaGo/AlphaZero (Silver et al.) \u2192 [Step 6] ReBeL IS AlphaZero for imperfect info. Self-play + search + value network. The PBS is what makes this possible for hidden information.\n    - [Step 6] PBS-based search \u2192 prediction: [Step 7] Opponent modeling will extend PBS by adding a BELIEF ABOUT OPPONENT STRATEGY TYPE on top of the belief about hands.\n    - [Step 6] Depth-limited solving error bounds \u2192 prediction: [Step 8] Safe exploitation will need similar bounds: \"if my opponent model is wrong by \u03b5, how much can I lose?\"\n  - **Confusions:**\n    - [Step 6] ReBeL works on 2-player. The paper says it can extend to multiplayer. But how? In multiplayer, the PBS becomes exponentially larger (belief over all opponents' hands). \u2192 OPEN (check Step 9 MARL literature, or Step 15 frontier mapping)\n    - [Step 6] Student of Games promises to work for BOTH perfect and imperfect info. But is GT-CFR actually competitive with MCTS for Go? The paper shows it works but doesn't match AlphaZero. Is the unified framework too general to be optimal for either? \u2192 OPEN (philosophical question for Step 15)\n    - [Step 5\u21926] My Step 5 confusion about why Deep CFR trains from scratch each iteration: ReBeL also alternates training and data collection but FINE-TUNES the network. What's different? \u2192 PARTIALLY RESOLVED (hypothesis: ReBeL's PBS-based data is more stable because it conditions on public history, while Deep CFR's info-state data shifts as the strategy changes)\n    - [Step 3\u21926] Pluribus uses Linear CFR for the blueprint. This was Xu et al.'s starting point for Predictive Discounted CFR (AAAI 2026). Is LCFR provably better than DCFR for blueprints? \u2192 OPEN (minor, check if papers address this)\n\n## Exit Checklist\n\n- [ ] Can draw architecture diagrams for all 5 systems from memory (DeepStack, Libratus, Pluribus, ReBeL, Student of Games)\n- [ ] Can explain the evolution: why each system exists and what problem it addresses that previous systems didn't\n- [ ] PBS representation module working with correct Bayesian updates\n- [ ] PBS-CFR local solver working on Kuhn and Leduc\n- [ ] PBS value network trained and correlating with CFR solutions (R\u00b2 > 0.9)\n- [ ] ReBeL-Lite training loop converging on Leduc (exploitability decreasing)\n- [ ] Architecture comparison table completed with written analysis\n- [ ] Architecture evolution diagram created\n- [ ] Can explain from memory: Public Belief States and why they enable search in IIGs\n- [ ] Can explain from memory: depth-limited solving and the error propagation bound\n- [ ] Component reuse analysis showing which Steps 3\u20135 building blocks appear in which architecture\n- [ ] All \ud83d\udd34 components hand-coded\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 1\u20135 + new confusions + resolved confusions)\n- [ ] Step notes committed to repo\n",
  "step_07": "# Step 7 \u2014 Opponent Modeling \u2014 Inference from Behavioral Traces\n\n**Duration:** 21 days (Tier 1)  \n**Dependencies:** Step 2 (Game Theory + CFR Basics), Step 6 (End-to-End Game AI Architectures)  \n**Phase:** D \u2014 Opponent Modeling + Exploitation  \n\n### PhD Connection\n\nThis step is the FIRST HALF of Contribution #1 (Behavioral Adaptation Framework). The opponent model is the \"sensor\" that takes raw behavioral data (observed actions, revealed hands at showdown) and produces a structured estimate of the opponent's strategy. Without this sensor, the agent cannot adapt \u2014 it can only play Nash (safe but unexploitative).\n\n**What this step provides for the thesis:**\n- Three concrete opponent modeling approaches with empirical comparisons\n- Understanding of when each approach is appropriate\n- A clear open question: handling non-stationarity (the thesis's novel contribution opportunity)\n- Demonstration that opponent modeling WORKS on toy games \u2014 now must scale (via Steps 8 + 11)\n\n---\n\n> **Phase Overview:** This phase addresses the central research question: how should an agent adapt its play to a specific opponent? The preceding phases built the algorithmic toolbox \u2014 equilibrium solvers, abstraction, and neural approximation \u2014 but did not yet tackle opponent-aware play. Step 7 will introduce inference mechanisms that convert observed action sequences into beliefs about opponent behavior. Step 8 will cover algorithms that translate those beliefs into profitable yet safe strategy adjustments.\n\n\n## Table of Contents\n- [Phase 1: Intuition (2 days)](#phase-1-intuition-2-days)\n  - [Day 1: The Problem & Classical Approaches](#day-1-the-problem-classical-approaches)\n  - [Day 2: Modern Approaches & the Exploitation Tradeoff](#day-2-modern-approaches-the-exploitation-tradeoff)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Observing Opponent Types in OpenSpiel](#day-1-observing-opponent-types-in-openspiel)\n  - [Day 2: Bayesian Type Inference \u2014 Hands-On](#day-2-bayesian-type-inference-hands-on)\n- [Phase 3: Targeted Reading (4 days)](#phase-3-targeted-reading-4-days)\n  - [Paper 1: Southey et al. \u2014 \"Bayes' Bluff: Opponent Modelling in Poker\" (2005)](#paper-1-southey-et-al-bayes-bluff-opponent-modelling-in-poker-2005)\n  - [Paper 2: Bard et al. \u2014 \"Online Implicit Agent Modelling\" (2013)](#paper-2-bard-et-al-online-implicit-agent-modelling-2013)\n  - [Paper 3: Ganzfried & Sun \u2014 \"Bayesian Opponent Exploitation in Imperfect-Information Games\" (2016/2018)](#paper-3-ganzfried-sun-bayesian-opponent-exploitation-in-imperfect-information-games-20162018)\n  - [Paper 4: Ganzfried, Wang & Chiswick \u2014 \"Opponent Modeling in Multiplayer Imperfect-Information Games\" (2022/2024)](#paper-4-ganzfried-wang-chiswick-opponent-modeling-in-multiplayer-imperfect-information-games-20222024)\n  - [Paper 5: Ganzfried \u2014 \"Consistent Opponent Modeling in Imperfect-Information Games\" (2025/2026)](#paper-5-ganzfried-consistent-opponent-modeling-in-imperfect-information-games-20252026)\n  - [Book Chapters (Supplementary)](#book-chapters-supplementary)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (10 days)](#phase-4-implementation-10-days)\n  - [Project: Bayesian Opponent Modeler + Adaptive Exploiter for Kuhn & Leduc \u2014 From Scratch](#project-bayesian-opponent-modeler-adaptive-exploiter-for-kuhn-leduc-from-scratch)\n  - [Sub-phase Breakdown (10 days):](#sub-phase-breakdown-10-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (3 days)](#phase-5-consolidation-3-days)\n  - [Day 1 \u2014 Reference Skim + Gap Fill](#day-1-reference-skim-gap-fill)\n  - [Day 2 \u2014 Deep Comparison + Thesis Connection](#day-2-deep-comparison-thesis-connection)\n  - [Day 3 \u2014 One-Pager + Learning Log](#day-3-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (2 days)\n\nThe goal: understand WHY opponent modeling matters (Nash equilibrium ignores opponent weaknesses), what KIND of information you can extract from behavioral traces (action frequencies, timing patterns, deviations from equilibrium), and WHEN it's worth deviating from Nash to exploit a weak opponent. End of days: you should be able to explain to a non-expert: \"If your opponent always folds to big bets, a Nash equilibrium strategy doesn't know that \u2014 it plays the same regardless. An opponent model DETECTS that pattern and lets you bluff more against that specific player. The hard part is doing this without becoming exploitable yourself.\"\n\n### Day 1: The Problem & Classical Approaches\n\n- **Bayes theorem, the geometry of changing beliefs**  \n  https://www.youtube.com/watch?v=HZGCoVF3YvM  \n  Duration: ~15m | Channel: 3Blue1Brown  \n  *Essential refresher on Bayesian inference \u2014 the mathematical backbone of all opponent modeling. Prior beliefs updated by evidence to form posterior beliefs.*\n\n- **Stanford CS224R \u2014 Lecture 2: Imitation Learning (Spring 2025)**  \n  https://www.youtube.com/watch?v=WxRDyObrm_M  \n  Duration: ~1h7m | Instructor: Chelsea Finn (Stanford)  \n  *Learning from observing others' behavior: behavioral cloning, DAgger, and expressive policy distributions. The same paradigm used for inferring opponent strategies from their actions.*\n\n### Day 2: Modern Approaches & the Exploitation Tradeoff\n\n- **AI for Imperfect-Information Games: Beating Top Humans in No-Limit Poker**  \n  https://www.youtube.com/watch?v=McV4a6umbAY  \n  Duration: ~1h | Speaker: Noam Brown | Channel: Microsoft Research  \n  *Covers Libratus's self-improvement module: how the system detects opponent patterns during play and patches its own weaknesses overnight. The practical side of opponent adaptation.*\n\n### Blog Posts / Accessible Reads\n\n- **Sam Ganzfried \u2014 \"Opponent Modeling and Exploitation in Poker and Beyond\" (personal blog / research summary)**  \n  https://www.sganzfried.com/research  \n  *Overview of Ganzfried's line of research. Read the opponent modeling section for a non-technical summary of the progression.*\n\n- **AI and Poker \u2014 \"The Evolution from GTO to Exploitative Play\"**  \n  Search for poker AI blogs covering the GTO-vs-exploitative spectrum. Any poker strategy site explaining \"GTO vs exploitative\" gives intuition for why opponent modeling matters.  \n  *The poker community has been debating this for decades. The academic formalization is exactly what this step covers.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Rock Paper Scissors Pattern Modeler](https://www.afiniti.com/corporate/rock-paper-scissors)** \u2014 Play against an AI that actively models your behavioral tendencies using Markov Chains. Try to be unpredictable!\n\n\n### Day 1: Observing Opponent Types in OpenSpiel\n\n1. **Create a simple opponent type zoo in your Kuhn/Leduc engine:**\n   ```python\n   import pyspiel\n   import numpy as np\n   \n   # Define 4 opponent types for Kuhn Poker:\n   # Type 1: \"Always Call\" \u2014 never folds, never raises\n   # Type 2: \"Tight-Passive\" \u2014 only bets with K, folds J to any bet\n   # Type 3: \"Loose-Aggressive\" \u2014 always raises regardless of hand\n   # Type 4: \"Nash\" \u2014 plays the known Nash equilibrium strategy\n   \n   # For each type, define a fixed strategy (action probabilities per info set)\n   # Run 1000 hands of each type against a Nash player\n   # Log: action frequencies at each info set\n   ```\n\n2. **Visualize opponent behavioral signatures:**\n   - For each opponent type, compute: bet frequency, fold frequency, call frequency per info set\n   - Plot a \"behavioral fingerprint\" \u2014 a bar chart showing action distributions across info sets\n   - *Key insight to observe: different opponent types produce DISTINCT behavioral signatures. The tight-passive opponent's fingerprint looks nothing like the loose-aggressive one. This is what an opponent model tries to infer.*\n\n3. **Measure exploitation opportunity:**\n   - Compute the best response to each opponent type using OpenSpiel's `exploitability` module\n   - Compare: Nash expected value vs best-response expected value against each type\n   - *Expected result: against the Nash opponent, best response \u2248 Nash value (0). Against fixed exploitable types, best response >> 0. The gap IS the exploitation opportunity.*\n\n### Day 2: Bayesian Type Inference \u2014 Hands-On\n\n1. **Implement a naive Bayesian type detector:**\n   ```python\n   # Prior: uniform over 4 opponent types [0.25, 0.25, 0.25, 0.25]\n   # After each observed action:\n   #   likelihood = P(action | type, info_set)  \u2014 from type's known strategy\n   #   posterior \u221d prior \u00d7 likelihood\n   #   normalize posterior\n   \n   # Run against hidden Type 2 (tight-passive) for 50 hands\n   # Plot: posterior probability of each type over time\n   ```\n   - *Expected result: after ~10-20 hands, the posterior concentrates on the correct type. The speed of convergence depends on how distinctive the opponent's actions are \u2014 if they fold with J, that's highly informative.*\n\n2. **Test the limits of type-based modeling:**\n   - What happens when the opponent is Type 5 (a mixture of Type 1 and Type 3)?\n   - The Bayesian detector should spread probability between the two closest types\n   - *Observe: type-based models fail when the opponent doesn't fit any predefined type. This motivates the continuous/parametric models in Phase 3.*\n\n3. **Play with OpenSpiel's policy-based tools:**\n   ```python\n   from open_spiel.python.algorithms import best_response\n   from open_spiel.python import policy as policy_lib\n   \n   game = pyspiel.load_game(\"kuhn_poker\")\n   \n   # Create a tabular policy for your opponent model (initially uniform)\n   opponent_policy = policy_lib.TabularPolicy(game)\n   \n   # Compute best response to this policy\n   br = best_response.BestResponsePolicy(game, player_id=0, policy=opponent_policy)\n   ```\n   - *This is the exploitation side \u2014 once you HAVE a model, computing the best response against it is straightforward. The hard part is getting the model right.*\n\n4. **Questions to answer by end of Day 2:**\n   - How many observations do you need before the Bayesian detector is confident?\n   - What happens when the opponent switches types mid-game?\n   - Why can't you just compute the best response to the observed frequencies directly? (Answer: overfitting to small samples \u2192 catastrophic exploitation if the opponent adapts.)\n   - What's the difference between \"implicit\" modeling (infer from behavior) and \"explicit\" modeling (assume a type)?\n\n---\n\n## Phase 3: Targeted Reading (4 days)\n\n### Paper 1: Southey et al. \u2014 \"Bayes' Bluff: Opponent Modelling in Poker\" (2005)\n\nhttps://poker.cs.ualberta.ca/publications/UAI05.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Bayesian opponent model \u2014 the generative model of opponent \n\u2502          play: prior over strategy parameters, likelihood of observed actions,\n\u2502          posterior inference via Bayes' rule),\n\u2502          Section 4 (Experiments \u2014 Bayesian model on simplified poker)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 history of opponent modeling),\n\u2502          Section 2 (Background \u2014 poker rules, game formalism)\n\u251c\u2500\u2500 SKIP:  Section 5 (Discussion \u2014 general commentary)\n\u251c\u2500\u2500 MATH:  \u2192 \"The Bayesian update equation (Eq. 3-4) \u2014 work through a small example\n\u2502             by hand. Start with a uniform prior over 3 opponent types, observe\n\u2502             one action, compute the posterior. This is the foundation of ALL \n\u2502             Bayesian opponent modeling that follows.\"\n\u2502          \u2192 \"The Dirichlet prior (Section 3.2) \u2014 understand why Dirichlet is the\n\u2502             natural conjugate prior for multinomial action distributions. This\n\u2502             is NOT optional \u2014 it's the standard prior used in all subsequent\n\u2502             papers. If you know Beta distributions, Dirichlet is just the \n\u2502             multivariate version.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Opponent modeling IS Bayesian inference: you have a prior belief\n    about how the opponent plays, you update it as you observe their actions,\n    and you compute a posterior. The GAME STRUCTURE constrains what information\n    is available \u2014 you only see actions, not the opponent's private hand. This\n    partial observability is what makes opponent modeling in games HARD.\"\n```\n\n### Paper 2: Bard et al. \u2014 \"Online Implicit Agent Modelling\" (2013)\n\nhttps://poker.cs.ualberta.ca/publications/AAMAS13-bard.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Implicit agent modelling \u2014 instead of maintaining an explicit\n\u2502          belief over types, the opponent model is IMPLICIT in the strategy's\n\u2502          response to observed actions),\n\u2502          Section 4 (Online algorithm \u2014 how to update the model after each game,\n\u2502          the incremental update procedure),\n\u2502          Section 5 (Experiments \u2014 implicit vs explicit modeling on poker)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Background),\n\u2502          Section 6 (Related work), Section 7 (Conclusion)\n\u251c\u2500\u2500 SKIP:  None \u2014 paper is concise (~8 pages)\n\u251c\u2500\u2500 MATH:  \u2192 \"The implicit model update (Algorithm 1) \u2014 trace the algorithm \n\u2502             step-by-step. The key distinction from explicit Bayesian modeling \n\u2502             is that you never maintain a probability distribution over types.\n\u2502             Instead, the strategy itself evolves to be a soft best-response \n\u2502             to the observed action frequencies.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"There are TWO paradigms for opponent modeling: EXPLICIT (maintain\n    a belief distribution, compute best response to the posterior) and IMPLICIT\n    (let the strategy adapt directly without maintaining beliefs). Explicit gives \n    you interpretability (you know what you think the opponent is doing). Implicit\n    is simpler to implement and scales better. Your thesis needs to understand\n    both \u2014 the Behavioral Adaptation Framework (Contribution #1) likely uses\n    explicit modeling for interpretability.\"\n```\n\n### Paper 3: Ganzfried & Sun \u2014 \"Bayesian Opponent Exploitation in Imperfect-Information Games\" (2016/2018)\n\nhttps://arxiv.org/abs/1603.03491\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (The Bayesian exploitation framework \u2014 prior over opponent\n\u2502          strategies, posterior update from observed hand histories, best-response\n\u2502          computation to the posterior),\n\u2502          Section 4 (Experiments on Kuhn Poker and Leduc Hold'em \u2014 convergence\n\u2502          of exploitation profit over time)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the exploitation-exploration tradeoff),\n\u2502          Section 2 (Background \u2014 Nash equilibrium, best response),\n\u2502          Section 5 (Conclusion + open questions)\n\u251c\u2500\u2500 SKIP:  Proofs in appendix (unless pursuing theoretical depth)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Convergence of Bayesian exploitation) \u2014 read the STATEMENT.\n\u2502             This guarantees that as observations increase, the exploitation \n\u2502             strategy converges to the true best response. Know the assumptions:\n\u2502             the opponent plays a FIXED (stationary) strategy, and the prior\n\u2502             has support on the opponent's true strategy.\"\n\u2502          \u2192 \"WHY this can't be substituted by algorithmic understanding: the \n\u2502             convergence guarantee is what separates principled Bayesian \n\u2502             exploitation from ad-hoc heuristics. Your thesis must state\n\u2502             WHEN the guarantee holds and WHEN it breaks (non-stationary \n\u2502             opponents, misspecified priors). The theorem tells you both.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"This paper CONNECTS opponent modeling (Step 7) to exploitation \n    (Step 8). The model is the input; the best response to the model is the \n    output. The question is: how do you exploit WITHOUT losing safety? That's \n    Step 8's problem. But first you need the model to be GOOD \u2014 that's THIS \n    step's problem.\"\n```\n\n### Paper 4: Ganzfried, Wang & Chiswick \u2014 \"Opponent Modeling in Multiplayer Imperfect-Information Games\" (2022/2024)\n\nhttps://arxiv.org/abs/2212.06027\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Extension of opponent modeling to N-player games \u2014 the \n\u2502          key complication: with N opponents, you need N separate models,\n\u2502          and the optimal response depends on ALL of them jointly),\n\u2502          Section 4 (Experiments on 3-player Kuhn Poker \u2014 how the modeling\n\u2502          algorithm performs against heterogeneous opponent populations)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Background),\n\u2502          Section 5 (Conclusion)\n\u251c\u2500\u2500 SKIP:  None \u2014 paper is relatively short\n\u251c\u2500\u2500 MATH:  \u2192 \"The joint opponent model (Section 3.1) \u2014 understand how the \n\u2502             single-opponent Bayesian framework extends to multiple opponents.\n\u2502             The posterior is now over TUPLES of strategies (one per opponent).\n\u2502             Skim the algebra; focus on the conceptual extension.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Multiplayer opponent modeling is NOT just 'do 2-player modeling \n    N times.' The optimal exploitation strategy against opponents A and B \n    jointly differs from the combination of individual best responses. This \n    is the core complication that feeds into your thesis Contribution #2 \n    (Multi-Agent Safe Exploitation).\"\n```\n\n### Paper 5: Ganzfried \u2014 \"Consistent Opponent Modeling in Imperfect-Information Games\" (2025/2026)\n\nhttps://arxiv.org/abs/2508.17671\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (The consistency property \u2014 what existing algorithms FAIL\n\u2502          to guarantee: convergence to the opponent's true strategy even in\n\u2502          the limit of infinite observations),\n\u2502          Section 4 (New algorithm \u2014 sequence-form projected gradient descent\n\u2502          for consistent opponent modeling),\n\u2502          Section 5 (Experiments \u2014 comparison against prior methods)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Motivation and background),\n\u2502          Section 6 (Conclusion)\n\u251c\u2500\u2500 SKIP:  Full convergence proof details (read statement + sketch only)\n\u251c\u2500\u2500 MATH:  \u2192 \"The convex optimization formulation (Section 4) \u2014 understand why \n\u2502             the sequence-form representation makes opponent modeling a CONVEX\n\u2502             problem. This is important because convexity guarantees a unique \n\u2502             solution and efficient algorithms (projected gradient descent).\"\n\u2502          \u2192 \"WHY this can't be substituted: the paper shows existing methods\n\u2502             FAIL a basic consistency test. Understanding the convex formulation\n\u2502             tells you why the fix works and why it's computationally tractable.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Existing opponent modeling algorithms (including Papers 1-4 above)\n    don't guarantee convergence to the TRUE opponent strategy even with infinite\n    data. This paper fixes that with a convex optimization approach. It's the \n    most recent work in the field and directly relevant to your thesis \u2014 your\n    Behavioral Adaptation Framework should incorporate or extend this guarantee.\"\n```\n\n### Book Chapters (Supplementary)\n\n**Book:** Shoham, Y. & Leyton-Brown, K. \u2014 *Multiagent Systems: Algorithmic, Game-Theoretic, and Logical Foundations* (2008)  \n**Link:** http://www.masfoundations.org/download.html (free PDF)  \n**Assigned chapters:** 7 (Learning and Teaching)  \n**Context \u2014 what comes before (Ch 1\u20136):** Game theory foundations (normal form, extensive form, Nash equilibrium, computing equilibria). *You know all of this from Steps 2\u20134.*  \n**Context \u2014 what comes after (Ch 8\u2013end):** Coalitional game theory, social choice, mechanism design. *Relevant for Step 11 (coalition formation) \u2014 skip for now.*  \n**Reading focus:** Section 7.1\u20137.3 specifically covers opponent modeling as a learning problem in games. Provides the formal framework connecting your papers.\n\n### Math Flags\n\n\ud83d\udd22 **Bayesian posterior update for opponent models (Southey et al., Eq. 3-4)** \u2014 Must work through by hand on a small example.  \n**WHY this can't be substituted:** The posterior update is the CORE computation of the entire step. If you can't do it on paper for 3 types \u00d7 3 info sets, you can't debug your implementation or extend it for your thesis.\n\n\ud83d\udd22 **Dirichlet-multinomial conjugacy (Southey et al., Section 3.2)** \u2014 Must understand why Dirichlet is the natural prior.  \n**WHY:** Every Bayesian opponent modeling paper uses this. It's the reason posterior updates are CLOSED-FORM (no MCMC needed). Your implementation relies on this efficiency.\n\n\ud83d\udd22 **Sequence-form convex formulation (Ganzfried 2025, Section 4)** \u2014 Must understand the formulation, not the full proof.  \n**WHY:** This is the cutting edge. Your thesis likely extends or applies this. Know it well enough to explain to your committee.\n\n---\n\n## Phase 4: Implementation (10 days)\n\n### Project: Bayesian Opponent Modeler + Adaptive Exploiter for Kuhn & Leduc \u2014 From Scratch\n\n**Language + Framework:** Python 3.10+ / NumPy (core algorithm), PyTorch optional for neural extensions\n\nStarting point: Your Kuhn Poker engine (Step 2), Leduc Hold'em engine (Step 3), Nash equilibrium strategies from CFR/MCCFR (Steps 2\u20133), and game tree infrastructure from Step 6.\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Opponent type library (4+ fixed strategies for Kuhn/Leduc) | \ud83d\udfe1 AI-ASSISTED | Strategy definitions are straightforward; AI drafts type table, you verify strategic correctness. |\n| Bayesian type-based opponent model (Dirichlet-multinomial) | \ud83d\udd34 HAND-CODE | This IS the step. The posterior update, the likelihood computation from partial observations, the handling of unobserved private information. Must own every line. |\n| Continuous Bayesian model (per-info-set action distribution estimation) | \ud83d\udd34 HAND-CODE | The extension from discrete types to continuous strategy estimation. This is the parametric model that will matter for the thesis. |\n| Consistent opponent modeler (Ganzfried 2025 \u2014 convex optimization approach) | \ud83d\udd34 HAND-CODE | The cutting-edge algorithm. Implement the sequence-form projected gradient descent. This is thesis-critical \u2014 understanding requires building it. |\n| Best-response computation against inferred opponent model | \ud83d\udfe1 AI-ASSISTED | You've built best-response trees before (Steps 2\u20134). The new part is feeding the opponent model's posterior into the BR computation. AI drafts the integration, you review. |\n| Adaptive exploitation pipeline (observe \u2192 update model \u2192 compute BR \u2192 act) | \ud83d\udd34 HAND-CODE | The full pipeline that ties everything together. This is the prototype for Contribution #1 (Behavioral Adaptation Framework). |\n| Tournament framework (run modeler against various opponents, measure performance) | \ud83d\udfe2 AI-GENERATED | Tournament infrastructure: run 10000 hands, switch opponents, log results. |\n| Plotting + visualization (posterior evolution, exploitation profit curves) | \ud83d\udfe2 AI-GENERATED | Matplotlib visualizations for analysis. |\n\n### Sub-phase Breakdown (10 days):\n\n**Days 1\u20132 \u2014 Architecture + Scaffolding:**\n\n*Day 1 \u2014 Opponent Type Library + Observation Infrastructure:*\n- \ud83d\udfe1 AI-ASSISTED: Create `opponent_types.py`:\n  - Kuhn Poker types: AlwaysCall, TightPassive, LooseAggressive, Nash, TightAggressive (5 types)\n  - Leduc Hold'em types: same behavioral archetypes but adapted for 2-round structure\n  - Each type is a callable policy: `type.action_probabilities(info_set) \u2192 dict[action \u2192 prob]`\n- \ud83d\udd34 HAND-CODE: Create `observation_buffer.py`:\n  - Stores game history: (info_set_observed, action_taken, outcome)\n  - Handles partial observability: you see the opponent's ACTIONS but not their private hand (unless showdown)\n  - At showdown: record revealed hands \u2192 this is the most informative observation\n  - Non-showdown: record action sequence only \u2192 less informative but more common\n\n*Day 2 \u2014 Bayesian Framework Setup:*\n- \ud83d\udd34 HAND-CODE: Create `bayesian_model.py` skeleton:\n  - Prior: Dirichlet distribution over action probabilities at each info set\n  - Likelihood function: P(observed_action | info_set, model_params)\n  - Posterior update: closed-form Dirichlet update when observation is available\n  - Handle partial observability: when opponent's hand is unknown, marginalize over possible hands\n  - Interface: `model.update(observation)`, `model.predict(info_set) \u2192 action_probs`\n\n**Days 3\u20138 \u2014 Core Algorithm Implementation:**\n\n*Day 3 \u2014 Discrete Type-Based Bayesian Model:*\n- \ud83d\udd34 HAND-CODE: `type_based_model.py`:\n  - Prior: uniform over K opponent types\n  - Observation: (info_set, action) pair\n  - Likelihood: `P(action | type_k, info_set)` = type_k's strategy probability\n  - Posterior: `P
