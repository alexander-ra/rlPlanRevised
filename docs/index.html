fferent-sampling-schemes)\n  - [Day 2: CFR+ and Convergence Comparison](#day-2-cfr-and-convergence-comparison)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Paper 1: Lanctot et al. \u2014 \"Monte Carlo Sampling for Regret Minimization in Extensive Games\" (2009)](#paper-1-lanctot-et-al-monte-carlo-sampling-for-regret-minimization-in-extensive-games-2009)\n  - [Paper 2: Tammelin et al. \u2014 \"Solving Heads-Up Limit Texas Hold'em\" (2015)](#paper-2-tammelin-et-al-solving-heads-up-limit-texas-holdem-2015)\n  - [Paper 3: Zinkevich et al. (2007) \u2014 Revisit Section 5](#paper-3-zinkevich-et-al-2007-revisit-section-5)\n  - [Book: Chen & Ankenman \u2014 \"The Mathematics of Poker\" (2006)](#book-chen-ankenman-the-mathematics-of-poker-2006)\n  - [Optional Supplementary](#optional-supplementary)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: MCCFR for Leduc Hold'em + CFR+ for Kuhn/Leduc \u2014 From Scratch](#project-mccfr-for-leduc-holdem-cfr-for-kuhnleduc-from-scratch)\n  - [Sub-phase Breakdown (6 days):](#sub-phase-breakdown-6-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Reference Skim + Gap Fill](#day-1-reference-skim-gap-fill)\n  - [Day 2 \u2014 One-Pager + Learning Log](#day-2-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY vanilla CFR is too slow for large games, what Monte Carlo sampling does about it, and how CFR+ improved convergence. End of day: you should be able to explain to a non-expert: \"Instead of walking every branch of the game tree every iteration, we sample a few branches \u2014 it's noisier, but we only need to update the sampled branches, which makes each iteration 1000x cheaper.\"\n\n### Videos\n\n- **The Strange Math That Predicts (Almost) Anything**  \n  https://www.youtube.com/watch?v=KZeIEiBrT_w  \n  Duration: ~32m | Channel: Veritasium  \n  *The origins of Monte Carlo methods and Markov chains: from a 19th-century feud between Russian mathematicians to nuclear physics at Los Alamos, then Google's PageRank. Story-driven introduction to the randomized sampling paradigm that underlies MCCFR.*\n\n- **Monte Carlo Tree Search \u2014 Computerphile**  \n  https://www.youtube.com/watch?v=BEFY7IHs0HM  \n  Duration: ~33m | Speaker: Nick Hawes (Oxford) | Channel: Computerphile  \n  *University-level walkthrough of MCTS: Select-Expand-Simulate-Backpropagate. Explains why random sampling works for huge game trees, and the connection to AlphaZero.*\n\n- **Monte Carlo Tree Search (MCTS) Tutorial**  \n  https://www.youtube.com/watch?v=Fbs4lnGLS8M  \n  Duration: ~13m | Channel: Fullstack Academy  \n  *Compact practical tutorial comparing MCTS vs Minimax, explaining why brute-force fails for Go-sized games, and walking through how the asymmetric stats tree is built.*\n\n- **Stanford CS234 \u2014 Lecture 3: Policy Evaluation (Spring 2024)**  \n  https://www.youtube.com/watch?v=jjq51TRNVvk  \n  Duration: ~1h20m | Instructor: Emma Brunskill (Stanford)  \n  *Covers Monte Carlo policy evaluation and TD learning \u2014 the foundational sampling methods that MCCFR adapts for game tree traversal.*\n\n- **Poker AI Algorithm: MCCFR**  \n  https://www.youtube.com/watch?v=iU14jOue9Dk  \n  Duration: ~17m | Channel: StackWild  \n  *Step-by-step walkthrough of external-sampling MCCFR pseudocode. Maps the formal algorithm to Python code on a toy poker game.*\n\n- **ReBeL \u2014 Combining Deep RL and Search for Imperfect-Information Games (Explained)**  \n  https://www.youtube.com/watch?v=BhUWvQmLzSk  \n  Duration: ~1h12m | Channel: Yannic Kilcher  \n  *Deep paper walkthrough covering CFR within the ReBeL framework, public belief states, and why Monte Carlo variants matter for scaling.*\n\n### Blog Posts\n\n- **Martin Schmid \u2014 \"Variance Reduction in MCCFR\"**  \n  https://arxiv.org/abs/1809.03057 (read abstract and introduction only \u2014 paper is for Phase 3)  \n  *Quick context on why variance matters in MCCFR \u2014 motivates why you'll experiment with different sampling schemes.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Slumbot (CFR Poker AI)](https://www.slumbot.com/)** \u2014 Play Heads-Up Texas Hold'em against a top CFR-based bot to see its behavior and baseline performance.\n\n\n### Day 1: MCCFR in OpenSpiel \u2014 Different Sampling Schemes\n\n1. **Run MCCFR variants on Kuhn Poker via OpenSpiel:**\n   ```python\n   import pyspiel\n   from open_spiel.python.algorithms import mccfr\n   from open_spiel.python.algorithms import exploitability as expl\n   \n   game = pyspiel.load_game(\"kuhn_poker\")\n   \n   # External sampling MCCFR\n   es_solver = mccfr.ExternalSamplingSolver(game)\n   for i in range(10000):\n       es_solver.iteration()\n   es_exploit = expl.exploitability(game, es_solver.average_policy())\n   print(f\"External sampling exploitability after 10k: {es_exploit:.6f}\")\n   \n   # Outcome sampling MCCFR\n   os_solver = mccfr.OutcomeSamplingSolver(game)\n   for i in range(10000):\n       os_solver.iteration()\n   os_exploit = expl.exploitability(game, os_solver.average_policy())\n   print(f\"Outcome sampling exploitability after 10k: {os_exploit:.6f}\")\n   ```\n\n2. **Compare convergence speed** \u2014 Run all three (vanilla CFR from Step 2, external sampling, outcome sampling) for [100, 500, 1000, 5000, 10000, 50000] iterations. Plot exploitability vs iterations AND exploitability vs wall-clock time.\n   - *Key insight to observe: per-iteration, vanilla CFR converges faster (lower variance). Per second, MCCFR wins big because iterations are cheaper.*\n\n3. **Explore Leduc Hold'em in OpenSpiel:**\n   ```python\n   game = pyspiel.load_game(\"leduc_poker\")\n   print(f\"Game type: {game.get_type()}\")\n   print(f\"Num distinct info sets: {game.num_distinct_action_histories()}\")\n   \n   state = game.new_initial_state()\n   print(state)\n   # Explore the game tree \u2014 Leduc has ~936 information sets vs Kuhn's ~12\n   ```\n   *Observe: Leduc is ~80x larger than Kuhn. Vanilla CFR is already noticeably slower here. This motivates MCCFR.*\n\n### Day 2: CFR+ and Convergence Comparison\n\n1. **Run CFR+ on Kuhn and Leduc via OpenSpiel:**\n   ```python\n   from open_spiel.python.algorithms import cfr\n   \n   game = pyspiel.load_game(\"leduc_poker\")\n   \n   # CFR+ solver\n   cfr_plus_solver = cfr.CFRPlusSolver(game)\n   for i in range(1000):\n       cfr_plus_solver.evaluate_and_update_policy()\n   exploit = expl.exploitability(game, cfr_plus_solver.average_policy())\n   print(f\"CFR+ exploitability after 1k: {exploit:.6f}\")\n   ```\n\n2. **Head-to-head convergence comparison on Leduc:**\n   - Run vanilla CFR, CFR+, external-sampling MCCFR all on Leduc for 5000 iterations\n   - Plot exploitability vs iterations (log-log) for all three\n   - *Expected result: CFR+ converges roughly as O(1/T) vs vanilla CFR's O(1/\u221aT) \u2014 a dramatic improvement*\n\n3. **Questions to answer by end of Day 2:**\n   - What's the difference between external sampling, outcome sampling, and chance sampling?\n   - Why is outcome sampling highest variance but cheapest per iteration?\n   - What modification does CFR+ make to regret accumulation, and why does it help?\n   - On Leduc, which algorithm reaches exploitability < 0.01 fastest (by wall time)?\n\n---\n\n## Phase 3: Targeted Reading (3 days)\n\n### Paper 1: Lanctot et al. \u2014 \"Monte Carlo Sampling for Regret Minimization in Extensive Games\" (2009)\n\n**Link:** https://papers.nips.cc/paper/2009/hash/00411460f7c92d2124a67ea0f4cb5f85-Abstract.html  \nhttp://mlanctot.info/files/papers/nips09mccfr.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (MCCFR framework \u2014 the unifying theory for all sampling variants),\n\u2502          Section 4 (External sampling, outcome sampling, chance sampling \u2014 the\n\u2502          three concrete instantiations),\n\u2502          Section 5 (Experiments \u2014 convergence plots on poker variants)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 framing the problem),\n\u2502          Section 2 (Background \u2014 you know this from Step 2)\n\u251c\u2500\u2500 SKIP:  Proofs in the appendix (unless you want deeper theory)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Unbiased counterfactual value estimation under sampling) \u2014\n\u2502             Read the STATEMENT. Key is: sampled counterfactual values are UNBIASED\n\u2502             estimates of the full-traversal counterfactual values. This is why\n\u2502             MCCFR converges to the same answer as vanilla CFR despite sampling.\n\u2502             Skim the proof structure only.\"\n\u2502          \u2192 \"Corollary 1 (Convergence rate of external sampling) \u2014 note that the\n\u2502             bound is the same O(1/\u221aT) as vanilla CFR but with a different constant.\n\u2502             The constant involves the number of actions |A| \u2014 bigger action spaces\n\u2502             mean more variance.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"MCCFR is not a different algorithm \u2014 it's the SAME algorithm\n    (CFR) applied to SAMPLED game tree blocks. External sampling visits all of\n    the traversing player's actions but samples the opponent's; outcome sampling\n    samples everything but requires importance-weighting. The tradeoff is\n    variance vs cost-per-iteration.\"\n```\n\n### Paper 2: Tammelin et al. \u2014 \"Solving Heads-Up Limit Texas Hold'em\" (2015)\n\nhttps://arxiv.org/abs/1407.5042 (originally appeared in AAAI 2015 / Science 2015)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (CFR+ algorithm \u2014 the three modifications: floor regrets at 0\n\u2502          instead of tracking negative, weight later iterations more, alternating\n\u2502          updates by player),\n\u2502          Section 3 (Experiments \u2014 how they \"solved\" HULHE)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the significance of solving a real poker variant),\n\u2502          Section 4 (Discussion)\n\u251c\u2500\u2500 SKIP:  Supplementary material on the computation cluster setup\n\u251c\u2500\u2500 MATH:  \u2192 \"The regret floor modification (Eq. 2 vs Eq. 1) \u2014 this is the core of\n\u2502             CFR+: instead of R(I,a) \u2190 R(I,a) + r, it uses R(I,a) \u2190 max(0, R(I,a) + r).\n\u2502             This is trivial to implement but has profound convergence effects.\n\u2502             No proof needed \u2014 understand it algorithmically.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"CFR+ makes three small changes to vanilla CFR, and the combined\n    effect is O(1/T) convergence instead of O(1/\u221aT). That's the difference between\n    needing 10^12 iterations and needing 10^6. This is what made it feasible to\n    'solve' Heads-Up Limit Hold'em with 10^14 information sets.\"\n```\n\n### Paper 3: Zinkevich et al. (2007) \u2014 Revisit Section 5\n\nhttps://arxiv.org/abs/0709.2092  \n*You read this in Step 2. Now revisit Section 5 (the Kuhn/Rhode Island experiments) with fresh eyes \u2014 you've now seen MCCFR and CFR+ convergence in Phase 2. Compare the convergence plots.*\n\n### Book: Chen & Ankenman \u2014 \"The Mathematics of Poker\" (2006)\n\n**Link:** No free version available. Purchase: https://www.amazon.com/Mathematics-Poker-Bill-Chen/dp/1886070253  \n**Assigned chapters:** 1\u20138  \n**Context \u2014 what comes before:** Nothing \u2014 Chapter 1 is the start.  \n**Context \u2014 what comes after (Ch 9\u2013end):** Ch 9\u201314 cover toy game solutions, multistreet play, tournament theory. *Relevant for poker intuition but not for CFR implementation. Can revisit during Step 13 (behavioral analysis pipelines) if working with poker data.*  \n**Reading focus:**\n- **Ch 1\u20133 (skim, ~1 hr):** EV basics, pot odds, fundamental theorem of poker. You know most of this from playing. Skim for formal vocabulary.\n- **Ch 4\u20135 (read, ~2 hrs):** Game-theoretic optimal play, exploitation, the balance between GTO and exploitative strategy. *This is the vocabulary that connects to Steps 7\u20138 (opponent modeling + safe exploitation).*\n- **Ch 6\u20138 (read key sections, ~2 hrs):** Half-street and full-street toy game solutions. These are the simplest games where you can see Nash equilibrium bluffing frequencies derived analytically. *Builds intuition for why the CFR output \"looks the way it does\" \u2014 the math explains the bluff/call frequencies.*\n\n**Note:** If you can't get this book, the poker-specific math can be substituted by reading Neller & Lanctot's worked examples more carefully and playing with Leduc. The book adds color and domain intuition but isn't algorithmically critical.\n\n### Optional Supplementary\n\n- **Schmid et al. (2018) \u2014 \"Variance Reduction in Monte Carlo Counterfactual Regret Minimization\"**  \n  https://arxiv.org/abs/1809.03057  \n  *VR-MCCFR adds baseline subtraction to reduce sampling variance. SKIM Sections 1\u20133 only. This technique reappears in Step 5 (Deep CFR relies on variance reduction).*\n\n- **Farina et al. (2020) \u2014 \"Stochastic Regret Minimization in Extensive-Form Games\"**  \n  https://arxiv.org/abs/2002.08493  \n  *Unifies sampling-based regret minimization. SKIM abstract only \u2014 good for bibliography mining.*\n\n### Math Flags\n\n\ud83d\udd22 **MCCFR unbiased estimation theorem (Lanctot et al., Theorem 1)** \u2014 Read statement only.  \n**WHY this can't be substituted:** Understanding that sampled updates are UNBIASED is crucial. If they were biased, MCCFR would converge to the wrong answer. The unbiasedness guarantee is what lets you trust the output of a noisy sampling process.\n\n\ud83d\udd22 **CFR+ regret floor (Tammelin et al.)** \u2014 Algorithmic understanding only, no proof.  \n**WHY:** The improvement from O(1/\u221aT) to O(1/T) is empirically observed and conjectured, not formally proven (Tammelin et al. don't provide a full convergence proof for CFR+). Know the mechanism, not the proof.\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: MCCFR for Leduc Hold'em + CFR+ for Kuhn/Leduc \u2014 From Scratch\n\n**Language + Framework:** Python 3.10+ / NumPy only (same constraint as Step 2)\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Leduc Hold'em game engine (6-card deck, 2 rounds, community card) | \ud83d\udd34 HAND-CODE | Leduc is significantly more complex than Kuhn (card dealing, 2 rounds, raise/call/fold logic, pot management). Building it teaches you the structure of a real poker variant. |\n| External-sampling MCCFR (sample opponent actions, traverse all of own) | \ud83d\udd34 HAND-CODE | Core contribution #1 of this step. The key difference from vanilla CFR is in how reach probabilities are handled under sampling. THE code to hand-write. |\n| Outcome-sampling MCCFR (sample full trajectory, importance weight) | \ud83d\udfe1 AI-ASSISTED | Once you've built external sampling, outcome sampling follows the same structure with importance weighting added. AI drafts it, you review and understand the weighting. |\n| CFR+ modifications (regret floor, alternating updates, linear weighting) | \ud83d\udd34 HAND-CODE | Three small changes to your Step 2 vanilla CFR. Each is ~5 lines, but understanding WHY each helps is the point. Apply to both Kuhn and Leduc. |\n| Exploitability computation for Leduc | \ud83d\udfe1 AI-ASSISTED | Same best-response algorithm as Step 2, but extended to a larger game tree. AI drafts the Leduc-specific traversal, you verify. |\n| Convergence comparison framework (run all variants, collect metrics, plot) | \ud83d\udfe2 AI-GENERATED | Experiment scaffolding \u2014 run N variants \u00d7 M iteration counts, store results, generate comparison plots. |\n| Plotting (convergence curves, strategy tables) | \ud83d\udfe2 AI-GENERATED | Matplotlib comparisons. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 Leduc Hold'em Game Engine:**\n- \ud83d\udd34 Implement: `leduc_holdem.py`\n  - Card representation: 6 cards = {J\u2660, J\u2665, Q\u2660, Q\u2665, K\u2660, K\u2665}\n  - Two rounds: pre-flop (2 hole cards dealt) \u2192 flop (1 community card)\n  - Actions: fold, call, raise (with bet sizes: 2 chips pre-flop, 4 chips on flop)\n  - Information sets: (player_hand, community_card_if_revealed, action_history)\n  - Terminal payoffs: pair > high card, ties split pot\n- Test: verify game tree has ~936 distinct info sets (or enumerate and count them)\n\n**Days 2\u20133 \u2014 External-Sampling MCCFR:**\n- \ud83d\udd34 Implement external sampling for both Kuhn and Leduc:\n  - When it's the traversing player's turn: try ALL actions (same as vanilla CFR)\n  - When it's the opponent's turn: SAMPLE one action according to the opponent's current strategy\n  - When it's a chance node: SAMPLE one outcome\n  - Regret updates only along the sampled path for opponent/chance\n- Run on Kuhn first (validate against Step 2 vanilla CFR \u2014 should converge to same Nash)\n- Run on Leduc \u2014 compare wall-clock time vs vanilla CFR to reach same exploitability\n\n**Day 4 \u2014 CFR+ Implementation:**\n- \ud83d\udd34 Modify your vanilla CFR from Step 2:\n  1. **Regret floor:** `cumulative_regret[a] = max(0, cumulative_regret[a] + instant_regret[a])` (instead of allowing negative accumulation)\n  2. **Alternating updates:** Update Player 1's regrets on odd iterations, Player 2's on even (instead of both every iteration)\n  3. **Linear averaging:** Weight iteration t's strategy by t (instead of uniform weighting)\n- Run on Kuhn: verify faster convergence than vanilla CFR\n- Run on Leduc: compare convergence vs vanilla CFR and MCCFR\n\n**Day 5 \u2014 Outcome Sampling + Full Comparison:**\n- \ud83d\udfe1 AI-ASSISTED: Outcome-sampling MCCFR \u2014 sample an entire trajectory (all players + chance), importance-weight the regret update\n- Compare all four algorithms on Leduc:\n  | Algorithm | Exploitability @ 10k iter | Wall time to reach exploit < 0.01 |\n  |-----------|---------------------------|----------------------------------|\n  | Vanilla CFR | ? | ? |\n  | External Sampling MCCFR | ? | ? |\n  | Outcome Sampling MCCFR | ? | ? |\n  | CFR+ | ? | ? |\n\n**Day 6 \u2014 Validation + Documentation:**\n- Compare your MCCFR Leduc output against OpenSpiel's MCCFR on Leduc\n- Compare your CFR+ output against OpenSpiel's CFR+\n- Generate all comparison plots\n- Document: which variant is best for Kuhn (small game) vs Leduc (medium game)? What would you choose for a truly large game?\n\n### Deliverables:\n- [ ] Leduc Hold'em game engine (fully tested, all 6 cards \u00d7 2 rounds \u00d7 raise/call/fold logic)\n- [ ] External-sampling MCCFR solver converging on both Kuhn and Leduc\n- [ ] Outcome-sampling MCCFR solver converging on Leduc\n- [ ] CFR+ solver converging on both Kuhn and Leduc (faster than vanilla CFR)\n- [ ] 4-way convergence comparison plot: vanilla CFR vs external MCCFR vs outcome MCCFR vs CFR+\n- [ ] Exploitability comparison table (exploitability @ fixed iterations + wall time to threshold)\n- [ ] All code committed with clear README\n\n### Validation:\n- **MCCFR on Kuhn:** Should converge to the same Nash equilibrium as your Step 2 vanilla CFR (within noise). Compare strategies \u2014 they should agree to ~2 decimal places at 50k iterations.\n- **CFR+ on Kuhn:** Should reach exploitability < 0.001 in ~1000 iterations (vs ~10000 for vanilla CFR). Verify ~10x speedup.\n- **Leduc:** Cross-validate exploitability values against OpenSpiel at [1k, 5k, 10k] iterations. Should agree within 15% (sampling variance).\n- **Convergence rates:** On log-log plot, CFR+ should show slope \u2248 -1.0 (vs vanilla CFR's \u2248 -0.5). MCCFR should show similar slope to vanilla CFR but reach same exploitability in less wall time.\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Reference Skim + Gap Fill\n\n- **Reference skim (book):** Chen & Ankenman Ch 4\u20135 if not already read \u2014 the game-theoretic optimal play vocabulary connects directly to the CFR output you've been computing.\n- **Reference skim (paper):** VR-MCCFR (Schmid et al., 2018) abstract + Section 2 \u2014 understand the idea of variance reduction baselines. *This bridges to Step 5: Deep CFR uses neural networks as function approximators, and understanding variance reduction here makes Deep CFR's design choices make sense.*\n- **Forward preview:** Skim the abstract of Brown et al. \"Deep CFR\" (2019) \u2014 you'll read it fully in Step 5, but see how it builds on MCCFR.\n- Review: any components of your implementation you don't fully understand?\n\n### Day 2 \u2014 One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 1] Monte Carlo methods (S&B Ch 5) sample trajectories instead of sweeping all states \u2192 [Step 3] MCCFR samples game tree paths instead of traversing the full tree. Same principle: trading bias-free estimation for variance in exchange for computational savings.\n    - [Step 2] Vanilla CFR traverses full tree O(|tree|) per iteration \u2192 [Step 3] MCCFR traverses O(|tree|/branching_factor) per iteration. Same convergence rate, dramatically cheaper per-iteration cost.\n    - [Step 2] Cumulative regrets can go negative \u2192 [Step 3] CFR+ floors regrets at zero. Parallels [Step 1] ReLU in neural networks \u2014 clipping negative activations/regrets both prevent \"dead\" units/actions.\n    - [Step 3] Outcome sampling uses importance weighting \u2192 prediction: [Step 5] Deep CFR will need similar variance-control techniques when using neural network approximations.\n  - **Confusions:**\n    - [Step 3] External sampling converges faster per iteration than outcome sampling, but outcome sampling is cheaper per iteration. When does the crossover happen where outcome sampling wins on wall time? \u2192 OPEN (likely depends on game size)\n    - [Step 3] CFR+ has O(1/T) convergence empirically but no formal proof. Is this a problem for the thesis? \u2192 OPEN (check if proofs exist by Step 6)\n    - [Step 2\u21923] My Step 2 confusion about \"average vs current strategy\" \u2014 I now see current strategy in MCCFR is used for SAMPLING (opponents play it), while average strategy is the output. The current strategy is the exploration mechanism. \u2192 RESOLVED by Step 3\n\n## Exit Checklist\n\n- [ ] Leduc Hold'em game engine working and tested\n- [ ] External-sampling MCCFR converging on both Kuhn and Leduc\n- [ ] Outcome-sampling MCCFR converging on Leduc\n- [ ] CFR+ converging on both Kuhn and Leduc, demonstrably faster than vanilla CFR\n- [ ] Can explain from memory: external vs outcome sampling tradeoffs (variance vs cost)\n- [ ] Can explain from memory: the three CFR+ modifications and why each helps\n- [ ] Can explain from memory: why MCCFR converges to the same answer as vanilla CFR (unbiased estimation)\n- [ ] 4-way convergence comparison with clear winner analysis\n- [ ] Cross-validated against OpenSpiel implementations\n- [ ] All \ud83d\udd34 components hand-coded\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 1\u20132 + new confusions + resolved confusions)\n- [ ] Step notes committed to repo\n",
  "step_04": "# Step 4 \u2014 Game Abstraction + Scaling Imperfect-Information Games\n\n**Duration:** 10 days (Tier 2 \u2014 compressed)  \n**Dependencies:** Step 2 (Game Theory + CFR Basics), Step 3 (CFR Variants + MC Methods)  \n**Phase:** B \u2014 Scaling the Toolbox\n\n> **Know-How First compression:** Implementation phase cut from 6d to 3d. Build one working abstraction example (card bucketing on Extended Leduc). Defer full abstraction pipeline (action abstraction, information abstraction comparison) to implementation phase post-November. All reading and intuition phases unchanged.\n> Phase allocation: Intuition 1d | Exploration 1d | Reading 3d | Implementation **3d** | Consolidation 2d  \n\n### PhD Connection\n\nThis step feeds **Contribution #1 (Behavioral Adaptation Framework)**: the abstraction pipeline determines the game representation that the adaptive agent will operate on. Poor abstraction limits how finely the agent can distinguish between opponent types. Also feeds **Contribution #3 (Evaluation Methodology)**: the exploitability-gap metric from this step becomes a standard evaluation measure. The Pareto frontier framework (abstraction size vs strategy quality) provides a template for evaluating tradeoffs in the thesis evaluation chapter.\n\n---\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Videos](#videos)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Information Abstraction \u2014 Card Bucketing in OpenSpiel](#day-1-information-abstraction-card-bucketing-in-openspiel)\n  - [Day 2: Action Abstraction \u2014 Restricting Bet Sizes](#day-2-action-abstraction-restricting-bet-sizes)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Paper 1: Gilpin & Sandholm \u2014 \"Lossless Abstraction of Imperfect Information Games\" (2007)](#paper-1-gilpin-sandholm-lossless-abstraction-of-imperfect-information-games-2007)\n  - [Paper 2: Johanson, Burch, Valenzano & Bowling \u2014 \"Evaluating State-Space Abstractions in Extensive-Form Games\" (2013)](#paper-2-johanson-burch-valenzano-bowling-evaluating-state-space-abstractions-in-extensive-form-games-2013)\n  - [Paper 3: Kroer & Sandholm \u2014 \"Imperfect-Recall Abstractions with Bounds in Games\" (2016)](#paper-3-kroer-sandholm-imperfect-recall-abstractions-with-bounds-in-games-2016)\n  - [Paper 4: Brown & Sandholm \u2014 \"Safe and Nested Subgame Solving for Imperfect-Information Games\" (2017)](#paper-4-brown-sandholm-safe-and-nested-subgame-solving-for-imperfect-information-games-2017)\n  - [Supplementary References](#supplementary-references)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: Abstraction Pipeline for Leduc & Extended Leduc \u2014 From Scratch](#project-abstraction-pipeline-for-leduc-extended-leduc-from-scratch)\n  - [Sub-phase Breakdown (6 days):](#sub-phase-breakdown-6-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Reference Skim + Architecture Preview](#day-1-reference-skim-architecture-preview)\n  - [Day 2 \u2014 One-Pager + Learning Log](#day-2-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY abstraction is needed (games are too large to represent in memory), what the two types of abstraction ARE (information abstraction = grouping similar game states; action abstraction = reducing the set of available moves), and what the danger IS (bad abstraction \u2192 bad strategies). End of day: you should be able to explain to a non-expert: \"Texas Hold'em has 10^161 game states. We can't store them all, so we group similar ones together \u2014 like calling a king-high flush the same whether it's spades or hearts. The trick is choosing groups that don't throw away strategic differences.\"\n\n### Videos\n\n- **Stanford CS221 \u2014 Lecture 10: Games I (Autumn 2025)**  \n  https://www.youtube.com/watch?v=SMOD_GiRzb8  \n  Duration: ~1h13m | Instructor: Percy Liang (Stanford)  \n  *Why search explodes: game trees, minimax, evaluation functions, alpha-beta pruning. The motivation for why abstraction is needed \u2014 games are too large to solve exactly.*\n\n- **Monte Carlo Tree Search \u2014 Computerphile**  \n  https://www.youtube.com/watch?v=BEFY7IHs0HM  \n  Duration: ~33m | Speaker: Nick Hawes (Oxford) | Channel: Computerphile  \n  *Why brute-force fails and how sampling-based search (MCTS) provides an alternative to full enumeration. The conceptual bridge from \"traverse everything\" to \"sample intelligently.\"*\n\n- **NIPS 2017 Best Paper \u2014 Safe & Nested Subgame Solving for Imperfect-Information Games**  \n  https://www.youtube.com/watch?v=tRiaGahlyy4  \n  Duration: ~16m | Channel: The Artificial Intelligence Channel  \n  *Accessible walkthrough of how subgame solving fixes abstraction errors in real-time during play. The key idea: solve a coarse abstract game first, then refine specific subgames.*\n\n- **AI for Imperfect-Information Games: Beating Top Humans in No-Limit Poker**  \n  https://www.youtube.com/watch?v=McV4a6umbAY  \n  Duration: ~1h | Speaker: Noam Brown | Channel: Microsoft Research  \n  *Full deep-dive into the Libratus architecture: how card abstraction groups similar hands, how action abstraction restricts bet sizes, how strategies are translated back, and how subgame solving patches errors.*\n\n- **Stanford CS234 \u2014 Lecture 15: Value Alignment (Spring 2024)**  \n  https://www.youtube.com/watch?v=FOlPpjNbHjE  \n  Duration: ~1h14m | Instructor: Emma Brunskill + Dan Webber (Stanford)  \n  *Covers MCTS and AlphaZero \u2014 the search methods used inside modern game AI when doing depth-limited solving at the game tree's frontier, exactly where abstraction matters most.*\n\n### Blog Posts / Accessible Reads\n\n- **Science Magazine \u2014 \"Superhuman AI for heads-up no-limit poker: Libratus beats top professionals\" (2017)**  \n  https://www.science.org/doi/10.1126/science.aao1733  \n  *The Libratus paper in Science format \u2014 read the first 3 pages for a clear, non-technical description of how abstraction + solving works in practice.*\n\n- **Papers With Code \u2014 \"Game Abstraction\" task page**  \n  https://paperswithcode.com/task/game-abstraction  \n  *Quick overview of what's been done + links to implementations. Check if any new benchmarks have appeared.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Visualizing K-Means Clustering](https://www.naftaliharris.com/blog/visualizing-k-means-clustering/)** \u2014 Abstraction connects deeply with clustering. Play with this K-Means interactive to build intuition on grouping similar game states.\n\n\n### Day 1: Information Abstraction \u2014 Card Bucketing in OpenSpiel\n\n1. **Explore Leduc Hold'em information sets from Step 3:**\n   - From your Step 3 Leduc engine, enumerate all 936 information sets\n   - Group them manually by \"strategic similarity\":\n     - Pre-flop with J vs Q vs K (3 groups)\n     - Post-flop with pair (J+J, Q+Q, K+K \u2192 3 groups) vs non-pair (J+Q, J+K, Q+K, etc. \u2192 6 groups)\n   - *Observe: Leduc has natural abstraction because suits don't matter. If you had J\u2660 and J\u2665 as separate info sets, collapsing them is a LOSSLESS abstraction \u2014 no strategic information is lost.*\n\n2. **Run MCCFR on Leduc with suit isomorphism explicitly applied:**\n   - Modify your Step 3 Leduc engine to collapse suit-isomorphic states\n   - Run MCCFR on the abstracted game tree\n   - *Expected result: identical Nash equilibrium strategies, fewer info sets to store, faster convergence*\n\n3. **Experiment with a LOSSY information abstraction:**\n   - Collapse J and Q into one \"low card\" bucket, keep K separate\n   - Run MCCFR on this 2-bucket abstraction\n   - Compare the resulting strategy against the exact Nash equilibrium\n   - *Observe: the abstract strategy will be WRONG. The differences between J and Q matter strategically. This is the danger of lossy abstraction.*\n\n### Day 2: Action Abstraction \u2014 Restricting Bet Sizes\n\n1. **Create a \"Mini NLHE\" variant in your engine:**\n   - Take Leduc Hold'em and allow variable bet sizes: {0.5\u00d7pot, 1\u00d7pot, 2\u00d7pot, all-in}\n   - *This creates a much larger game tree (each decision point now has 4+ choices instead of 2)*\n   - Count info sets \u2192 should be ~10k+ depending on implementation\n\n2. **Apply action abstraction:**\n   - Abstract: allow only {fold, call, pot-size bet}\n   - Run MCCFR on abstracted version\n   - Translate strategies back to the full game using nearest-action mapping\n   - *Observe: the translated strategy won't be Nash for the full game, but will be \"close.\" How close?*\n\n3. **Measure abstraction quality:**\n   - Compute exploitability of the abstract strategy when deployed in the full game\n   - Compare: full-game Nash exploitability (the target) vs abstracted strategy's exploitability\n   - *This gap is the \"price of abstraction\" \u2014 the central quantity this step teaches you to manage.*\n\n4. **Questions to answer by end of Day 2:**\n   - What's the difference between information abstraction and action abstraction?\n   - When is abstraction lossless vs lossy? What makes it lossless?\n   - What happens when an opponent plays an action that isn't in your abstraction? (action translation problem)\n   - Why can't you just pick the finest-grained abstraction possible? (memory + computation tradeoff)\n\n---\n\n## Phase 3: Targeted Reading (3 days)\n\n### Paper 1: Gilpin & Sandholm \u2014 \"Lossless Abstraction of Imperfect Information Games\" (2007)\n\nhttps://dl.acm.org/doi/10.5555/1625275.1625300  \nhttps://www.cs.cmu.edu/~sandholm/lossless.jacm.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (Game-theoretic background \u2014 skim if comfortable from Step 2),\n\u2502          Section 3 (Ordered Game Isomorphisms \u2014 THE key concept: what makes an\n\u2502          abstraction information-preserving/lossless),\n\u2502          Section 4 (Algorithm for finding lossless abstractions \u2014 GameShrink \n\u2502          algorithm)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 framing),\n\u2502          Section 5 (Experiments \u2014 reduction sizes on poker variants),\n\u2502          Section 6 (Related work)\n\u251c\u2500\u2500 SKIP:  Proofs in Section 3 (unless you want to verify the isomorphism guarantees)\n\u251c\u2500\u2500 MATH:  \u2192 \"Definition 3 (Ordered Game Isomorphism) \u2014 read and understand the \n\u2502             formal definition. This is NOT optional math \u2014 it's the criterion you \n\u2502             use to decide whether a proposed abstraction is lossless. If you get \n\u2502             this wrong, your abstracted strategy could be arbitrarily bad.\"\n\u2502          \u2192 \"Theorem 1 (GameShrink finds all ordered game isomorphisms) \u2014 read \n\u2502             the statement. This tells you the algorithm is COMPLETE \u2014 it won't\n\u2502             miss any lossless abstractions of this type.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Not all abstractions are equal. Lossless abstraction GUARANTEES\n    the Nash equilibrium of the abstract game IS a Nash equilibrium of the original\n    game. Lossy abstraction introduces error with no upper bound unless you work\n    to bound it. Always prefer lossless when possible; use lossy only at scale.\"\n```\n\n### Paper 2: Johanson, Burch, Valenzano & Bowling \u2014 \"Evaluating State-Space Abstractions in Extensive-Form Games\" (2013)\n\nhttps://poker.cs.ualberta.ca/publications/AAMAS13-abstraction.pdf\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Earth Mover's Distance for evaluating abstraction quality \u2014\n\u2502          THE quantitative measure of how much information a lossy abstraction \n\u2502          throws away),\n\u2502          Section 4 (Experiments \u2014 how abstraction granularity maps to strategy\n\u2502          quality on poker variants)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Background \u2014 you know this),\n\u2502          Section 5 (Related work),\n\u2502          Section 6 (Conclusions)\n\u251c\u2500\u2500 SKIP:  None \u2014 this paper is concise\n\u251c\u2500\u2500 MATH:  \u2192 \"Definition 1 (EMD between abstract and real game distributions) \u2014\n\u2502             understand the formula. It's the metric you'll use to evaluate YOUR\n\u2502             abstractions in Phase 4.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Abstraction quality isn't binary \u2014 it's a spectrum measurable \n    by Earth Mover's Distance. This gives you a principled way to CHOOSE between \n    abstraction granularities: finer = better strategy but more memory/compute, \n    coarser = faster but worse strategy. The optimal point depends on your \n    computational budget.\"\n```\n\n### Paper 3: Kroer & Sandholm \u2014 \"Imperfect-Recall Abstractions with Bounds in Games\" (2016)\n\nhttps://arxiv.org/abs/1409.3302\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Bounded imperfect-recall abstractions \u2014 how to deliberately \n\u2502          forget information while maintaining error guarantees),\n\u2502          Section 4 (The A-EFCE solution concept and its properties)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Background),\n\u2502          Section 5 (Experiments),\n\u2502          Section 6 (Conclusion)\n\u251c\u2500\u2500 SKIP:  Full proofs in Section 3 (read theorem statements only)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Error bound for imperfect-recall abstraction) \u2014 read the \n\u2502             STATEMENT. This is the first result showing that lossy abstraction \n\u2502             can have provable error guarantees. Know that the bound exists and \n\u2502             what it depends on (abstraction granularity + game structure).\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Imperfect recall (deliberately forgetting past information) is a \n    powerful abstraction technique \u2014 it can reduce game size exponentially. \n    Kroer & Sandholm show it doesn't have to be blind loss: you can compute \n    error bounds. This is the theoretical basis for practical card bucketing in \n    large poker games.\"\n```\n\n### Paper 4: Brown & Sandholm \u2014 \"Safe and Nested Subgame Solving for Imperfect-Information Games\" (2017)\n\nhttps://arxiv.org/abs/1705.02955\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Subgame solving \u2014 how Libratus/Pluribus refines the abstract \n\u2502          blueprint strategy in real time for specific game subtrees),\n\u2502          Section 4 (Nested subgame solving \u2014 recursive refinement)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132 (Motivation and Unsafe subgame solving),\n\u2502          Section 5 (Experiments \u2014 results on poker variants)\n\u251c\u2500\u2500 SKIP:  Proofs (read for understanding, not derivation)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Safety guarantee of subgame solving) \u2014 read the \n\u2502             STATEMENT. This guarantee is what makes subgame solving 'safe':\n\u2502             the resolved strategy cannot be more exploitable than the original \n\u2502             blueprint. Critical for understanding how abstraction errors get \n\u2502             fixed in practice.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Abstraction creates errors. Subgame solving FIXES those errors \n    in real-time at specific game states. Together, 'abstract blueprint + \n    real-time subgame solving' is the architecture behind EVERY competitive \n    poker AI since 2017. Step 6 studies the full architectures that use this.\"\n```\n\n### Supplementary References\n\n- **Li, W. et al. (2024) \u2014 \"RL-CFR: A New RL Framework for Action Abstraction in Imperfect Information Extensive-Form Games\"**  \n  https://arxiv.org/abs/2403.14114  \n  *Uses RL to learn action abstractions instead of hand-crafting them. Bridges Step 1 (RL) \u2192 Step 4 (abstraction). SKIM abstract + Section 3 (RL-CFR method). Log as potential enrichment for Steps 5\u20136.*\n\n- **Fu, H. et al. (2025) \u2014 \"No-Regret Strategy Optimization with KrwEmd Metric for Imperfect-Recall Abstraction\" (AAAI 2026)**  \n  https://arxiv.org/abs/2411.16111  \n  *Frontier work on abstraction metrics. SKIM abstract only. Log for Step 15 (frontier mapping).*\n\n### Math Flags\n\n\ud83d\udd22 **Ordered Game Isomorphism (Gilpin & Sandholm, Definition 3)** \u2014 Must understand the formal definition.  \n**WHY this can't be substituted:** This definition IS the criterion for lossless abstraction. If you can check whether a proposed grouping satisfies this definition, you know the abstraction preserves Nash equilibria. Without it, you're guessing.\n\n\ud83d\udd22 **Earth Mover's Distance for abstraction quality (Johanson et al., Definition 1)** \u2014 Must understand the metric.  \n**WHY:** EMD gives you a NUMBER for how much information your abstraction throws away. It's the quantitative tool for comparing abstractions, and you'll use it in your implementation (Phase 4).\n\n\ud83d\udd22 **Subgame solving safety guarantee (Brown & Sandholm, Theorem 1)** \u2014 Read statement.  \n**WHY:** This theorem is the bridge between \"abstraction introduces errors\" and \"those errors don't kill you in practice.\" It's the safety net that makes the entire abstract-then-resolve pipeline trustworthy. Feeds directly into Step 8 (Safe Exploitation).\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: Abstraction Pipeline for Leduc & Extended Leduc \u2014 From Scratch\n\n**Language + Framework:** Python 3.10+ / NumPy only (same constraint as Steps 2\u20133)\n\nStarting point: Your Leduc Hold'em engine + MCCFR solver from Step 3.\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Lossless abstraction module (suit isomorphism detection + GameShrink-style merger) | \ud83d\udd34 HAND-CODE | This is the core contribution of this step. You must be able to identify when two info sets are strategically equivalent and merge them correctly. The merge logic must preserve the game structure. |\n| Lossy card bucketing module (k-means on hand features \u2192 card buckets) | \ud83d\udd34 HAND-CODE | You need to understand how card bucketing works \u2014 choosing features (hand strength, potential, board interaction), the clustering step, and mapping info sets to bucket IDs. This is what every poker AI uses. |\n| Action abstraction module (restrict bet sizes to a fixed set + action translation) | \ud83d\udd34 HAND-CODE | Action translation is the tricky part: when an opponent plays a bet that's not in your abstraction, how do you map it to the nearest abstract action? This mapping introduces systematic error that you must understand. |\n| Extended Leduc variant (4 ranks, 2 suits \u2192 8 cards, allowing multiple bet sizes) | \ud83d\udfe1 AI-ASSISTED | Extension of your Step 3 Leduc engine. The game logic follows the same pattern, just larger. AI drafts the extension, you verify the game tree is correct. |\n| Abstraction quality evaluation (exploitability of abstract strategy in full game) | \ud83d\udd34 HAND-CODE | Computing exploitability in the full game after translating back from the abstract game is the key diagnostic. You must own this computation \u2014 it's the metric that judges your abstraction. |\n| Convergence + comparison framework | \ud83d\udfe2 AI-GENERATED | Run configurations, store results, generate plots. |\n| Plotting (abstraction size vs strategy quality, convergence curves) | \ud83d\udfe2 AI-GENERATED | Matplotlib visualizations. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 Lossless Abstraction on Leduc:**\n- \ud83d\udd34 Implement suit isomorphism detection:\n  - For each info set, check: can swapping suits produce an identical strategic situation?\n  - If yes, merge the info sets into a single abstract info set\n  - Example: In Leduc, J\u2660 vs community Q\u2660 is strategically identical to J\u2665 vs community Q\u2665 \u2192 merge\n- Run MCCFR on the abstracted game\n- Verify: same Nash equilibrium, fewer info sets (~468 instead of ~936)\n- *This is the \"freebie\" \u2014 lossless abstraction costs nothing strategically but halves memory*\n\n**Day 2 \u2014 Lossy Card Bucketing:**\n- \ud83d\udd34 Implement hand-strength-based card bucketing:\n  - Feature: hand strength = probability of winning against a random opponent hand given the current board\n  - Compute hand strength for every possible (hand, board) combination in Leduc\n  - Cluster into k buckets using k-means (try k = 2, 3, 5, \"full\")\n  - Map each info set to its bucket\n- Run MCCFR on each abstraction granularity\n- Compare: exploitability of abstract-then-translate strategy vs exact Nash\n- Expected: k=5 \u2248 near-exact; k=2 = noticeably exploitable\n\n**Day 3 \u2014 Action Abstraction + Action Translation:**\n- \ud83d\udd34 Extend Leduc with variable bet sizing (half-pot, pot, 2\u00d7pot, all-in)\n- \ud83d\udd34 Implement action abstraction: restrict to {fold, call, pot-bet}\n- \ud83d\udd34 Implement action translation for unmapped bets:\n  - When opponent bets 0.5\u00d7pot but your abstraction only has \"pot\": allocate probability to nearest abstract actions proportionally\n  - Test two strategies: (a) map to nearest abstract action, (b) split probability between two nearest\n  - Compare exploitability of both translation methods\n- *This is the hardest/most subtle part \u2014 action translation errors are where practical poker AIs lose the most equity*\n\n**Day 4 \u2014 Extended Leduc + Combined Abstraction:**\n- \ud83d\udfe1 AI-ASSISTED: Build Extended Leduc (4 ranks: J, Q, K, A; 2 suits each \u2192 8 cards, but still 2 rounds)\n  - This creates ~5000+ info sets \u2014 large enough that unabstracted MCCFR is slow\n- \ud83d\udd34 Apply both card bucketing (k=3 buckets) + suit isomorphism simultaneously\n- \ud83d\udd34 Apply action abstraction on top\n- Run MCCFR on the triple-abstracted game\n- Measure: total info set reduction ratio and strategy quality degradation\n\n**Day 5 \u2014 Abstraction Quality Evaluation:**\n- \ud83d\udd34 Implement abstraction quality metrics:\n  - Exploitability gap: `exploit(abstract_strategy, full_game) - exploit(Nash, full_game)`\n  - If you implemented EMD from the Johanson et al. paper: measure EMD between abstract and full-game distributions\n  - Create a graph: **abstraction size (number of info sets) vs strategy quality (exploitability)**\n  - *This is the key deliverable \u2014 the Pareto frontier of abstraction*\n- Compare all abstraction configurations:\n  | Config | Info Sets | Exploitability | Solve Time |\n  |--------|-----------|---------------|------------|\n  | No abstraction | ~5000+ | baseline (Nash) | slow |\n  | Suit isomorphism only | ~2500 | = Nash (lossless) | 2x faster |\n  | 5 card buckets + suits | ~500 | slight degradation | 10x faster |\n  | 3 card buckets + action abstract | ~200 | moderate degradation | 25x faster |\n  | 2 card buckets + action abstract | ~100 | significant degradation | 50x faster |\n\n**Day 6 \u2014 Cross-Validation + Documentation:**\n- Cross-validate your Leduc abstractions against OpenSpiel (run OpenSpiel's CFR on the same abstract games, compare strategies)\n- Optionally: skim the Libratus Science paper (Brown & Sandholm 2017) architecture diagram \u2014 identify where abstraction and subgame solving fit. *Don't go deep \u2014 that's Step 6. Just identify the components.*\n- Document the tradeoff results\n- Write all deliverables\n\n### Deliverables:\n- [ ] Lossless abstraction module (suit isomorphism) working on Leduc\n- [ ] Lossy card bucketing module with configurable k\n- [ ] Action abstraction module with action translation\n- [ ] Extended Leduc Hold'em variant (4 ranks, 2 suits)\n- [ ] Combined abstraction pipeline (card bucketing + suit isomorphism + action abstraction)\n- [ ] Abstraction quality evaluation: exploitability gap per configuration\n- [ ] Pareto frontier plot: abstraction size vs strategy quality\n- [ ] All code committed with README\n\n### Validation:\n- **Lossless abstraction on Leduc:** Nash equilibrium must be IDENTICAL to unabstracted Leduc (zero exploitability gap). Info set count should halve.\n- **Lossy card bucketing:** Exploitability should monotonically decrease as k increases (finer buckets \u2192 better strategy). At k = \"full\" (no bucketing), exploitability should match exact Nash.\n- **Action abstraction:** Exploitability gap should be positive (abstraction always hurts at least a little for lossy) but bounded. Both translation methods should produce playable strategies.\n- **Cross-validation:** Your abstracted-game Nash strategies should agree with OpenSpiel's to within 5% on strategy probabilities at matched info sets.\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Reference Skim + Architecture Preview\n\n- **Reference skim (paper):** Brown & Sandholm \"Superhuman AI for Multiplayer Poker\" (Pluribus, Science 2019) \u2014 read Section 2 (Methods) only. Identify: where does card abstraction happen? Where does action abstraction happen? How does subgame solving interact with the abstract blueprint?  \n  *This is a PREVIEW for Step 6 \u2014 don't go deep. Just map the architecture components to what you've built in this step.*\n\n- **Reference skim (supplementary):** Li et al. (2024) \"RL-CFR\" \u2014 read abstract + Section 3. Note the idea of using RL to learn abstractions rather than hand-crafting them.  \n  *Forward connection: In your thesis, could the opponent modeling framework (Step 7) inform adaptive abstraction? Log this as a PhD open question.*\n\n- **Reference skim (supplementary):** Fu et al. (2025) \"KrwEmd\" \u2014 read abstract only. Note the new abstraction metric.  \n  *Frontier logging: Could this replace EMD as the standard abstraction quality metric? Log for Step 15.*\n\n- Review: any components of your implementation you don't fully understand?\n\n### Day 2 \u2014 One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 2] Vanilla CFR computes Nash on the full game tree \u2192 [Step 4] Abstraction shrinks that tree so CFR/MCCFR can handle larger games. Abstraction is the SCALING mechanism that makes Steps 2\u20133 algorithms practical.\n    - [Step 3] MCCFR reduces per-iteration cost via sampling \u2192 [Step 4] Abstraction reduces the total game tree size. These are ORTHOGONAL scaling techniques that compose: abstract game + MCCFR = both dimensions compressed.\n    - [Step 1] Policy improvement (Sutton & Barto Ch 4) iterates between evaluation and improvement \u2192 [Step 4] Subgame solving iterates between blueprint (abstract) and refinement (real-time). Same iterate-and-refine pattern.\n    - [Step 4] Action translation = mapping unseen actions to known abstractions \u2192 prediction: [Step 7] Opponent modeling will need similar \"map unseen behavior to known types\" logic.\n    - [Step 4] Abstraction quality \u2192 Step 5 replaces hand-crafted abstraction with neural approximation (Deep CFR). The progression: hand-craft (Step 4) \u2192 learn (Step 5) \u2192 integrate (Step 6).\n  - **Confusions:**\n    - [Step 4] Action translation: nearest-action vs probability-split mapping \u2014 which is theoretically better? The papers don't give a clear answer. \u2192 OPEN (may be addressed in Brown & Sandholm 2017 subgame solving paper)\n    - [Step 4] Imperfect-recall abstraction requires forgetting past information. How do you decide WHAT to forget? Kroer & Sandholm give bounds, but the design space is huge. \u2192 OPEN (possibly resolved in Step 6 or Step 15 frontier)\n    - [Step 3\u21924] MCCFR on an abstracted game: does sampling interact badly with abstraction? (Variance from sampling + error from abstraction \u2014 do they compound?) \u2192 OPEN (check during Step 5)\n\n## Exit Checklist\n\n- [ ] Lossless abstraction (suit isomorphism) produces identical Nash on Leduc\n- [ ] Lossy card bucketing produces strategies with measurable quality degradation as k decreases\n- [ ] Action abstraction + action translation pipeline working end-to-end\n- [ ] Extended Leduc variant working with ~5000+ info sets\n- [ ] Combined abstraction pipeline tested on Extended Leduc\n- [ ] Pareto frontier plot: abstraction size vs exploitability gap\n- [ ] Can explain from memory: lossless vs lossy abstraction and when each is appropriate\n- [ ] Can explain from memory: action translation problem and its solutions\n- [ ] Can explain from memory: subgame solving's role in fixing abstraction errors (Brown & Sandholm)\n- [ ] Cross-validated against OpenSpiel implementations\n- [ ] All \ud83d\udd34 components hand-coded\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 1\u20133 + new confusions + resolved confusions)\n- [ ] Step notes committed to repo\n",
  "step_05": "# Step 5 \u2014 Neural Equilibrium Approximation (Deep CFR, DREAM)\n\n**Duration:** 11 days (Tier 2 \u2014 compressed)  \n**Dependencies:** Step 1 (RL Basics), Step 3 (CFR Variants + MC Methods), Step 4 (Game Abstraction + Scaling)  \n**Phase:** C \u2014 Neural Methods for Games\n\n> **Know-How First compression:** Implementation phase cut from 6d to 3d. Get Deep CFR running on Leduc with correct exploitability convergence. Understand DREAM conceptually (reading + exploration). Defer full DREAM implementation and head-to-head Deep CFR vs. DREAM benchmark to implementation phase post-November. All reading and intuition phases unchanged.\n> Phase allocation: Intuition 1d | Exploration 2d | Reading 3d | Implementation **3d** | Consolidation 2d  \n\n### PhD Connection\n\nThis step feeds **Contribution #1 (Behavioral Adaptation Framework)** directly: Deep CFR's advantage networks are the technical mechanism for computing baseline strategies in games too large for tabular CFR. The information state encoding designed here (tensor representation of game state) becomes the foundation for the opponent modeling input in Step 7. NFSP's anticipatory parameter \u03b7 foreshadows the exploitation-safety tradeoff central to Step 8 and the thesis.\n\n---\n\n> **Phase Overview:** Phases A and B established tabular equilibrium solvers and abstraction techniques for medium-scale games. However, tabular methods store explicit strategy and regret values at every information set \u2014 an approach whose memory requirements grow linearly with game size and become prohibitive for large-scale domains. This phase replaces tabular storage with neural network function approximation, enabling equilibrium computation without explicit game tree enumeration.\n\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Bridge: Neural Network Foundations for RL](#bridge-neural-network-foundations-for-rl)\n  - [Videos](#videos)\n  - [Blog Posts](#blog-posts)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Deep CFR in OpenSpiel](#day-1-deep-cfr-in-openspiel)\n  - [Day 2: NFSP in OpenSpiel + Advantage Network Internals](#day-2-nfsp-in-openspiel-advantage-network-internals)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Preliminary Reading: Function Approximation Theory](#preliminary-reading-function-approximation-theory)\n  - [Paper 1: Brown, Lerer, Gross & Sandholm \u2014 \"Deep Counterfactual Regret Minimization\" (2019)](#paper-1-brown-lerer-gross-sandholm-deep-counterfactual-regret-minimization-2019)\n  - [Paper 2: Steinberger \u2014 \"Single Deep Counterfactual Regret Minimization\" (2019)](#paper-2-steinberger-single-deep-counterfactual-regret-minimization-2019)\n  - [Paper 3: Heinrich & Silver \u2014 \"Deep Reinforcement Learning from Self-Play in Imperfect-Information Games\" (2016)](#paper-3-heinrich-silver-deep-reinforcement-learning-from-self-play-in-imperfect-information-games-2016)\n  - [Supplementary References](#supplementary-references)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: Deep CFR for Leduc Hold'em \u2014 From Scratch in PyTorch](#project-deep-cfr-for-leduc-holdem-from-scratch-in-pytorch)\n  - [Sub-phase Breakdown (6 days):](#sub-phase-breakdown-6-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Reference Skim + Gap Fill](#day-1-reference-skim-gap-fill)\n  - [Day 2 \u2014 One-Pager + Learning Log](#day-2-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY we need neural networks in CFR (tabular CFR can't handle full-scale games even WITH abstraction), what Deep CFR does differently (replaces the regret table with neural networks that generalize across similar states), and where NFSP fits (a completely different approach \u2014 RL-based instead of CFR-based). End of day: you should be able to explain to a non-expert: \"Instead of memorizing the best strategy for every possible poker situation \u2014 which would take more memory than exists on Earth \u2014 we train a neural network to PREDICT what the best response would be. It's like learning a general rule instead of memorizing every answer.\"\n\n### Bridge: Neural Network Foundations for RL\n\n> **Why this section exists:** In Step 1, you implemented DQN and PPO \u2014 but the focus was on the RL algorithm, not on WHY neural networks work as function approximators. Before diving into Deep CFR (which replaces tabular regret with neural networks), you need a solid understanding of what a neural network actually computes, how gradient descent trains it, and what happens when you combine function approximation with bootstrapping (the \"deadly triad\"). This bridge fills the gap between tabular RL (Sutton & Barto Ch 1\u20136) and the neural methods in Phase C.\n\n**Neural Network Mechanics (~1.5 hours):**\n\n- **3Blue1Brown \u2014 \"But what is a Neural Network?\" (Chapter 1)**\n  https://www.3blue1brown.com/lessons/neural-networks\n  https://www.youtube.com/watch?v=aircAruvnKk\n  Duration: ~19m | Creator: Grant Sanderson\n  *Start here. What neurons, weights, biases, and activations actually ARE \u2014 introduced through handwritten digit recognition. This grounds the abstract \"neural network\" concept you've seen in DQN/PPO code (q_network.py's Linear layers, ReLU activations) in concrete visual intuition.*\n\n- **3Blue1Brown \u2014 \"Gradient descent, how neural networks learn\" (Chapter 2)**\n  https://www.3blue1brown.com/lessons/gradient-descent\n  https://www.youtube.com/watch?v=IHZwWFHWa-w\n  Duration: ~21m | Creator: Grant Sanderson\n  *How the cost function works and why gradient descent finds good weights. After watching: you'll understand what loss.backward() and optimizer.step() in your DQN train_step actually do \u2014 they compute the gradient of the loss and nudge all 33,000+ weights downhill.*\n\n- **3Blue1Brown \u2014 \"What is backpropagation really doing?\" (Chapter 4)**\n  https://www.3blue1brown.com/lessons/backpropagation\n  https://www.youtube.com/watch?v=Ilg3gGewQ5U\n  Duration: ~14m | Creator: Grant Sanderson\n  *The intuition behind backpropagation \u2014 how each training example \"wants\" to nudge the weights, and how averaging these desires across a mini-batch gives the gradient. This is exactly what happens inside your DQN's train_step when PyTorch calls .backward().*\n\n- **3Blue1Brown \u2014 \"Backpropagation calculus\" (Chapter 5)**\n  https://www.3blue1brown.com/lessons/backpropagation-calculus\n  https://www.youtube.com/watch?v=tIeHLnjs5U8\n  Duration: ~10m | Creator: Grant Sanderson\n  *Optional but recommended: the chain rule math behind backpropagation. If the previous video gave you the intuition, this one gives you the equations. Skip if you're comfortable with the conceptual version.*\n\n**Function Approximation in RL (~1.5 hours):**\n\n- **David Silver \u2014 Lecture 6: Value Function Approximation**\n  https://www.youtube.com/watch?v=2pWv7GOvuf0&list=PLqYmG7hTraZDM-OYHWgPebj2MfCFzFObQ (Lecture 6 in playlist)\n  Slides: https://davidstarsilver.wordpress.com/wp-content/uploads/2025/04/lecture-6-value-function-approximation-.pdf\n  Duration: ~1h20m | Instructor: David Silver (DeepMind / UCL)\n  *THE bridge lecture. Covers: why tables fail in large state spaces, linear function approximation, neural network approximation, convergence guarantees (and when they break), the deadly triad (function approximation + bootstrapping + off-policy = instability). After watching: you'll understand WHY DQN needs target networks and experience replay \u2014 they're engineering patches for the deadly triad. This directly explains the design decisions in your Step 1 implementation.*\n\n**\ud83d\udd17 Connection to Step 1:** After watching these, revisit your DQN code mentally:\n- `q_network.py` \u2192 the MLP architecture (3Blue1Brown Ch 1)\n- `loss.backward()` in `train_step` \u2192 backpropagation (3Blue1Brown Ch 4-5)\n- `optimizer.step()` \u2192 gradient descent (3Blue1Brown Ch 2)\n- Target network + replay buffer \u2192 deadly triad mitigation (David Silver L6)\n- The 33,000+ parameters in your [128,128] network \u2192 the weight matrices 3Blue1Brown visualizes\n\n### Videos\n\n- **Stanford CS234 \u2014 Lecture 4: Q-learning and Function Approximation (Spring 2024)**  \n  https://www.youtube.com/watch?v=b_wvosA70f8  \n  Duration: ~1h19m | Instructor: Emma Brunskill (Stanford)  \n  *The bridge from tabular to neural: Q-learning, SARSA, and why function approximation is needed when state spaces are too large for tables. The foundational concept that Deep CFR builds on.*\n\n- **Stanford CS224R \u2014 Lecture 6: Q-Learning (Spring 2025)**  \n  https://www.youtube.com/watch?v=-7kv6jf0isQ  \n  Duration: ~1h2m | Instructor: Chelsea Finn (Stanford)  \n  *DQN, target networks, experience replay buffers \u2014 the practical deep RL building blocks. Covers how to stabilize Q-learning in practice with neural networks.*\n\n- **ReBeL \u2014 Combining Deep RL and Search for Imperfect-Information Games (Explained)**  \n  https://www.youtube.com/watch?v=BhUWvQmLzSk  \n  Duration: ~1h12m | Channel: Yannic Kilcher  \n  *Detailed paper explanation covering how neural networks replace tabular CFR: from counterfactual values to learned value functions, public belief states, and the transition from tabular to neural game solving.*\n\n- **Player of Games: All the games, one algorithm! (w/ author Martin Schmid)**  \n  https://www.youtube.com/watch?v=U0mxx7AoNz0  \n  Duration: ~54m | Channel: Yannic Kilcher  \n  *Interview with the author covering how Student of Games unifies Deep CFR-style neural methods for both perfect and imperfect information games (chess, Go, poker, Scotland Yard).*\n\n### Blog Posts\n\n- **Noam Brown's website \u2014 Deep CFR summary**  \n  https://noambrown.github.io/  \n  *Links to all of Brown's major papers with brief descriptions. Scan the Deep CFR entry for a one-paragraph overview.*\n\n- **Papers With Code \u2014 \"Deep Counterfactual Regret Minimization\"**  \n  https://paperswithcode.com/paper/deep-counterfactual-regret-minimization  \n  *Check for reference implementations and benchmarks. Note: the official implementation is in the Facebook Research repo.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[TensorFlow Playground](https://playground.tensorflow.org/)** \u2014 Tinker with a Neural Network architecture right in your browser to build intuition for continuous approximations.\n\n\n### Day 1: Deep CFR in OpenSpiel\n\n1. **Run OpenSpiel's Deep CFR on Leduc Hold'em:**\n   ```python\n   import pyspiel\n   from open_spiel.python.algorithms import deep_cfr\n   from open_spiel.python.algorithms import exploitability as expl\n   import tensorflow as tf  # or torch, depending on OpenSpiel version\n   \n   game = pyspiel.load_game(\"leduc_poker\")\n   \n   deep_cfr_solver = deep_cfr.DeepCFRSolver(\n       game,\n       policy_network_layers=(64, 64),\n       advantage_network_layers=(64, 64),\n       num_iterations=100,\n       num_traversals=100,\n       learning_rate=1e-3,\n       batch_size_advantage=128,\n       batch_size_strategy=1024,\n       memory_capacity=int(1e6),\n   )\n   \n   # Train\n   _, advantage_losses, policy_loss = deep_cfr_solver.solve()\n   \n   # Get policy and compute exploitability\n   conv = expl.exploitability(game, deep_cfr_solver.policy_network())\n   print(f\"Deep CFR exploitability: {conv:.6f}\")\n   ```\n\n2. **Compare against your tabular MCCFR from Step 3:**\n   - Run your Step 3 MCCFR for 50k iterations \u2192 record exploitability\n   - Run OpenSpiel Deep CFR for 100 iterations \u2192 record exploitability\n   - *Key observation: Deep CFR reaches comparable exploitability with FAR fewer \"iterations\" but each iteration is more expensive (forward/backward passes). The tradeoff is iterations vs. per-iteration cost.*\n\n3. **Experiment with network sizes:**\n   - Try (32, 32), (64, 64), (128, 128, 128) hidden layers\n   - How does network capacity affect convergence speed and final exploitability?\n   - *Observe: too small \u2192 underfitting (can't represent the strategy); too large \u2192 slower training, possible overfitting*\n\n### Day 2: NFSP in OpenSpiel + Advantage Network Internals\n\n1. **Run NFSP on Kuhn and Leduc:**\n   ```python\n   from open_spiel.python.algorithms import nfsp\n   \n   game = pyspiel.load_game(\"leduc_poker\")\n   \n   agents = [\n       nfsp.NFSP(\n           game, player_id=i,\n           state_representation_size=game.information_state_tensor_shape()[0],\n           num_actions=game.num_distinct_actions(),\n           hidden_layers_sizes=[128, 128],\n           reservoir_buffer_capacity=int(2e5),\n           anticipatory_param=0.1,  # \u03b7: mix between best response and average\n       )\n       for i in range(game.num_players())\n   ]\n   ```\n   - Train for 10k episodes, measure exploitability every 1k\n   - *Key observation: NFSP is simpler conceptually (just RL self-play) but converges slower and less precisely than Deep CFR for this game size.*\n\n2. **Inspect advantage network predictions:**\n   - After training Deep CFR, feed in specific Leduc info states you know the Nash strategy for\n   - Compare the network's predicted advantages against your Step 3 tabular counterfactual values\n   - *This grounds the neural approximation \u2014 you can SEE what the network learned (or failed to learn)*\n\n3. **Questions to answer by end of Day 2:**\n   - What are the three components of Deep CFR? (advantage networks, strategy network, reservoir sampling)\n   - How does NFSP differ architecturally from Deep CFR?\n   - What role does reservoir sampling play? Why not just use all the data?\n   - On Leduc, which method converges faster? Which reaches lower exploitability?\n\n---\n\n## Phase 3: Targeted Reading (3 days)\n\n### Preliminary Reading: Function Approximation Theory\n\n> **Before the papers:** The Deep CFR and NFSP papers assume familiarity with function approximation in RL. These textbook chapters provide the theoretical foundation \u2014 read them on Day 1 of this phase before starting the papers.\n\n**Sutton & Barto \u2014 Chapter 9: On-policy Prediction with Approximation**\nhttp://incompleteideas.net/book/the-book-2nd.html (free PDF/HTML)\n```\n\u251c\u2500\u2500 READ:  9.1 (Value-function Approximation \u2014 the general framework),\n\u2502          9.2 (The Prediction Objective \u2014 what \"best approximation\" means when\n\u2502               you can't represent every state exactly),\n\u2502          9.3 (Stochastic Gradient and Semi-Gradient Methods \u2014 the core algorithms;\n\u2502               this is what DQN's train_step implements),\n\u2502          9.5.4 (Nonlinear Function Approximation: ANNs \u2014 neural networks as\n\u2502                  value approximators, connecting to your Step 1 implementation)\n\u251c\u2500\u2500 SKIM:  9.4 (Linear Methods \u2014 useful as contrast to understand what neural\n\u2502               networks add beyond linear approximation),\n\u2502          9.5 (Feature Construction \u2014 how different representations affect\n\u2502               learning; relevant for your Leduc state encoding in this step)\n\u251c\u2500\u2500 SKIP:  9.6\u20139.8 (memory-based methods, kernel-based, interest/emphasis \u2014\n\u2502               not needed for Deep CFR)\n\u2514\u2500\u2500 KEY INSIGHT: \"Semi-gradient methods (Section 9.3) are what almost all deep RL\n    uses in practice. They follow the gradient of the loss with respect to the\n    weights, but IGNORE the effect of changing weights on the target. This is\n    exactly what DQN does \u2014 and it's exactly what Deep CFR's advantage networks do.\n    Understanding this 'semi' part explains why target networks are needed.\"\n```\n\n**Sutton & Barto \u2014 Chapter 11.1\u201311.3: The Deadly Triad**\n```\n\u251c\u2500\u2500 READ:  11.1 (Off-policy Learning \u2014 why learning from old experiences is harder\n\u2502               than it sounds; directly relevant to replay buffers),\n\u2502          11.2 (Examples of Instability \u2014 concrete cases where function\n\u2502               approximation + bootstrapping + off-policy diverges),\n\u2502          11.3 (The Deadly Triad \u2014 the combination of three individually-useful\n\u2502               features that together cause instability)\n\u2514\u2500\u2500 KEY INSIGHT: \"The deadly triad: (1) function approximation (neural networks),\n    (2) bootstrapping (using your own estimates as targets \u2014 TD learning),\n    (3) off-policy learning (learning from past experiences, i.e., replay buffer).\n    DQN has ALL THREE. Deep CFR has (1) and a form of (2). Understanding WHY\n    these combine dangerously explains every stabilization trick in deep RL:\n    target networks, experience replay, gradient clipping, etc.\"\n```\n\n### Paper 1: Brown, Lerer, Gross & Sandholm \u2014 \"Deep Counterfactual Regret Minimization\" (2019)\n\nhttps://arxiv.org/abs/1811.00164 (ICML 2019)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Deep CFR algorithm \u2014 the full specification: how advantage \n\u2502          networks replace tabular regret storage, the training loop with external\n\u2502          sampling MCCFR, reservoir sampling for experience replay, and the \n\u2502          strategy network that distills the average policy),\n\u2502          Section 4 (Experiments \u2014 convergence on Leduc and single-card poker,\n\u2502          comparison with tabular CFR and NFSP, scaling results on abstracted HUNL)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 motivation for neuralizing CFR),\n\u2502          Section 2 (Background \u2014 you know CFR/MCCFR from Steps 2\u20133),\n\u2502          Section 5 (Related Work)\n\u251c\u2500\u2500 SKIP:  Nothing \u2014 this paper is concise and densely informative\n\u251c\u2500\u2500 MATH:  \u2192 \"Equation 3 (Advantage network loss function) \u2014 understand this. \n\u2502             The advantage network predicts counterfactual values, and the loss\n\u2502             is MSE between the network's prediction and the sampled CF values\n\u2502             from the traversal. This is where tabular CFR becomes Deep CFR \u2014\n\u2502             the rest is architectural scaffolding.\"\n\u2502          \u2192 \"Section 3.3 (Reservoir Sampling) \u2014 understand why uniform-at-random\n\u2502             sampling from the buffer approximates the average strategy. This\n\u2502             is NOT just 'random replay' \u2014 it has theoretical justification.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Deep CFR is MCCFR where the regret table is replaced by neural\n    networks. Each iteration, external-sampling MCCFR generates (info_state, \n    counterfactual_values) training pairs. Advantage networks learn to predict \n    CF values \u2192 used for next MCCFR iteration. Strategy network learns the \n    average of all advantage networks \u2192 the output Nash approximation. It's \n    'tabular MCCFR with function approximation' \u2014 same convergence goal, \n    neural implementation.\"\n```\n\n### Paper 2: Steinberger \u2014 \"Single Deep Counterfactual Regret Minimization\" (2019)\n\nhttps://arxiv.org/abs/1901.07621  \n*(Later published as DREAM framework at AAAI 2020)*\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Single Deep CFR \u2014 how to collapse the separate advantage \n\u2502          networks into one network that handles both players, reducing memory\n\u2502          and computation),\n\u2502          Section 4 (DREAM extension \u2014 outcome sampling instead of external \n\u2502          sampling, with variance reduction techniques),\n\u2502          Section 5 (Experiments \u2014 convergence comparison on Leduc and HUNL)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 2 (Background),\n\u2502          Section 6 (Related Work)\n\u251c\u2500\u2500 SKIP:  Proofs in appendix\n\u251c\u2500\u2500 MATH:  \u2192 \"Algorithm 1 (Single Deep CFR) vs Algorithm 2 (DREAM) \u2014 trace both\n\u2502             algorithms step by step. The key difference is sampling: Single \n\u2502             Deep CFR uses external sampling (same as Deep CFR), while DREAM \n\u2502             uses outcome sampling + baselines for variance reduction. DREAM \n\u2502             is more practical because outcome sampling is cheaper.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"DREAM is the practitioner's Deep CFR. Single network, outcome \n    sampling, baseline subtraction for variance reduction. If Deep CFR is the \n    'theory paper,' DREAM is the 'engineering paper.' For your thesis \n    implementation, DREAM is likely the better starting point.\"\n```\n\n### Paper 3: Heinrich & Silver \u2014 \"Deep Reinforcement Learning from Self-Play in Imperfect-Information Games\" (2016)\n\nhttps://arxiv.org/abs/1603.01121\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Neural Fictitious Self-Play \u2014 the two-network architecture:\n\u2502          best-response network trained via DQN + average-policy network trained\n\u2502          via supervised learning on the replay buffer),\n\u2502          Section 4 (Experiments \u2014 convergence on Leduc poker)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 2 (Background \u2014 fictitious play, extensive-form games),\n\u2502          Section 5 (Discussion)\n\u251c\u2500\u2500 SKIP:  Section 2.1 if you're comfortable with fictitious play from Step 2\n\u251c\u2500\u2500 MATH:  \u2192 \"Equation 1 (Anticipatory parameter \u03b7) \u2014 understand this. \u03b7 controls \n\u2502             the mixing between best-response play and average-strategy play.\n\u2502             \u03b7 = 0 \u2192 pure average strategy (converges to Nash but slowly).\n\u2502             \u03b7 = 1 \u2192 pure best response (doesn't converge to Nash, just exploits).\n\u2502             \u03b7 = 0.1 is typically used \u2014 mostly average with occasional best-response.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"NFSP approaches equilibrium from the RL side, not the CFR side.\n    It doesn't compute regrets at all \u2014 it uses DQN for best response and \n    supervised learning for the average strategy. This is elegant but less \n    precise than Deep CFR for equilibrium computation. Its value is as a \n    BRIDGE between RL (Step 1) and game theory (Steps 2\u20134) \u2014 showing that \n    RL can also find Nash equilibria, just differently.\"\n```\n\n### Supplementary References\n\n- **Xu et al. (2025) \u2014 \"Deep (Predictive) Discounted Counterfactual Regret Minimization\" (AAAI 2026)**  \n  https://arxiv.org/abs/2511.08174  \n  *Combines discounted regret weights (from DCFR) with predictive networks. Claims faster convergence than vanilla Deep CFR. SKIM abstract + Section 3. Log insights for implementation comparison.*\n\n- **Rudolph et al. (2025) \u2014 \"Reevaluating Policy Gradient Methods for Imperfect-Information Games\"**  \n  https://arxiv.org/abs/2502.08938  \n  *Important perspective: challenges the assumption that naive self-play DRL fails in adversarial IIGs. Shows that with proper hyperparameter tuning, standard policy gradient can perform surprisingly well. SKIM Section 3 (experiments) and Table 1 (comparisons). This reframes the Deep CFR vs RL question.*\n\n- **Zarick et al. (2020) \u2014 \"Unlocking the Potential of Deep Counterfactual Value Networks\"**  \n  https://arxiv.org/abs/2007.10442  \n  *Practical improvements to Deep CFR's value network training. SKIM abstract + Section 3.*\n\n### Math Flags\n\n\ud83d\udd22 **Deep CFR advantage network loss (Brown et al., Eq. 3)** \u2014 Understand the loss function.  \n**WHY this can't be substituted:** This equation is the ONLY thing that makes Deep CFR different from tabular MCCFR. The loss defines what the network learns to predict (counterfactual values), and getting it wrong means the network doesn't converge to Nash. When you implement from scratch, this equation IS the core of your training loop.\n\n\ud83d\udd22 **NFSP anticipatory parameter \u03b7 (Heinrich & Silver, Eq. 1)** \u2014 Understand the mixing dynamics.  \n**WHY:** \u03b7 controls the convergence-exploitation tradeoff. For your thesis (opponent exploitation in Step 8), understanding this parameter is key \u2014 it's the same tradeoff between playing safe (Nash) and exploiting (best-response). NFSP makes this tradeoff explicit as a single scalar.\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: Deep CFR for Leduc Hold'em \u2014 From Scratch in PyTorch\n\n**Language + Framework:** Python 3.10+ / PyTorch (first step using GPU)\n\nStarting point: Your Leduc Hold'em engine from Step 3. Your MCCFR from Step 3 provides the comparison baseline.\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Information state tensor encoding (Leduc state \u2192 fixed-size vector) | \ud83d\udd34 HAND-CODE | The state representation design is critical for all downstream neural methods. You must decide what features to include (hand, board, action history, pot), how to normalize them, and what dimensionality works. This representation carries through to Steps 6\u20138. |\n| Advantage network architecture (MLP predicting CF values per action) | \ud83d\udd34 HAND-CODE | The network IS Deep CFR. Understanding the input/output shapes, the loss function (MSE on sampled CF values), and the iterative training loop is the core intellectual content. |\n| External-sampling MCCFR traversal \u2192 training data generation | \ud83d\udd34 HAND-CODE | This connects your Step 3 MCCFR to the neural training pipeline. You must understand: each traversal produces (info_state, CF_values) pairs that be
