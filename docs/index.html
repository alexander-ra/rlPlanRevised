.\"\n```\n\n### Paper 4: Foerster et al. \u2014 \"Learning with Opponent-Learning Awareness\" (LOLA, 2018)\n\nhttps://arxiv.org/abs/1709.04326 (AAMAS 2018)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (LOLA algorithm \u2014 instead of just optimizing your own reward,\n\u2502          DIFFERENTIATE THROUGH the other agent's learning update. You model how\n\u2502          your OWN action changes what the OTHER agent will learn, and optimize \n\u2502          for that second-order effect),\n\u2502          Section 4 (Experiments \u2014 Iterated Prisoner's Dilemma and Matching Pennies)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1\u20132\n\u251c\u2500\u2500 SKIP:  Proofs in appendix (read theorem statements)\n\u251c\u2500\u2500 MATH:  \u2192 \"Equation 4 (LOLA gradient) \u2014 MUST understand. The standard policy\n\u2502             gradient optimizes E[R1(\u03c01, \u03c02)]. LOLA optimizes E[R1(\u03c01, \u03c02 + \u0394\u03c02)]\n\u2502             where \u0394\u03c02 = \u03b1\u2207_{\u03c02}R2(\u03c01, \u03c02) \u2014 the update agent 2 WILL MAKE given\n\u2502             \u03c01. So agent 1 is optimizing for a FUTURE world where agent 2 has \n\u2502             already adapted. This is LOOK-AHEAD learning. Connection to your \n\u2502             thesis: opponent modeling (Step 7) is about inferring what the opponent\n\u2502             IS doing; LOLA is about anticipating what they WILL do.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"LOLA achieves cooperation in the Prisoner's Dilemma (where naive \n    learners converge to mutual defection) by having each agent model the other's \n    LEARNING PROCESS. This is a fundamentally different paradigm from opponent \n    modeling (Step 7) or equilibrium computation (Steps 2\u20136): agents don't model \n    static strategies, they model dynamic learning trajectories. This distinction \n    matters for your thesis.\"\n```\n\n### Paper 5: Lanctot et al. \u2014 \"A Unified Game-Theoretic Approach to Multiagent Reinforcement Learning\" (PSRO, 2017)\n\nhttps://arxiv.org/abs/1711.00832 (NeurIPS 2017)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (PSRO framework \u2014 the double oracle approach: maintain a \n\u2502          population of policies, compute best responses to the population's \n\u2502          meta-Nash equilibrium, add new policies to the population, repeat.\n\u2502          This is the multi-agent analog of iterative best response from Step 2),\n\u2502          Section 4 (Connection to existing algorithms \u2014 PSRO unifies fictitious \n\u2502          play, DO, and self-play as special cases)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 2 (Background \u2014 normal-form game theory),\n\u2502          Section 5 (Experiments \u2014 Kuhn, Leduc, Liar's Dice)\n\u251c\u2500\u2500 SKIP:  Proofs (read statements)\n\u251c\u2500\u2500 MATH:  \u2192 \"Algorithm 1 (PSRO) \u2014 trace carefully. The key loop: (1) compute \n\u2502             meta-Nash over existing policy population (Nash over the GAME BETWEEN\n\u2502             POLICIES, not the original game), (2) train a new best-response policy\n\u2502             against the meta-Nash mixture, (3) add it to the population, (4) repeat.\n\u2502             When using RL for the best-response oracle, this connects game theory\n\u2502             to RL in a principled way.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"PSRO is the BRIDGE between game theory (Steps 2\u20138) and MARL \n    (Steps 9\u201311). It uses game-theoretic reasoning (meta-Nash) to GUIDE the RL \n    training process (best-response oracle). Instead of hoping that self-play \n    converges to something good, PSRO uses the structure of game theory to ensure \n    convergence to a Nash equilibrium of the POLICY SPACE. This is directly \n    relevant to your Step 10 (population-based training) and Step 11 (coalitions).\"\n```\n\n### Paper 6: Sukhbaatar et al. \u2014 \"Learning Multiagent Communication with Backpropagation\" (CommNet, 2016)\n\nhttps://arxiv.org/abs/1605.07736 (NeurIPS 2016)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (CommNet architecture \u2014 agents share a continuous communication\n\u2502          channel that is DIFFERENTIABLE. Each agent sends a message, receives the \n\u2502          mean of other agents' messages, and uses that as additional input to its policy),\n\u2502          Section 4 (Experiments \u2014 traffic junction, bAbI tasks)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction), Section 3 (Related work)\n\u251c\u2500\u2500 SKIP:  bAbI experiment details (NLP-focused, less relevant)\n\u251c\u2500\u2500 MATH:  \u2192 \"Equation 3 (communication update) \u2014 understand the mean-field \n\u2502             communication: agent i receives c_i = mean(h_j for j \u2260 i). Simple \n\u2502             but powerful. The key is that this is all DIFFERENTIABLE, so the \n\u2502             communication protocol is LEARNED through backprop, not designed.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"CommNet shows that useful communication can EMERGE from end-to-end \n    training \u2014 no one designs the protocol, the agents learn what to say. This is\n    relevant to your thesis's multi-agent setting: in N-player poker, players \n    communicate through their ACTIONS (bets, raises, folds). CommNet shows the \n    principle of emergent communication; your thesis applies it to strategic settings.\"\n```\n\n### Supplementary References\n\n- **Zhong et al. (2023) \u2014 \"Heterogeneous-Agent Reinforcement Learning (HARL)\"**  \n  https://arxiv.org/abs/2304.09870  \n  *Unified framework for cooperative MARL with heterogeneous agents. SKIM abstract + Section 3 architecture. Addresses the \"homogeneous agent assumption\" that QMIX/MAPPO make.*\n\n- **Bighashdel et al. (2026) \u2014 \"Sample-Efficient PSRO with Joint Experience Best Response\"**  \n  https://arxiv.org/abs/2602.06599  \n  *AAMAS 2026. Improves PSRO sample efficiency. SKIM abstract. Relevant for understanding latest PSRO advances.*\n\n- **Wittner (2026) \u2014 \"Communication Methods in Multi-Agent Reinforcement Learning\"**  \n  https://arxiv.org/abs/2601.12886  \n  *12-page survey of MARL communication. SKIM for reference map of communication approaches.*\n\n### Math Flags\n\n\ud83d\udd22 **MADDPG centralized critic gradient (Lowe et al., Equation 5)** \u2014 Must understand.  \n**WHY:** This is the prototype CTDE gradient. The centralized critic sees (s, a1, ..., aN) but the policy gradient updates only \u03c0i(oi). Understanding this asymmetry is essential for all cooperative MARL methods.\n\n\ud83d\udd22 **QMIX monotonicity constraint (Rashid et al., Section 3.1)** \u2014 Must understand the constraint and WHY it enables decomposition.  \n**WHY:** The monotonicity constraint is a structural assumption that trades expressiveness for tractability. Your thesis will face similar tradeoffs: in N-player exploitation (Contribution #2), you'll need structural assumptions about agent interactions to make the problem tractable.\n\n\ud83d\udd22 **LOLA gradient (Foerster et al., Equation 4)** \u2014 Must understand.  \n**WHY:** LOLA differentiates through the opponent's learning step. This \"look-ahead\" gradient is conceptually related to your Step 7 opponent modeling but operates at a different level \u2014 modeling the learning DYNAMICS, not the static strategy. Understanding the difference is important for positioning your thesis contribution.\n\n\ud83d\udd22 **PSRO meta-Nash + best-response oracle (Lanctot et al., Algorithm 1)** \u2014 Must trace the full algorithm.  \n**WHY:** PSRO is the bridge between game theory (Steps 2\u20138) and MARL (Steps 9\u201311). The meta-Nash computation is a game over POLICIES, not information states. This abstraction layer is what Step 10 (population-based training) builds on.\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: Multi-Agent Learning Benchmark on Matrix Games + Goofspiel\n\nThis step's implementation focuses on COMPARING different MARL paradigms on controlled testbeds, rather than building one system from scratch. The goal is to understand WHEN each approach works and fails.\n\n**Language + Framework:** Python 3.10+ / PyTorch / PettingZoo / OpenSpiel\n\nStarting point: Your PPO from Step 1, your Nash solver from Step 2, your MCCFR from Step 3.\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Independent Learners (IL) baseline \u2014 each agent runs PPO ignoring others | \ud83d\udd34 HAND-CODE | Must understand WHY independent learning fails: non-stationarity. Building it yourself makes the failure modes visceral. Use your Step 1 PPO, extend to multi-agent. |\n| MADDPG \u2014 centralized critic with decentralized actors | \ud83d\udd34 HAND-CODE | The core CTDE algorithm. Hand-code the centralized critic that takes all agents' observations + actions. The actor remains your standard policy network. Key learning: the asymmetry between training and execution. |\n| MAPPO \u2014 PPO with centralized value function | \ud83d\udfe1 AI-ASSISTED | After hand-coding MADDPG, you understand CTDE. MAPPO is simpler (just PPO + global state in value function). AI-draft, review the centralized value function integration. |\n| PSRO loop \u2014 population + meta-Nash + best-response oracle | \ud83d\udd34 HAND-CODE | PSRO is the game-theory\u2194MARL bridge. You must hand-code the double-oracle loop: compute meta-Nash over policy population, train best-response via RL, add to population. This is thesis-critical for Step 10. |\n| Matrix game experiments (Prisoner's Dilemma, Matching Pennies, Stag Hunt) | \ud83d\udd34 HAND-CODE | Small enough to verify analytically. Build the matrix game environment and run all methods on it. You should predict the results before running. |\n| Goofspiel environment wrapper | \ud83d\udfe1 AI-ASSISTED | Use OpenSpiel's Goofspiel. Write a PettingZoo-compatible wrapper if needed, AI-assisted. |\n| Communication channel (CommNet-style) | \ud83d\udfe1 AI-ASSISTED | Implement a simple mean-field communication channel between agents. AI drafts the communication layer, you integrate with MADDPG. |\n| Tournament + evaluation framework | \ud83d\udfe2 AI-GENERATED | Standard comparison infrastructure. Plotting, metrics, logging. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 Matrix Game Testbed + Independent Learners:**\n- \ud83d\udd34 Build the matrix game environment (Prisoner's Dilemma, Matching Pennies, Stag Hunt, Battle of the Sexes):\n  ```python\n  class MatrixGame:\n      \"\"\"2-player simultaneous-action matrix game.\"\"\"\n      def __init__(self, payoff_matrix_1, payoff_matrix_2):\n          # payoff_matrix_i[a1][a2] = reward for player i\n          ...\n      def step(self, action_1, action_2):\n          return reward_1, reward_2\n  ```\n- \ud83d\udd34 Run independent PPO learners on each game:\n  - Prisoner's Dilemma: expect mutual defection (Nash)\n  - Matching Pennies: expect cycling (mixed Nash is unstable for learners)\n  - Stag Hunt: expect coordination failure (agents learn the safe payoff-dominant equilibrium?)\n  - Battle of the Sexes: expect one of two pure Nash, or cycling\n- Document: WHAT converges, what cycles, what fails. This establishes the baseline.\n\n**Days 2\u20133 \u2014 MADDPG + MAPPO:**\n- \ud83d\udd34 Implement MADDPG:\n  - **Centralized critic:** Q(s, a1, a2) \u2014 input is concatenation of all observations + all actions\n  - **Decentralized actors:** \u03c0i(oi) \u2014 each actor only sees own observation\n  - Training: critic trained on centralized data, actor trained with centralized critic gradients\n  - Execution: only actors used, no communication between agents\n- Run on matrix games \u2014 compare with independent learners\n- \ud83d\udfe1 Implement MAPPO (AI-assisted):\n  - Simpler than MADDPG: just PPO with V(global_state) instead of V(local_obs)\n  - Run on matrix games and MPE simple_spread\n- Compare: IL vs MADDPG vs MAPPO on all matrix games\n  - Expected: MADDPG/MAPPO converge to cooperative outcomes more reliably than IL\n\n**Days 4\u20135 \u2014 PSRO:**\n- \ud83d\udd34 Implement the PSRO loop:\n  ```python\n  class PSRO:\n      def __init__(self, game, br_oracle):\n          self.population = {i: [random_policy()] for i in range(num_players)}\n          self.meta_game = {}  # payoff matrix between policies\n      \n      def compute_meta_nash(self):\n          # Solve the normal-form game where actions = policies in population\n          # Returns: mixture weights over population for each player\n          ...\n      \n      def train_best_response(self, player, opponent_mixture):\n          # Train a new policy via RL against opponent_mixture\n          # This is the \"oracle\" \u2014 can be PPO, DQN, or exact best-response\n          ...\n      \n      def iterate(self, num_rounds):\n          for _ in range(num_rounds):\n              meta_nash = self.compute_meta_nash()\n              for player in range(self.num_players):\n                  br = self.train_best_response(player, meta_nash)\n                  self.population[player].append(br)\n                  self.update_meta_game(br, player)\n  ```\n- Run PSRO on Kuhn Poker (using your Step 2 exact best-response as the oracle):\n  - Verify: the meta-Nash should converge to the game's Nash equilibrium\n  - Compare convergence speed: PSRO vs vanilla CFR from Step 2\n- Run PSRO on Leduc (using PPO as the approximate best-response oracle):\n  - Observe: how well does approximate BR affect PSRO convergence?\n  - Compare exploitability of PSRO's meta-Nash strategy vs your MCCFR strategy from Step 3\n\n**Day 6 \u2014 Communication + Goofspiel:**\n- \ud83d\udfe1 Implement CommNet-style communication:\n  - Add a communication channel to MADDPG: each agent broadcasts a learned message vector\n  - Other agents receive the mean of all messages as additional input\n  - Run on simple_spread: compare MADDPG vs MADDPG+CommNet\n  - Expected: communication helps in cooperative tasks\n- \ud83d\udfe1 Run experiments on Goofspiel (OpenSpiel):\n  - Goofspiel is a simultaneous-action card game \u2014 good for testing MARL on a GAME (vs the particle envs)\n  - Run PSRO on Goofspiel(4 cards) \u2014 does the meta-Nash converge?\n  - Compare with MCCFR on Goofspiel \u2014 which approach is more sample-efficient?\n- Collect all results into comparison tables\n\n### Deliverables:\n- [ ] Matrix game testbed (PD, Matching Pennies, Stag Hunt, Battle of the Sexes)\n- [ ] Independent learners baseline with documented failure modes\n- [ ] MADDPG implementation with centralized critic\n- [ ] MAPPO implementation with centralized value function\n- [ ] PSRO loop with meta-Nash + best-response oracle\n- [ ] PSRO verified on Kuhn (convergence to Nash)\n- [ ] PSRO vs MCCFR comparison on Leduc\n- [ ] Communication channel (CommNet-style) integrated with MADDPG\n- [ ] Goofspiel experiments\n- [ ] Comparison table: IL vs MADDPG vs MAPPO vs PSRO across all games\n\n### Validation:\n- **Matrix games:** Verify learning outcomes match known Nash equilibria. PD \u2192 mutual defection, Matching Pennies \u2192 50/50 mixed, Stag Hunt \u2192 depends on initialization (risk-dominant vs payoff-dominant).\n- **MADDPG critics:** Centralized critic should have lower variance than independent critics (measure loss curves).\n- **PSRO on Kuhn:** Meta-Nash exploitability should converge to \u22480 (matching CFR).\n- **PSRO on Leduc:** Meta-Nash exploitability should decrease below 0.5 bb/hand within 20 PSRO iterations.\n- **Communication:** Agents with CommNet should achieve higher reward on simple_spread than agents without.\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Survey Skim + Supplementary Papers\n\n- **Reference skim:** Shoham & Leyton-Brown (2009) \u2014 \"Multiagent Systems: Algorithmic, Game-Theoretic, and Logical Foundations\"  \n  https://www.masfoundations.org/  \n  *Chapters 6\u20137 (learning in games). Skip Chapters 1\u20135 (game theory basics \u2014 you know this from Steps 2\u20133). Skip Chapters 8+ (mechanism design, social choice \u2014 relevant to a different thesis). Focus: how does the textbook characterize the convergence difficulties in multi-agent learning?*\n\n- **Survey skim:** Zhang, Yang & Basar (2021) \u2014 \"Multi-Agent Reinforcement Learning: A Selective Overview of Theories and Algorithms\"  \n  https://arxiv.org/abs/1911.10635  \n  *The canonical MARL survey. SKIM Sections 3 (cooperative MARL), 4 (competitive MARL), and 6 (emergent communication). Cross-reference with what you just implemented \u2014 map each algorithm you built to its section in this survey.*\n\n- **Supplementary read:** Samvelyan (2025) \u2014 \"Robust Agents in Open-Ended Worlds\" PhD thesis  \n  https://arxiv.org/abs/2512.08139  \n  *SKIM Chapter 2 (background on open-ended learning + auto-curricula). This connects to Step 10 (population-based training + evolution) and Step 11 (emergent complexity in competitive FFA).*\n\n### Day 2 \u2014 PhD Mapping + One-Pager + Learning Log\n\n- **Write the mandatory one-pager** (Section 4.7 format). Commit to repo.\n- **Update the Learning Log** (`learningLog.md`):\n  - **Connections:**\n    - [Step 1] PPO \u2192 [Step 9] MAPPO is literally PPO with a centralized value function. Your Step 1 implementation is the building block.\n    - [Step 2] Nash equilibrium \u2192 [Step 9] PSRO converges to Nash in the POLICY SPACE. The meta-game solved by PSRO is a normal-form game over policies \u2014 exactly what you learned in Step 2 but one level up.\n    - [Step 3] MCCFR \u2192 [Step 9] PSRO with CFR as the best-response oracle is an alternative to PSRO with RL. For perfect-recall games, CFR oracle is more efficient than RL oracle.\n    - [Step 6] ReBeL/Pluribus self-play \u2192 [Step 9] Self-play is a SPECIAL CASE of PSRO (population size 1, no meta-Nash computation). PSRO generalizes self-play by maintaining a diverse population and solving a meta-game.\n    - [Step 7] Opponent model (static) \u2192 [Step 9] LOLA models the opponent's LEARNING DYNAMICS, not their current strategy. LOLA is a dynamic extension of opponent modeling. For your thesis: worth investigating whether combining Step 7's static model with LOLA's dynamic anticipation gives better exploitation.\n    - [Step 8] Safe exploitation assumes a FIXED or slowly-changing opponent \u2192 [Step 9] In MARL, opponents are constantly learning. Do Step 8's safety guarantees hold when the opponent is a LEARNER (non-stationary)? \u2192 OPEN question for Step 10/11.\n    - [Step 9] PSRO population \u2192 [Step 10] Population-based training is the evolutionary generalization. PSRO uses meta-Nash to select policies; PBT can use other evolutionary pressures.\n  - **Confusions:**\n    - [Step 9] QMIX's monotonicity constraint prevents it from representing all joint value functions. Specifically, it can't handle games where individual agent value DECREASES when the joint outcome improves (e.g., one agent sacrifices for the team). How problematic is this in practice? \u2192 OPEN (WQMIX, QPLEX address this, check if relevant)\n    - [Step 9] PSRO with an APPROXIMATE best-response oracle: the convergence guarantee assumes EXACT best responses. With PPO as the oracle, the best response is approximate. Does PSRO still converge? How does the approximation error compound? \u2192 OPEN (Bighashdel et al. 2026 may address this)\n    - [Step 9] CommNet uses MEAN aggregation of messages. This throws away information about WHO sent what message. In competitive settings, knowing the source matters (you treat an opponent's message differently from an ally's). Is there a principal-agent communication framework? \u2192 OPEN (check TarMAC, IC3Net for targeted communication)\n    - [Step 7\u21929] Step 7's Bayesian opponent model assumes the opponent's strategy is drawn from a fixed prior. LOLA assumes the opponent is a learner with a known learning rule. In reality, opponents are somewhere in between. How to model an opponent whose learning rule is UNKNOWN? \u2192 OPEN (relevant to Contribution #1)\n\n## Exit Checklist\n\n- [ ] Matrix game testbed working with correct Nash equilibria verified\n- [ ] Independent learners showing documented failure modes (non-stationarity, coordination failure)\n- [ ] MADDPG working on matrix games + MPE\n- [ ] MAPPO working on matrix games + MPE\n- [ ] PSRO loop working: meta-Nash convergence verified on Kuhn\n- [ ] Can explain CTDE from memory: why centralized training, why decentralized execution\n- [ ] Can explain PSRO from memory: the double-oracle loop (population \u2192 meta-Nash \u2192 best response \u2192 add to population)\n- [ ] Can explain LOLA's gradient: how differentiating through the opponent's learning step achieves cooperation\n- [ ] Can explain the difference between Independent Learning, CTDE, and PSRO approaches\n- [ ] Communication channel showing measurable benefit on cooperative tasks\n- [ ] Comparison table populated across all methods and all games\n- [ ] All \ud83d\udd34 components hand-coded (IL, MADDPG, PSRO, matrix games)\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 1\u20138 + new confusions + resolved confusions)\n- [ ] PhD connection documented (CTDE paradigm, PSRO as bridge to population training, LOLA as dynamic opponent modeling)\n- [ ] Markov-games bridge notation exercise completed (P9)\n- [ ] Step notes committed to repo\n\n> **[P9] Markov-Games Bridge:** Add a short formal bridge on Markov games (stochastic games) to Phase 1 (Orientation), before jumping into CTDE/PSRO/LOLA. ~Half-page of notation connecting EFG-style reasoning (game trees, information sets, counterfactual values) to MARL-style reasoning (joint policies, centralized critics, decentralized execution). Explains what is preserved (sequential decisions, partial observability) and what is lost (exact game tree structure, regret-based convergence guarantees). ~0.5d absorbed within 14d allocation.\n",
  "step_10": "# Step 10 \u2014 Population-Based Training + Evolutionary Game Theory\n\n**Duration:** 14 days (Tier 2)  \n**Dependencies:** Step 7 (Opponent Modeling), Step 8 (Safe Exploitation), Step 9 (Multi-Agent RL)  \n**Phase:** E \u2014 Multi-Agent Dynamics  \n\n### PhD Connection\n\nThis step provides the EVOLUTIONARY MACHINERY for the thesis. The connection to each contribution:\n\n- **Contribution #1 (Behavioral Adaptation):** PBT's exploiter mechanism is automated opponent modeling at scale. The main exploiter finds weaknesses in the main agent \u2014 exactly what your Step 7 opponent model does, but embedded in the training loop. Your thesis combines EXPLICIT modeling (Step 7's Bayesian model) with IMPLICIT modeling (Step 10's exploiter agents).\n- **Contribution #2 (Multi-Agent Safe Exploitation):** The key gap: AlphaStar's league provides HEURISTIC safety (exploiters keep main agents honest) but NO FORMAL SAFETY GUARANTEE. Your thesis contribution is to formalize this: what does \"safe exploitation in a population\" MEAN mathematically? The spinning top decomposition tells you that the cyclic component is where safety is hardest (because improvement is illusory). Can you define safety as \"never losing to the transitive component\" while accepting cycling in the cyclic component? This is a concrete thesis hypothesis.\n- **Contribution #3 (Evaluation Methodology):** EGTA provides the evaluation framework: measure the meta-Nash of the agent population as the multi-agent generalization of exploitability. The spinning top decomposition provides a diagnostic: how much of the competitive structure is \"real skill\" vs \"rock-paper-scissors dynamics\"?\n\n---\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: PSRO as Population-Based Training](#day-1-psro-as-population-based-training)\n  - [Day 2: Evolutionary Dynamics on Matrix Games](#day-2-evolutionary-dynamics-on-matrix-games)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Paper 1: Jaderberg et al. \u2014 \"Population Based Training of Neural Networks\" (2017)](#paper-1-jaderberg-et-al-population-based-training-of-neural-networks-2017)\n  - [Paper 2: Jaderberg et al. \u2014 \"Human-Level Performance in First-Person Multiplayer Games with Population-Based DRL\" (FTW, 2019)](#paper-2-jaderberg-et-al-human-level-performance-in-first-person-multiplayer-games-with-population-based-drl-ftw-2019)\n  - [Paper 3: Vinyals et al. \u2014 \"Grandmaster Level in StarCraft II Using Multi-Agent Reinforcement Learning\" (AlphaStar, 2019)](#paper-3-vinyals-et-al-grandmaster-level-in-starcraft-ii-using-multi-agent-reinforcement-learning-alphastar-2019)\n  - [Paper 4: Balduzzi et al. \u2014 \"Open-Ended Learning in Symmetric Zero-Sum Games\" (2019)](#paper-4-balduzzi-et-al-open-ended-learning-in-symmetric-zero-sum-games-2019)\n  - [Paper 5: Tuyls, P\u00e9rolat, Lanctot et al. \u2014 \"A Generalised Method for Empirical Game Theoretic Analysis\" (2018)](#paper-5-tuyls-p\u00e9rolat-lanctot-et-al-a-generalised-method-for-empirical-game-theoretic-analysis-2018)\n  - [Supplementary References](#supplementary-references)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: PBT League for Leduc + Evolutionary Analysis](#project-pbt-league-for-leduc-evolutionary-analysis)\n  - [Sub-phase Breakdown (6 days):](#sub-phase-breakdown-6-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Survey Skim + Supplementary Papers](#day-1-survey-skim-supplementary-papers)\n  - [Day 2 \u2014 PhD Mapping + One-Pager + Learning Log](#day-2-phd-mapping-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY population-based training exists (self-play against ONE opponent is brittle \u2014 you need a POPULATION for robustness) and HOW evolutionary game theory provides the mathematical lens to analyze populations of strategies competing and evolving. Key insight: in Steps 2\u20138, you computed a SINGLE strategy (Nash equilibrium). In Steps 9\u201310, you maintain a POPULATION of strategies that evolve over time. Evolutionary game theory tells you what happens to these populations in the long run.\n\nEnd of day: you should be able to explain to a non-expert: \"Instead of training one AI against itself (self-play), we train a POPULATION of different AIs against each other. The strong ones survive, the weak ones get replaced. This is like evolution \u2014 but instead of biological organisms, we're evolving AI strategies. The result is more robust AIs because they've been tested against many different opponents, not just one. Evolutionary game theory is the math that tells us what this population converges to.\"\n\n- **Evolution of aggression and sharing: the replicator dynamics with the Hawk Dove Game**  \n  https://www.youtube.com/watch?v=tDTVRvfaaQo  \n  Duration: ~11m | Channel: Vincent Knight  \n  *Visual walkthrough of evolutionary game theory: the Hawk-Dove game, replicator dynamics differential equations, and how populations reach mixed equilibrium. The mathematical foundation for understanding population evolution.*\n\n- **Human-level in first-person multiplayer games with population-based deep RL**  \n  https://www.youtube.com/watch?v=dltN4MxV1RI  \n  Duration: ~8m | Channel: Max Jaderberg (DeepMind)  \n  *Supplementary video showing PBT applied to Capture the Flag. Agents learn to cooperate with teammates and compete against opponents through population-based training.*\n\n- **Game highlights of AlphaStar versus Team Liquid's TLO and MaNa**  \n  https://www.youtube.com/watch?v=6EQAsrfUIyo  \n  Duration: ~13m | Channel: DeepMind  \n  *Commentary and analysis of AlphaStar matches with Artosis, RotterdaM, Oriol Vinyals and David Silver. Shows the result of population-based league training \u2014 diverse strategies emerging from the AlphaStar League.*\n\n- **Stanford CS234 \u2014 Lecture 15: Value Alignment (Spring 2024)**  \n  https://www.youtube.com/watch?v=FOlPpjNbHjE  \n  Duration: ~1h14m | Instructor: Emma Brunskill + Dan Webber (Stanford)  \n  *Covers MCTS, AlphaZero, DPO, and RLHF. The AlphaZero section is relevant for understanding how self-play within a population produces superhuman performance.*\n\n- **Self-Play**  \n  https://www.youtube.com/watch?v=EY9iHSe82Hc  \n  Duration: ~56m | Speaker: Noam Brown | Cooperative AI Summer School 2024  \n  *Covers population-based methods in depth, including the relationship between PSRO, evolutionary dynamics, and the AlphaStar league design.*\n\n### Blog Posts / Accessible Reads\n\n- **DeepMind Blog \u2014 \"AlphaStar: Mastering the Real-Time Strategy Game StarCraft II\"**  \n  https://deepmind.google/discover/blog/alphastar-mastering-the-real-time-strategy-game-starcraft-ii/  \n  *The accessible overview of AlphaStar's population-based training. Read for the league architecture diagrams.*\n\n- **DeepMind Blog \u2014 \"Capture the Flag: the emergence of complex cooperative agents\"**  \n  https://deepmind.google/discover/blog/capture-the-flag-the-emergence-of-complex-cooperative-agents/  \n  *The CTF blog post. Short, with clear diagrams of the PBT pipeline.*\n\n- **Wikipedia \u2014 \"Evolutionary Game Theory\"**  \n  https://en.wikipedia.org/wiki/Evolutionary_game_theory  \n  *A quick primer on replicator dynamics, evolutionary stable strategies (ESS), and the Hawk-Dove game. Context for the formal paper reading.*\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Simulating the World](https://ncase.me/simulating/)** \u2014 Play with evolutionary and population dynamics models in the browser.\n\n\n### Day 1: PSRO as Population-Based Training\n\n1. **Re-use your Step 9 PSRO implementation as the starting point:**\n   - Your PSRO loop IS a form of population-based training: maintain a population of policies, evolve the population by adding best responses\n   - Run PSRO on Leduc for many iterations (50+) and observe how the population grows\n   - Visualize the meta-game payoff matrix: what does it look like? Is it transitive (one policy dominates all others) or cyclic (rock-paper-scissors dynamics)?\n\n2. **Experiment with population diversity:**\n   ```python\n   # After running PSRO, analyze the population:\n   # - How many policies in the population are \"active\" (have non-zero weight in meta-Nash)?\n   # - How many are dominated (never played)?\n   # - What's the effective diversity of the population?\n   \n   meta_nash = psro.compute_meta_nash()\n   active_policies = [i for i, w in enumerate(meta_nash) if w > 0.01]\n   print(f\"Active policies: {len(active_policies)} / {len(psro.population)}\")\n   ```\n   - **Diversity problem:** Often, most of the population weight concentrates on a few policies. The rest are \"dead weight.\" AlphaStar's league design specifically addresses this.\n\n3. **Visualize the game landscape:**\n   ```python\n   # Compute the payoff matrix between all policies in the population\n   # Use PCA or t-SNE to visualize strategies in 2D\n   # Plot arrows showing best-response dynamics\n   # Do you see cycles (non-transitivity) or a clear hierarchy (transitivity)?\n   ```\n\n### Day 2: Evolutionary Dynamics on Matrix Games\n\n1. **Implement replicator dynamics on your matrix games:**\n   ```python\n   def replicator_dynamics(payoff_matrix, population, dt=0.01):\n       \"\"\"One step of continuous replicator dynamics.\n       population[i] = proportion of population playing strategy i.\"\"\"\n       fitness = payoff_matrix @ population\n       avg_fitness = population @ fitness\n       # Replicator equation: dx_i/dt = x_i * (f_i - avg_f)\n       dpop = population * (fitness - avg_fitness)\n       return population + dpop * dt\n   ```\n   - Run on Prisoner's Dilemma: defection dominates (evolutionary stable)\n   - Run on Hawk-Dove: converges to mixed ESS\n   - Run on Rock-Paper-Scissors: cycles forever (no ESS)\n   - **Key observation:** The replicator dynamics on RPS NEVER converge. This is analogous to the cycling you see in PSRO/self-play for non-transitive games. The spinning-top decomposition from Balduzzi explains why.\n\n2. **Compare replicator dynamics with your Step 2 Nash solutions:**\n   - For each matrix game: what does the replicator dynamics converge to? Does it match Nash?\n   - Answer: for some games (PD, Hawk-Dove), replicator dynamics converge to Nash. For others (RPS), they cycle AROUND Nash without converging. This is the fundamental difficulty of evolutionary approaches to equilibrium computation.\n\n3. **Run a simple PBT experiment:**\n   - Create a population of 10 PPO agents with DIFFERENT hyperparameters (learning rate, entropy bonus)\n   - Train them via round-robin against each other (each agent plays N games vs each other agent)\n   - Periodically: replace the bottom 20% with mutated copies of the top 20%\n   - Observe: does the population converge to a single dominant strategy or maintain diversity?\n\n---\n\n## Phase 3: Targeted Reading (3 days)\n\n### Paper 1: Jaderberg et al. \u2014 \"Population Based Training of Neural Networks\" (2017)\n\nhttps://arxiv.org/abs/1711.09846 (Original PBT paper)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (PBT algorithm \u2014 the explore-exploit mechanism: a population\n\u2502          of models train in parallel, periodically the worst performers COPY \n\u2502          the weights of the best performers (exploit) and then MUTATE their \n\u2502          hyperparameters (explore). This is evolution applied to neural network\n\u2502          training),\n\u2502          Section 3 (Experiments \u2014 showing PBT finds better hyperparameters than\n\u2502          grid search or random search, with less compute)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 4 (Discussion)\n\u251c\u2500\u2500 SKIP:  Detailed tables (look at summary results only)\n\u251c\u2500\u2500 MATH:  \u2192 \"No complex math. PBT is an algorithm, not a theorem. Understand the \n\u2502             EXPLOIT (copy best weights) and EXPLORE (perturb hyperparameters)\n\u2502             operations. The key insight: this is a simple evolutionary algorithm\n\u2502             applied to the meta-optimization problem (choosing hyperparameters).\"\n\u2514\u2500\u2500 KEY INSIGHT: \"PBT replaces the sequential 'train \u2192 evaluate \u2192 tune hyperparams \u2192 \n    retrain' cycle with a PARALLEL population that co-evolves training and \n    hyperparameters simultaneously. For MARL, this means the population also \n    serves as a diverse set of opponents, solving two problems at once.\"\n```\n\n### Paper 2: Jaderberg et al. \u2014 \"Human-Level Performance in First-Person Multiplayer Games with Population-Based DRL\" (FTW, 2019)\n\nhttps://arxiv.org/abs/1807.01281 (Science 2019)\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (The FTW architecture \u2014 how PBT is applied to a \n\u2502          multiplayer game: agents in the population are matched against each\n\u2502          other, creating a natural curriculum. The internal reward structure \n\u2502          and population dynamics are co-evolved),\n\u2502          Section 3 (Results \u2014 emergence of cooperative and competitive \n\u2502          strategies, including map control, teammate coordination, distraction)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 the Capture-the-Flag setting),\n\u2502          Section 4 (Analysis \u2014 strategy emergence)\n\u251c\u2500\u2500 SKIP:  Network architecture details (Section 2.3) unless implementing\n\u251c\u2500\u2500 MATH:  \u2192 \"The Elo rating system used to evaluate agents (Section 2.4). \n\u2502             Understand: Elo is a relative skill measure. In a population,\n\u2502             Elo ratings tell you WHO is strong against WHOM. This is the \n\u2502             empirical game theory lens: the Elo matrix IS the meta-game.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"FTW shows that population-based training creates an implicit \n    CURRICULUM: weak agents face weak opponents and gradually improve, strong \n    agents face strong opponents and keep being challenged. No hand-designed \n    curriculum needed \u2014 the population self-organizes into a difficulty ladder.\"\n```\n\n### Paper 3: Vinyals et al. \u2014 \"Grandmaster Level in StarCraft II Using Multi-Agent Reinforcement Learning\" (AlphaStar, 2019)\n\n**Link:** https://www.nature.com/articles/s41586-019-1724-z  \n**Alt link:** https://arxiv.org/abs/1911.12254 (extended version)\n\n```\n\u251c\u2500\u2500 READ:  Section 2.3 (\"AlphaStar League\" \u2014 THE gold standard for PBT in games.\n\u2502          Three agent types in the population:\n\u2502          - Main agents: trained against the full league\n\u2502          - Main exploiters: trained to exploit ONLY the main agents' weaknesses\n\u2502          - League exploiters: trained to exploit the full league\n\u2502          This three-tier design solves the diversity problem: exploiters prevent\n\u2502          the main agents from becoming overfit to one strategy.\n\u2502          Also read: the priority mechanism for opponent selection \u2014 how agents \n\u2502          are matched to create the optimal curriculum),\n\u2502          Section 3 (Results \u2014 Grandmaster performance, strategy diversity)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Section 2.1\u20132.2 (Architecture \u2014 transformer-based agent, not critical \n\u2502          for understanding the PBT design),\n\u2502          Section 4 (Analysis)\n\u251c\u2500\u2500 SKIP:  Architecture details, training infrastructure specifics (Google-scale)\n\u251c\u2500\u2500 MATH:  \u2192 \"The Nash clustering and rectification mechanism (Methods, extended).\n\u2502             AlphaStar uses an approximation of the Nash equilibrium of the \n\u2502             meta-game (the game between policies in the league) to determine \n\u2502             training matchups. This connects directly to your Step 9 PSRO: \n\u2502             AlphaStar's league IS a large-scale PSRO. The difference: AlphaStar\n\u2502             uses neural network agents as 'oracles' and trains continuously\n\u2502             instead of iteratively.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"AlphaStar's league solves the diversity problem in PBT: without \n    exploiters, the population converges to a single dominant strategy. Exploiters\n    force the main agents to be robust to DIVERSE attack vectors. This is \n    ARTIFICIAL SELECTION \u2014 the exploiters create selection pressure that maintains\n    population diversity. For your thesis: this is the multi-agent analog of the \n    exploitation-safety tradeoff from Step 8.\"\n```\n\n### Paper 4: Balduzzi et al. \u2014 \"Open-Ended Learning in Symmetric Zero-Sum Games\" (2019)\n\nhttps://arxiv.org/abs/1901.01753 (ICLR 2019)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Spinning top decomposition \u2014 the payoff matrix between \n\u2502          strategies can be decomposed into:\n\u2502          - A TRANSITIVE component (pure skill \u2014 strategy A > B > C)\n\u2502          - A CYCLIC component (non-transitive: A > B > C > A, like RPS)\n\u2502          This decomposition tells you: is your game's skill structure \n\u2502          hierarchical or cyclic? If cyclic, self-play and naive PBT will \n\u2502          fail because improvements are illusory (beating strategy B doesn't \n\u2502          mean getting better; it means shifting in the cycle).),\n\u2502          Section 4 (Rectification \u2014 how to modify PSRO to handle the cyclic \n\u2502          component by ensuring only genuinely improving policies are added)\n\u251c\u2500\u2500 SKIM:  Abstract, Sections 1\u20132 (Introduction and background),\n\u2502          Section 5 (Experiments \u2014 Blotto, random games)\n\u251c\u2500\u2500 SKIP:  Proofs (read statements only)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Spinning top decomposition) \u2014 read the STATEMENT.\n\u2502             Every antisymmetric payoff matrix A = T + C where T is transitive\n\u2502             (has a total skill ordering) and C is cyclic (pure rock-paper-scissors\n\u2502             dynamics). This is the key diagnostic for multi-agent training: \n\u2502             if your game has a large cyclic component, simple self-play CANNOT \n\u2502             converge to a good strategy.\"\n\u2502          \u2192 \"Section 3.2 (Game-theoretic strength) \u2014 understand the definition.\n\u2502             The transitive component T defines a 'true skill' ranking. The \n\u2502             cyclic component C is noise in the ranking. Use this to evaluate \n\u2502             whether your population's improvement is real or illusory.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Balduzzi shows that many games have significant non-transitive \n    structure (like rock-paper-scissors). In these games, beating strategy A \n    doesn't mean you're 'better' \u2014 it might mean you've just shifted to \n    strategy B that happens to beat A but loses to C. Self-play and naive PBT \n    can cycle forever in these games. Rectified PSRO addresses this. For your \n    thesis: this is critical for understanding WHY population diversity matters \n    in FFA games (Step 11).\"\n```\n\n### Paper 5: Tuyls, P\u00e9rolat, Lanctot et al. \u2014 \"A Generalised Method for Empirical Game Theoretic Analysis\" (2018)\n\nhttps://arxiv.org/abs/1803.06376 (AAMAS 2018)\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (EGTA framework \u2014 how to analyze a multi-agent system as \n\u2502          a game over a FINITE set of strategies. Instead of analyzing the \n\u2502          original game (which may be enormous), you sample a finite set of \n\u2502          strategies and construct an EMPIRICAL GAME among them. Nash of the \n\u2502          empirical game approximates Nash of the real game),\n\u2502          Section 4 (Theoretical bounds \u2014 how well does the empirical Nash \n\u2502          approximate the true Nash? This depends on the number of samples \n\u2502          and the structure of the strategy space)\n\u251c\u2500\u2500 SKIM:  Abstract, Sections 1\u20132,\n\u2502          Section 5 (Experiments)\n\u251c\u2500\u2500 SKIP:  Extended proofs\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorem 1 (Approximation bound) \u2014 read the STATEMENT. The empirical\n\u2502             Nash converges to the true Nash as the strategy sample grows. The \n\u2502             rate depends on the game's structure. This is the theoretical \n\u2502             foundation for PSRO's convergence (PSRO IS empirical game theory \n\u2502             with an expanding strategy sample).\"\n\u2514\u2500\u2500 KEY INSIGHT: \"EGTA provides the EVALUATION FRAMEWORK for population-based \n    training: instead of asking 'how good is my agent?', you ask 'how good is \n    the Nash equilibrium of the empirical game defined by my population?' This \n    is the multi-agent evaluation tool for your thesis's Contribution #3.\"\n```\n\n### Supplementary References\n\n- **Hofbauer, J. & Sigmund, K. (1998/2003) \u2014 \"Evolutionary Game Dynamics\"**  \n  http://www.ams.org/journals/bull/2003-40-04/S0273-0979-03-00988-1/  \n  *The foundational reference on replicator dynamics and evolutionary stability. Read Section 2 for the replicator equation and Section 3 for evolutionary stable strategies (ESS). This is the mathematical backbone connecting evolutionary dynamics to multi-agent learning.*\n\n- **Hill (2025) \u2014 \"Co-Evolving Complexity: An Adversarial Framework for Automatic MARL Curricula\"**  \n  https://arxiv.org/abs/2509.03771  \n  *NeurIPS 2025 workshop paper on co-evolutionary curriculum design. SKIM abstract + Section 3. Relevant to the auto-curriculum mechanism in PBT and Step 11's emergent complexity.*\n\n- **Xu et al. (2025) \u2014 \"Heterogeneous Adversarial Play in Interactive Environments\"**  \n  https://arxiv.org/abs/2510.18407  \n  *NeurIPS 2025. Diversity through heterogeneous adversarial self-play. SKIM for population diversity mechanisms.*\n\n- **De La Fuente et al. (2024) \u2014 \"Game Theory and MARL: From Nash Equilibria to Evolutionary Dynamics\"**  \n  https://arxiv.org/abs/2412.20523  \n  *22-page survey connecting game theory with evolutionary MARL. SKIM for conceptual overview.*\n\n- **Yao et al. (2023) \u2014 \"Policy Space Diversity for Non-Transitive Games\"**  \n  https://arxiv.org/abs/2306.16884  \n  *Addresses PSRO diversity collapse in non-transitive games via diversity regularization. SKIM Section 3 for the diversity mechanism.*\n\n### Math Flags\n\n\ud83d\udd22 **Replicator dynamics equation (Hofbauer & Sigmund)** \u2014 Must understand.  \n**WHY:** The replicator equation dx_i/dt = x_i(f_i(x) - f\u0304(x)) is the mathematical formalization of population evolution. It connects to Nash equilibria (fixed points are equilibria), evolutionary stability (ESS is an attractor), and the cycling problem in non-transitive games (orbits around the fixed point). For your thesis: understanding when replicator dynamics CONVERGE vs CYCLE tells you when population-based methods will work.\n\n\ud83d\udd22 **Spinning top decomposition (Balduzzi et al., Theorem 1)** \u2014 Must understand the statement.  \n**WHY:** This decomposition (A = T + C, transitive + cyclic) is the diagnostic tool for evaluating whether your multi-agent training is actually improving or just cycling. For your thesis: FFA games (Step 11) likely have significant non-transitive structure (coalition dynamics create RPS-like cycles). Understanding the decomposition helps you design evaluation metrics (Contribution #3) that distinguish real improvement from cyclical shift.\n\n\ud83d\udd22 **EGTA approximation bound (Tuyls et al., Theorem 1)** \u2014 Read statement.  \n**WHY:** This bound tells you how many policies you need in your population for the empirical Nash to approximate the true Nash. For your thesis evaluation (Contribution #3), this determines sample complexity for multi-agent evaluation.\n\n---\n\n## Phase 4: Implementation (6 days)\n\n### Project: PBT League for Leduc + Evolutionary Analysis\n\n**Language + Framework:** Python 3.10+ / PyTorch / OpenSpiel\n\nStarting point: Your PSRO from Step 9 + your Nash solver from Step 2 + your Deep CFR/PPO from Steps 5/1.\n\n| Component | AI Tag | Justification |\n|-----------|--------|---------------|\n| Replicator dynamics simulator on matrix games | \ud83d\udd34 HAND-CODE | Evolutionary game theory is a thesis foundation. Must understand the dynamics: code the replicator equation, verify ESS, observe cycling on RPS. |\n| Spinning top decomposition (transitive + cyclic) | \ud83d\udd34 HAND-CODE | The T+C decomposition is the key analytical tool for evaluating population-based training. Hand-code the SVD-based decomposition and apply it to your meta-game payoff matrices. |\n| PBT League for Leduc (inspired by AlphaStar's league) | \ud83d\udd34 HAND-CODE | The population training loop IS the thesis-relevant mechanism. Three agent roles: main agents, main exploiters, league exploiters. Implement the matchmaking, the exploitation-safety cycle, and the population evolution. |\n| Elo rating system for the league | \ud83d\udfe1 AI-ASSISTED | Standard Elo computation. AI generates, you verify the update formula. |\n| EGTA analysis of population | \ud83d\udd34 HAND-CODE | Empirical game-theoretic analysis: construct the meta-game from league results, compute Nash of the meta-game, use it as evaluation metric. This is Contribution #3's prototype. |\n| Diversity metrics (effective diversity, strategy clustering) | \ud83d\udfe1 AI-ASSISTED | Metrics for population diversity. AI drafts, you review the definitions. |\n| Experiment logging + visualization | \ud83d\udfe2 AI-GENERATED | Standard infrastructure. Plotting evolution trajectories, Elo curves, payoff heatmaps. |\n\n### Sub-phase Breakdown (6 days):\n\n**Day 1 \u2014 Evolutionary Dynamics on Matrix Games:**\n- \ud83d\udd34 Implement replicator dynamics:\n  ```python\n  def simulate_replicator(payoff_A, payoff_B, x0, y0, T=1000, dt=0.01):\n      \"\"\"Simulate 2-population replicator dynamics.\n      x = row player strategy distribution, y = column player distribution.\"\"\"\n      xs, ys = [x0], [y0]\n      for _ in range(T):\n          # Fitness for each strategy\n          fx = payoff_A @ ys[-1]  # fitness of each row strategy\n          fy = payoff_B.T @ xs[-1]  # fitness of each column strategy\n          # Average fitness\n          avg_fx = xs[-1] @ fx\n          avg_fy = ys[-1] @ fy\n          # Replicator update\n          x_new = xs[-1] + xs[-1] * (fx - avg_fx) * dt\n          y_new = ys[-1] + ys[-1] * (fy - avg_fy) * dt\n          # Normalize (numerical stability)\n          xs.append(x_new / x_new.sum())\n          ys.append(y_new / y_new.sum())\n      return xs, ys\n  ```\n- Run on all matrix games from Step 9. Verify:\n  - PD: cooperate goes to 0, defect to 1 (defection dominates)\n  - Hawk-Dove: converges to mixed ESS (matching Nash)\n  - RPS: orbits around (1/3, 1/3, 1/3) without converging\n  - Stag Hunt: depends on initial conditions (two basins of attraction)\n- Plot phase portraits (2D: strategy probability vs time, or in simplex for 3-strategy games)\n\n**Day 2 \u2014 Spinning Top Decomposition:**\n- \ud83d\udd34 Implement the transitive-cyclic decomposition from Balduzzi et al.:\n  ```python\n  def spinning_top_decomposition(payoff_matrix):\n      \"\"\"Decompose antisymmetric payoff matrix A into T (transitive) + C (cyclic).\n      A must be zero-sum: A[i,j] = -A[j,i].\"\"\"\n      n = payoff_matrix.shape[0]\n      # Make antisymmetric: A_anti = (A - A.T) / 2\n      A_anti = (payoff_matrix - payoff_matrix.T) / 2\n      # SVD decomposition\n      U, S, Vt = np.linalg.svd(A_anti)\n      # Transitive component: rank-1 approximation\n      # T = s1 * u1 * v1^T (the strongest skill dimension)\n      T = S[0] * np.outer(U[:, 0], Vt[0, :])\n      # Cyclic component: everything else\n      C = A_anti - T\n      return T, C\n  ```\n- Apply to:\n  - Your PSRO meta-game from Step 9 (Leduc population)\n  - Analytically: RPS (pure cyclic), \"skill game\" like a clear ranking (pure transitive)\n- Measure: transitive_ratio = ||T|| / ||A|| \u2014 how much of the game is \"real skill\" vs \"cycling\"?\n- **Thesis insight:** If Leduc has high transitive ratio \u2192 self-play works well. If low \u2192 population diversity is essential.\n\n**Days 3\u20134 \u2014 PBT League for Leduc:**\n- \ud83d\udd34 Implement the mini-AlphaStar league for Leduc:\n  ```python\n  class LeducLeague:\n      def __init__(self, num_main=3, num_main_exploiters=2, num_league_exploiters=2):\n          # Three agent types (inspired by AlphaStar):\n          # Main agents: trained against the whole league (goal: be robust)\n          # Main exploiters: trained against main agents only (goal: find weaknesses)\n          # League exploiters: trained against entire league (goal: exploit anyone)\n          self.main_agents = [create_agent() for _ in range(num_main)]\n          self.main_exploiters = [create_agent() for _ in range(num_main_exploiters)]\n          self.league_exploiters = [create_agent() for _ in range(num_league_exploiters)]\n          self.frozen_agents = []  # Historical snapshots\n      \n      def train_epoch(self):\n          # 1. Match each agent type against appropriate opponents\n          # Main: play vs entire league (uniform or prioritized sampling)\n          # Main exploiters: play vs main agents only (find their weaknesses)\n          # League exploiters: play vs all (find anyone's weakness)\n n  - Effective population size: how many agents have >1% weight in meta-Nash?\n  - Strategy clustering: cluster agents by their behavior (action distributions on sample hands)\n  - Exploit coverage: for each agent, is there an exploiter that beats it significantly?\n- Compare final league results with:\n  - Vanilla PSRO from Step 9\n  - Single self-play agent (no population)\n  - Your MCCFR Nash strategy from Step 3\n- Create summary table: method \u2192 exploitability, Elo, diversity metrics\n\n### Deliverables:\n- [ ] Replicator dynamics simulator with verified behavior on matrix games\n- [ ] Phase portraits for all matrix games showing convergence/cycling\n- [ ] Spinning top decomposition implementation with transitive ratio metric\n- [ ] PBT League for Leduc (main agents + exploiters + historical snapshots)\n- [ ] EGTA analysis computing meta-Nash of the league\n- [ ] Elo rating tracking across training epochs\n- [ ] Diversity metrics (effective population size, strategy clustering)\n- [ ] Comparison: league vs PSRO vs self-play vs Nash (MCCFR)\n\n### Validation:\n- **Replicator dynamics:** Verify against known analytical results for PD (defection dominates), Hawk-Dove (mixed ESS), RPS (cycling).\n- **Spinning top on RPS:** Should be 100% cyclic (zero transitive component).\n- **PBT League:** Main agents' exploitability should decrease over training epochs. Main exploiters should find weaknesses that push main agents to improve.\n- **EGTA meta-Nash:** Exploitability of the meta-Nash mixture should be \u2264 exploitability of best individual agent.\n- **League vs PSRO:** On Leduc, the league's meta-Nash exploitability should be comparable to PSRO's (both are population-based).\n\n---\n\n## Phase 5: Consolidation (2 days)\n\n### Day 1 \u2014 Survey Skim + Supplementary Papers\n\n- **Reference skim:** Bloembergen, Tuyls et al. (2015) \u2014 \"Evolutionary Dynamics of Multi-Agent Learning: A Survey\"  \n  https://jair.org/index.php/jair/article/view/10952  \n  *The h computation from Step 9 becomes the EGTA analysis from Step 10.\n    - [Step 10] Spinning top decomposition \u2192 prediction: [Step 11] FFA coalition games likely have LARGE cyclic component (coalition dynamics are inherently non-transitive: A+B beats C, B+C beats A, C+A beats B). This means naive self-play/PBT will cycle, requiring the diversity mechanisms studied here.\n    - [Step 10] EGTA \u2192 prediction: [Step 14] The empirical game-theoretic analysis becomes a core evaluation tool for Contribution #3. Meta-Nash of the agent population is the multi-agent generalization of exploitability.\n  - **Confusions:**\n    - [Step 10] AlphaStar uses ~600 agents in the league, trained with massive compute (TPU pods). For Leduc, we use 7 agents. Does the league design still make sense at small scale? Is the three-agent-type structure overhead that doesn't help for small games? \u2192 PARTIALLY ANSWERED (the exploiter mechanism still helps even at small scale, but the diversity benefits are less dramatic)\n    - [Step 10] Replicator dynamics assume a fixed payoff matrix (a fixed game). But in PBT/league training, the agents are LEARNING \u2014 the \"game\" changes as agents improve. How does this non-stationarity affect the replicator analysis? \u2192 OPEN (link to Step 9's learning dynamics question)\n    - [Step 10] The spinning top decomposition requires computing the FULL payoff matrix between all agents. For large populations, this is O(n\u00b2) games. Is there an efficient approximation? \u2192 OPEN (relevant for Step 14 scaling)\n    - [Step 8\u219210] Step 8 proved safe exploitation for 2-player. The AlphaStar exploiter mechanism provides safety pressure in a POPULATION. But is there a formal guarantee? AlphaStar exploiters are heuristic \u2014 there's no theorem saying \"main agents can't become exploitable.\" \u2192 OPEN (this IS the Contribution #2 gap: formalizing population-level safety)\n\n## Exit Checklist\n\n- [ ] Replicator dynamics working on all matrix games with verified convergence/cycling\n- [ ] Phase portraits plotted for PD, Hawk-Dove, RPS, Stag Hunt\n- [ ] Spinning top decomposition implemented and applied to PSRO meta-game + league meta-game\n- [ ] Can explain from memory: replicator equation and what its fixed points correspond to (Nash / ESS)\n- [ ] Can explain from memory: transitive vs cyclic components and why the cyclic component prevents naive PBT convergence\n- [ ] PBT League for Leduc with three agent types (main, main exploiter, league exploiter) training and improving\n- [ ] EGTA analysis: meta-Nash of league is less exploitable than any individual agent\n- [ ] Elo tracking showing meaningful skill progression in the league\n- [ ] Diversity metrics computed (effective population size, strategy clustering)\n- [ ] Comparison table: league vs PSRO vs self-play vs MCCFR Nash on Leduc\n- [ ] Can explain AlphaStar's league design from memory (three agent types, matchmaking, freezing)\n- [ ] All \ud83d\udd34 components hand-coded (replicator dynamics, spinning top decomposition, PBT league loop, EGTA analysis)\n- [ ] One-pager written and committed\n- [ ] Learning Log updated (connections from Steps 2\u20139 + new confusions + resolved confusions)\n- [ ] PhD connection documented (PBT as automated opponent modeling, population safety gap, EGTA as evaluation framework)\n- [ ] Step notes committed to repo\n",
  "step_11": "# Step 11 \u2014 Dynamic Coalition Formation in Competitive FFA Games\n\n**Duration:** 14 days (Tier 2)  \n**Dependencies:** Step 7 (Opponent Modeling), Step 9 (Multi-Agent RL), Step 10 (PBT + Evolutionary Game Theory)  \n**Phase:** E \u2014 Multi-Agent Dynamics  \n\n### PhD Connection\n\nThis step is the THESIS FRONTIER. Everything from Steps 2\u201310 was building existing tools. Step 11 enters unstudied territory:\n\n- **Contribution #1 (Behavioral Adaptation):** The coalition detector extends opponent modeling from \"what kind of player is this?\" to \"who is allied with whom?\" This is the multi-agent generalization of behavioral adaptation: instead of adapting to one opponent's style, you adapt to the SOCIAL STRUCTURE of the game.\n- **Contribution #2 (Multi-Agent Safe Exploitation):** The central thesis gap crystallizes here:\n  - In 2-player games: safe exploitation = bounded deviation from Nash. Well-studied.\n  - In N-player FFA games: Nash is intractable AND strategically useless (ignores coalitions). The \"safe baseline\" must be something else \u2014 Bakhtin et al.'s piKL suggests a BEHAVIORAL prior, Step 10's population mechanisms suggest a POPULATION-LEVEL baseline. Your thesis contribution: define and prove safety guarantees for N-player FFA settings, likely using a behavioral or population-based safety notion instead of an equilibrium one.\n  - SLS is the TESTBED for this contribution. It's small enough to analyze exhaustively (4 players, finite state space) but rich enough to exhibit real coalition dynamics.\n- **Contribution #3 (Evaluation Methodology):** Standard exploitability doesn't work in N-player games (no clear \"best response\" against a coalition). The EGTA meta-game over agent populations + Shapley credit decomposition provides the alternative evaluation framework. SLS is where you prototype and validate this framework.\n\n---\n\n## Table of Contents\n- [Phase 1: Intuition (1 day)](#phase-1-intuition-1-day)\n  - [Blog Posts / Accessible Reads](#blog-posts-accessible-reads)\n- [Phase 2: Exploration (2 days)](#phase-2-exploration-2-days)\n  - [Day 1: Play So Long Sucker + Understand Coalition Dynamics](#day-1-play-so-long-sucker-understand-coalition-dynamics)\n  - [Day 2: Cooperative Game Theory on Simple Games](#day-2-cooperative-game-theory-on-simple-games)\n- [Phase 3: Targeted Reading (3 days)](#phase-3-targeted-reading-3-days)\n  - [Paper 1: Sharan & Adak \u2014 \"Reinforcing Competitive Multi-Agents for Playing 'So Long Sucker'\" (2024)](#paper-1-sharan-adak-reinforcing-competitive-multi-agents-for-playing-so-long-sucker-2024)\n  - [Paper 2: De Carufel & Jerade \u2014 \"So Long Sucker: Endgame Analysis\" (2024)](#paper-2-de-carufel-jerade-so-long-sucker-endgame-analysis-2024)\n  - [Paper 3: Bakhtin et al. \u2014 \"Mastering the Game of No-Press Diplomacy\" (2022)](#paper-3-bakhtin-et-al-mastering-the-game-of-no-press-diplomacy-2022)\n  - [Paper 4: Chalkiadakis, Elkind & Wooldridge \u2014 \"Computational Aspects of Cooperative Game Theory\" (2011)](#paper-4-chalkiadakis-elkind-wooldridge-computational-aspects-of-cooperative-game-theory-2011)\n  - [Paper 5: Wang, Zhang, Kim & Gu \u2014 \"Shapley Q-value: A Local Reward Approach to Solve Global Reward Games\" (AAAI 2020)](#paper-5-wang-zhang-kim-gu-shapley-q-value-a-local-reward-approach-to-solve-global-reward-games-aaai-2020)\n  - [Supplementary References](#supplementary-references)\n  - [Math Flags](#math-flags)\n- [Phase 4: Implementation (6 days)](#phase-4-implementation-6-days)\n  - [Project: Coalition-Aware Multi-Agent Training for So Long Sucker](#project-coalition-aware-multi-agent-training-for-so-long-sucker)\n  - [Sub-phase Breakdown (6 days):](#sub-phase-breakdown-6-days)\n  - [Deliverables:](#deliverables)\n  - [Validation:](#validation)\n- [Phase 5: Consolidation (2 days)](#phase-5-consolidation-2-days)\n  - [Day 1 \u2014 Survey Skim + Cross-References](#day-1-survey-skim-cross-references)\n  - [Day 2 \u2014 PhD Mapping + One-Pager + Learning Log](#day-2-phd-mapping-one-pager-learning-log)\n- [Exit Checklist](#exit-checklist)\n\n## Phase 1: Intuition (1 day)\n\nThe goal: understand WHY coalition formation is hard (and interesting). Key insight: in all previous steps, you've worked with 2-player games. The moment you add a third player, something fundamentally changes: **players can form temporary alliances.** In a 2-player game, there's nothing to negotiate \u2014 you either cooperate or not. In a 3+ player game, you can say \"Let's gang up on Player C\" \u2014 and then betray your ally later. This dynamic \u2014 form coalitions, exploit them, dissolve them, form new ones \u2014 is the heart of FFA games and is essentially unstudied in the RL/game AI literature.\n\nEnd of day: you should be able to explain to a non-expert: \"In a poker game with 6 players, two players might secretly work together \u2014 sharing information about their hands, or one folding to let the other win a big pot. This is a COALITION. But coalitions in competitive games are unstable \u2014 eventually, one member will betray the other when it's profitable. Learning WHEN to form, MAINTAIN, and BREAK coalitions is an unsolved problem in AI. Traditional game theory (Nash equilibrium) can't tell you much about this because Nash treats each player independently. Cooperative game theory (Shapley value, the core) provides tools to analyze WHO should be in a coalition and HOW to divide the gains \u2014 but it assumes coalitions are stable. The real challenge is when coalitions are DYNAMIC.\"\n\n- **\"The mathematics behind Shapley Values\" by A Data Odyssey**  \n  https://www.youtube.com/watch?v=UJeu29wq7d0  \n  Duration: ~12m | Channel: A Data Odyssey  \n  *Clear visual explanation of how to fairly divide gains among cooperating players. Builds the intuition for coalition value and credit assignment used in So Long Sucker.*\n\n- **\"CICERO: An AI agent that negotiates, persuades, and cooperates with people\" (Meta AI)**  \n  https://www.youtube.com/watch?v=ciNMc0Czmfc  \n  Speaker: Meta AI  \n  *State-of-the-art multi-player game AI with coalition dynamics. Shows how CICERO combines language models with strategic planning to form alliances, negotiate, and betray in 7-player Diplomacy.*\n\n- **\"Parables on the Power of Planning in AI: From Poker to Diplomacy\" by Noam Brown (OpenAI)**  \n  https://www.youtube.com/watch?v=eaAonE58sLU  \n  Duration: ~57m | Speaker: Noam Brown (OpenAI)  \n  *Distinguished lecture covering the full journey from poker to Diplomacy. Focus on the Diplomacy sections: how does the system decide whom to ally with, when to betray, and how to balance short-term alliance utility vs long-term strategic independence.*\n\n### Blog Posts / Accessible Reads\n\n- **Meta AI Blog \u2014 \"CICERO: An AI agent that negotiates, persuades, and cooperates with people\"**  \n  https://ai.meta.com/research/cicero/  \n  *Read for the system architecture: how planning and language are combined for Diplomacy.*\n\n- **Wikipedia \u2014 \"Cooperative Game Theory\"**  \n  https://en.wikipedia.org/wiki/Cooperative_game_theory  \n  *Quick primer on the core, Shapley value, and stability concepts. Read the \"Solution concepts\" section.*\n\n- **Wikipedia \u2014 \"So Long Sucker\"**  \n  https://en.wikipedia.org/wiki/So_Long_Sucker  \n  *Read the rules of the game. SLS (created by Nash, Shapley, Shubik, and Hausner in 1950!) is specifically designed to study coalition dynamics: 4 players, chip-passing creates implicit alliances, and one player must be \"killed\" to win. The game FORCES coalition formation and betrayal.*\n\n- **John Nash, Lloyd Shapley, Martin Shubik & Melvin Hausner \u2014 Original SLS design context**  \n  The game was created by four of the greatest game theorists of the 20th century. Nash and Shapley (both Nobel laureates) designed it to study the tension between cooperation and competition. The fact that the first RL paper on SLS appeared in 2024 shows how under-explored this area is.\n\n---\n\n## Phase 2: Exploration (2 days)\n\n### \ud83c\udfae Interactive Exploration\n- **[Evolution of Trust (Multi-Agent)](https://ncase.me/trust/)** \u2014 How do coalitions and alliances form? Re-play the trust interactive through the lens of team generation.\n\n\n### Day 1: Play So Long Sucker + Understand Coalition Dynamics\n\n1. **Get the SLS codebase from Sharan & Adak:**\n   - Their paper (arXiv:2411.11057) includes a GUI + benchmarking framework\n   - Clone and run the code. Play several games manually (or against their random baseline)\n   - **Understand the rules viscerally:**\n     - 4 players, each starts with 7 chips of their color\n     - On your turn: place a chip on any pile (starts or extends a pile)\n     - A pile is \"captured\" when the top two chips are the same color \u2014 that player takes all chips below\n     - You can place OTHER players' chips (that you captured) \u2014 this creates implicit alliances (you're helping them)\n     - A player is eliminated when they have no chips in hand AND no chips on any pile\n     - Last player standing wins\n   - **Key observation:** Placing another player's chip = implicit alliance signal. Taking it back or refusing to play it = betrayal signal. The ENTIRE coalition dynamic is encoded in chip-placement decisions.\n\n2. **Observe the DQN agents from Sharan & Adak:**\n   - Run their trained DQN/DDQN/Dueling DQN agents\n   - Do the agents show any coalition-like behavior? (Do they consistently help one player over others?)\n   - Answer: likely no \u2014 basic DQN treats each decision independently without a coalition concept\n\n3. **Manual coalition experiments:**\n   - Play a 4-player game with 2 hand-coded coalition strategies:\n     - \"Always ally with Player 1\": consistently place Player 1's chips, never capture Player 1's piles\n     - \"Betray at endgame\": ally with Player 1 for the first half, then switch targets\n   - Observe: does the fixed-ally strategy dominate the random baseline? Does the betrayal strategy dominate the fixed-ally?\n\n### Day 2: Cooperative Game Theory on Simple Games\n\n1. **Compute Shapley values on toy coalition games:**\n   ```python\n   import itertools\n   import numpy as np\n   \n   def shapley_value(n_players, value_function):\n       \"\"\"Compute Shapley value for each player.\n       value_function(coalition) \u2192 value of the coalition (set of player indices).\"\"\"\n       shapley = np.zeros(n_players)\n       for i in range(n_players):\n           for perm in itertools.permutations(range(n_players)):\n               # Find i's position in the permutation\n               pos = list(perm).index(i)\n               # Coalition before i joins\n               before = set(perm[:pos])\n               # Coalition after i joins\n               after = before | {i}\n               # Marginal contribution of i\n               shapley[i] += value_function(after) - value_function(before)\n           shapley[i] /= np.math.factorial(n_players)\n       return shapley\n   ```\n   \n   - Test on the classic \"glove game\": Players {1,2,3}, player 1 has a left glove, players 2 and 3 each have a right glove. A pair is worth $1. Shapley values: player 1 = $2/3, players 2,3 = $1/6 each. (Player 1 is more valuable because they're scarce.)\n   \n   - Test on a 3-player majority game: any 2+ players can win together. v({1})=v({2})=v({3})=0, v({1,2})=v({1,3})=v({2,3})=v({1,2,3})=1. Shapley values: each player gets 1/3. (Symmetric \u2192 equal split.)\n\n2. **Compute the core of these games:**\n   ```python\n   # The core: set of payoff allocations where no coalition can do better\n   # For the glove game: core = {(1, 0, 0)} - player 1 gets everything!\n   # (Because any coalition without player 1 gets 0, so player 1 has all leverage)\n   # \n   # Contrast: Shapley value says (2/3, 1/6, 1/6)\n   # Core says (1, 0, 0)\n   # Key insight: the core is about STABILITY (no group can deviate profitably)\n   # Shapley is about FAIRNESS (average marginal contribution)\n   # These can differ dramatically!\n   ```\n\n3. **Connect to SLS:**\n   - In SLS, the \"value\" of a coalition = probability of its members winning\n   - But the coalition structure changes EVERY TURN (dynamic, not static)\n   - Shapley value can be computed at each timestep to estimate \"who is helping whom the most\"\n   - The challenge: computing Shapley exactly requires 2^N subsets. For N=4, that's 16 \u2014 feasible. For N=6 (poker), that's 64 \u2014 still feasible. For large N, you'd need approximations.\n\n---\n\n## Phase 3: Targeted Reading (3 days)\n\n### Paper 1: Sharan & Adak \u2014 \"Reinforcing Competitive Multi-Agents for Playing 'So Long Sucker'\" (2024)\n\nhttps://arxiv.org/abs/2411.11057\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (SLS game formalization \u2014 state representation, action space,\n\u2502          reward function. CRITICAL for your implementation. How do they encode\n\u2502          the game state for neural networks? What actions are available? How is\n\u2502          the reward structured for a game where 3 out of 4 players LOSE?),\n\u2502          Section 3 (RL approach \u2014 self-play training, DQN/DDQN/Dueling DQN. \n\u2502          What's the training setup? How many games? What's the training horizon?),\n\u2502          Section 4 (Results \u2014 ~50% of max reward, outperforms random. What \n\u2502          strategies emerge? Are there any coalition-like patterns?)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 motivation for SLS as benchmark),\n\u2502          Section 5 (Conclusion \u2014 identified gaps and future work)\n\u251c\u2500\u2500 SKIP:  Related work on standard MARL benchmarks (you covered in Step 9)\n\u251c\u2500\u2500 MATH:  \u2192 \"No complex math. Read the state representation carefully \u2014 this is \n\u2502             your starting point for implementation. Their reward function is key:\n\u2502             how do you reward an agent in a game where only 1 out of 4 wins?\"\n\u2514\u2500\u2500 KEY INSIGHT: \"The first RL paper on SLS uses basic DQN with NO coalition-aware \n    mechanisms. Agents learn to play legally but don't form or exploit coalitions.\n    This is the gap your step fills: adding coalition detection (Step 7's opponent \n    model applied to alliance behavior) and coalition-aware training (Shapley \n    credit assignment) to SLS.\"\n```\n\n### Paper 2: De Carufel & Jerade \u2014 \"So Long Sucker: Endgame Analysis\" (2024)\n\nhttps://arxiv.org/abs/2403.17302\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (Formal game rules \u2014 the definitive mathematical formalization\n\u2502          of SLS. Use this to verify your implementation's correctness),\n\u2502          Section 3 (Endgame characterization \u2014 when only 2 players remain, \n\u2502          who wins? This gives you the endgame ground truth for evaluation)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction),\n\u2502          Sections 4\u20135 (deeper combinatorial analysis \u2014 skim for structure)\n\u251c\u2500\u2500 SKIP:  Detailed proofs (51 pages \u2014 read statements of results only)\n\u251c\u2500\u2500 MATH:  \u2192 \"Theorems 1\u20133 characterize winning conditions in 2-player endgame.\n\u2502             READ STATEMENTS, skip proofs. These give you ground truth: when your\n\u2502             agents reach 2-player endgame, is the winner playing optimally?\"\n\u2514\u2500\u2500 KEY INSIGHT: \"The 2-player endgame has a complete analytical solution! This means \n    you can evaluate your agents' endgame play perfectly. The interesting/unsolved \n    part is the 4-player mid-game \u2014 where coalition dynamics dominate.\"\n```\n\n### Paper 3: Bakhtin et al. \u2014 \"Mastering the Game of No-Press Diplomacy\" (2022)\n\nhttps://arxiv.org/abs/2210.05492\n\n```\n\u251c\u2500\u2500 READ:  Section 2 (How to handle N>2 players in an imperfect-information game:\n\u2502          Diplomacy has 7 players, simultaneous moves, and implicit alliances.\n\u2502          The key technique: \"piKL\" \u2014 regularized policy search that keeps the \n\u2502          agent's policy close to a human-regularized prior. This prevents the\n\u2502          agent from deviating too far into \"AI-optimal but human-incomprehensible\"\n\u2502          play, which matters because coalition dynamics require being \n\u2502          INTERPRETABLE to potential allies),\n\u2502          Section 3 (Search \u2014 how to do real-time planning in a 7-player game.\n\u2502          They use sampled rollouts + evaluation. Connection to your Step 6 \n\u2502          subgame solving \u2014 but in the N-player setting, you can't just solve \n\u2502          the subgame because there's no clear \"opponent\" \u2014 everyone is both\n\u2502          potential ally and potential enemy),\n\u2502          Section 4 (Results \u2014 achieves human-level no-press Diplomacy. What\n\u2502          coalition patterns emerge? Does the agent learn to ally and betray?)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1, Section 5 (Discussion \u2014 what makes N-player \n\u2502          games fundamentally harder than 2-player)\n\u251c\u2500\u2500 SKIP:  Training infrastructure details (Meta-scale compute)\n\u251c\u2500\u2500 MATH:  \u2192 \"The piKL regularization (Section 2.2) \u2014 read the formula. \n\u2502             piKL = argmin KL(pi, pi_human) + lambda * expected_loss.\n\u2502             This is the N-player analog of safe exploitation from Step 8: \n\u2502             instead of a Nash baseline, the agent uses a HUMAN PRIOR as its \n\u2502             safety baseline. Why? Because in N-player games, Nash is \n\u2502             computationally intractable AND strategically unhelpful (Nash in \n\u2502             Diplomacy is 'do nothing' \u2014 not a useful baseline).\"\n\u2514\u2500\u2500 KEY INSIGHT: \"In N-player games, the 'safe' baseline is no longer Nash (too \n    hard to compute, not strategically meaningful). Instead, it's a HUMAN PRIOR \n    \u2014 play like humans do, deviate only when you can prove it's profitable. This \n    is a profound shift from Steps 2\u20138 (where Nash was always the baseline). \n    For your thesis Contribution #2: safe exploitation in N-player FFA games \n    may require a human-behavioral (or population-behavioral) baseline instead \n    of a Nash baseline.\"\n```\n\n### Paper 4: Chalkiadakis, Elkind & Wooldridge \u2014 \"Computational Aspects of Cooperative Game Theory\" (2011)\n\n**Link:** (Morgan & Claypool Synthesis Lectures \u2014 available via university library or https://www.morganclaypool.com/)\n\nThis is a slim textbook (~160 pages), not a paper. You need Chapters 2\u20134.\n\n- **Chapters 1:** What cooperative game theory is and how it differs from non-cooperative GT. *Prior context: you've studied non-cooperative GT extensively (Steps 2\u20138). Cooperative GT is the other half: it asks \"which coalitions will form and how will they divide the payoff?\" instead of \"what strategies will each individual player choose?\"*\n- **Chapters 2\u20133 (READ):** The core solution concepts: Shapley value, core, nucleolus, bargaining set. These are the mathematical tools for analyzing coalition stability and fair payoff division. For each concept understand: (a) what it means informally, (b) the formula, (c) when it exists (some games have an empty core!), (d) computational complexity.\n- **Chapter 4 (READ):** Coalition structure generation \u2014 how to find the OPTIMAL partition of players into coalitions. N-player games have 2^N possible coalitions and B_N possible coalition structures (Bell number \u2014 grows super-exponentially). This chapter covers algorithms for searching this space.\n- **Chapters 5+ (SKIM titles only):** Extensions (games with externalities, overlapping coalitions, dynamic settings). *Context for what's beyond the scope \u2014 you'll revisit in thesis work.*\n\n```\n\u251c\u2500\u2500 READ:  Chapters 2\u20134 (Shapley value, core, nucleolus definitions + algorithms,\n\u2502          coalition structure generation)\n\u251c\u2500\u2500 SKIM:  Chapter 1 (basics \u2014 much you already know from non-cooperative GT),\n\u2502          Chapter 5+ (titles and first paragraphs \u2014 extensions, dynamic settings)\n\u251c\u2500\u2500 MATH:  \u2192 \"The Shapley value formula \u2014 MUST know. The core constraints (linear \n\u2502             program) \u2014 MUST know. Coalition structure generation algorithms \n\u2502             (Chapter 4) \u2014 understand the search space, skim algorithm details.\"\n\u2514\u2500\u2500 KEY INSIGHT: \"Cooperative GT gives you the TOOLS to analyze coalitions: who \n    should cooperate, how to divide gains, when a coalition is stable. But \n    classical cooperative GT assumes STATIC coalitions decided before the game.\n    Your thesis challenge (Step 11) is the DYNAMIC case: coalitions form, evolve,\n    and dissolve DURING the game. No classical solution concept handles this.\"\n```\n\n### Paper 5: Wang, Zhang, Kim & Gu \u2014 \"Shapley Q-value: A Local Reward Approach to Solve Global Reward Games\" (AAAI 2020)\n\nhttps://arxiv.org/abs/1907.05707\n\n```\n\u251c\u2500\u2500 READ:  Section 3 (Shapley Q-value \u2014 decomposes the team's joint Q-value into\n\u2502          per-agent Shapley values. Each agent's \"credit\" for the team's success\n\u2502          is its Shapley value: the average marginal contribution across all \n\u2502          possible coalition orderings. This gives each agent a LOCAL reward \n\u2502          derived from the GLOBAL reward),\n\u2502          Section 4 (Algorithm \u2014 how to compute/approximate Shapley Q-values \n\u2502          in practice. Exact computation: sum over all 2^N subsets. \n\u2502          Approximation: Monte Carlo sampling of coalition orderings)\n\u251c\u2500\u2500 SKIM:  Abstract, Section 1 (Introduction \u2014 credit assignment problem in MARL),\n\u2502          Section 5 (Experiments \u2014 coop
