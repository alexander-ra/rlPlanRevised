<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>RL Study — Raw Steps</title>

  <!-- Favicon (Brain emoji representing RL / Study) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">

  <!-- marked.js — Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>

  <!-- Inter font (Material-inspired typography) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- highlight.js — Code syntax highlighting (light + dark) -->
  <link rel="stylesheet" class="hljs-light" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css">
  <link rel="stylesheet" class="hljs-dark" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/yaml.min.js"></script>

  <!-- KaTeX — Math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>

  <!-- INLINE_CSS -->
</head>
<body>
  <!-- READING PROGRESS BAR -->
  <div id="reading-progress" class="reading-progress"><div id="reading-progress-fill" class="reading-progress-fill"></div></div>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading study plan…</div>
  </div>

  <!-- OVERLAY BACKDROP (mobile nav) -->
  <div id="overlay" class="overlay"></div>

  <!-- SIDEBAR NAVIGATION -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Study Steps</h2>
      <button id="close-sidebar" class="icon-btn" aria-label="Close menu">&#x2715;</button>
    </div>
    <div id="nav-list" class="nav-list">
      <!-- Populated by JS: grouped by phase -->
    </div>
    <div class="sidebar-footer">
      <div class="sched-adjust">
        <span class="sched-label">Delay (days)</span>
        <button id="sched-minus" class="sched-btn" aria-label="Remove day">&minus;</button>
        <span id="sched-value" class="sched-value">0/0</span>
        <button id="sched-plus" class="sched-btn" aria-label="Add day">+</button>
      </div>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div id="main" class="main">
    <!-- TOP BAR -->
    <header class="topbar">
      <button id="hamburger" class="icon-btn" aria-label="Open menu">&#9776;</button>
      <div class="topbar-title-wrap">
        <span id="topbar-title" class="topbar-title">Step 1</span>
        <span id="topbar-section" class="topbar-section" role="button" tabindex="0" aria-label="Scroll to top" title="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})" onkeydown="if(event.key==='Enter')window.scrollTo({top:0,behavior:'smooth'})"></span>
      </div>
      <div class="topbar-nav">
        <button id="prev-btn" class="nav-btn" aria-label="Previous step">&larr; Prev</button>
        <button id="next-btn" class="nav-btn" aria-label="Next step">Next &rarr;</button>
      </div>
      <button id="theme-toggle-top" class="icon-btn topbar-theme-btn" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </header>

    <!-- TIMELINE BAR -->
    <div id="timeline-bar" class="timeline-bar"></div>

    <!-- CONTENT AREA -->
    <article id="content" class="content">
      <!-- Rendered markdown goes here -->
    </article>

    <!-- BOTTOM NAV (visible on mobile) -->
    <footer class="bottombar">
      <button id="prev-btn-bottom" class="nav-btn">&larr; Previous</button>
      <button id="sections-btn-bottom" class="bottombar-center-btn" aria-label="Jump to section"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="18" height="18" aria-hidden="true"><line x1="2" y1="4" x2="16" y2="4"/><line x1="5" y1="8" x2="16" y2="8"/><line x1="5" y1="12" x2="16" y2="12"/><line x1="2" y1="16" x2="16" y2="16"/></svg></button>
      <button id="next-btn-bottom" class="nav-btn">Next &rarr;</button>
    </footer>
  </div>

  <!-- SECTION JUMP (floating action button) -->
  <div id="section-nav" class="section-nav">
    <div id="section-dropdown" class="section-dropdown"></div>
    <button id="section-fab" class="section-fab" aria-label="Jump to section"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="16" height="16" aria-hidden="true"><line x1="2" y1="4" x2="16" y2="4"/><line x1="5" y1="8" x2="16" y2="8"/><line x1="5" y1="12" x2="16" y2="12"/><line x1="2" y1="16" x2="16" y2="16"/></svg></button>
  </div>

  <!-- INLINE_CONTENT -->
  <!-- INLINE_JS -->
</body>
</html>
