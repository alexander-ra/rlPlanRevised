<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .stroke-primary { 
      stroke: #1e293b; /* Professional Slate Gray/Blue */
      stroke-width: 2.5; 
      fill: none; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .fill-primary { 
      fill: #1e293b; 
    }
    .bg-fill { 
      fill: #ffffff; /* Acts as a mask to hide orbits behind the robot */
    }
  </style>

  <ellipse cx="50" cy="50" rx="14" ry="42" transform="rotate(30 50 50)" class="stroke-primary" />
  <ellipse cx="50" cy="50" rx="14" ry="42" transform="rotate(90 50 50)" class="stroke-primary" />
  <ellipse cx="50" cy="50" rx="14" ry="42" transform="rotate(150 50 50)" class="stroke-primary" />

  <circle cx="29" cy="13.5" r="3" class="fill-primary" />
  <circle cx="89" cy="50" r="3" class="fill-primary" />
  <circle cx="29" cy="86.5" r="3" class="fill-primary" />

  <rect x="35" y="38" width="30" height="24" rx="5" class="bg-fill stroke-primary" />
  
  <circle cx="43" cy="46" r="2" class="fill-primary" />
  <circle cx="57" cy="46" r="2" class="fill-primary" />
  
  <line x1="44" y1="54" x2="56" y2="54" class="stroke-primary" />
  
  <line x1="50" y1="38" x2="50" y2="30" class="stroke-primary" />
  <circle cx="50" cy="28" r="2.5" class="fill-primary bg-fill" stroke="#1e293b" stroke-width="2.5" />
  
  <path d="M 35 44 L 32 44 L 32 50 L 35 50" class="stroke-primary" />
  <path d="M 65 44 L 68 44 L 68 50 L 65 50" class="stroke-primary" />
</svg>
