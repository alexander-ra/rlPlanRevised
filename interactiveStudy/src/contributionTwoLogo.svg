<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .stroke-primary { 
      stroke: #1e293b; /* Same professional Slate Gray/Blue */
      stroke-width: 2.5; 
      fill: none; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .fill-primary { 
      fill: #1e293b; 
    }
    .bg-mask {
      fill: #ffffff; /* Acts as a mask for overlapping sections */
    }
  </style>

  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="14" class="bg-mask stroke-primary" />
    <line x1="0" y1="0" x2="0" y2="-25" class="stroke-primary" transform="rotate(0 0 0)" />
    <line x1="0" y1="0" x2="0" y2="-25" class="stroke-primary" transform="rotate(120 0 0)" />
    <line x1="0" y1="0" x2="0" y2="-25" class="stroke-primary" transform="rotate(240 0 0)" />
  </g>

  <defs>
    <g id="pvp-robot-bust">
      <path d="M -9 -7 L 9 -7 L 11 8 C 11 10, 8 12, 0 12 C -8 12, -11 10, -11 8 Z" class="bg-mask stroke-primary"/>
      
      <line x1="0" y1="-7" x2="0" y2="-16" class="stroke-primary" />
      <circle cx="0" cy="-16" r="3" class="fill-primary" />
      
      <circle cx="-5" cy="0" r="2" class="fill-primary" />
      <circle cx="5" cy="0" r="2" class="fill-primary" />
      
      <g transform="translate(-6, 5)">
        <rect x="0" y="0" width="2" height="4" rx="1" class="fill-primary"/>
        <rect x="4" y="0" width="2" height="4" rx="1" class="fill-primary"/>
        <rect x="8" y="0" width="2" height="4" rx="1" class="fill-primary"/>
      </g>
    </g>
  </defs>

  <use href="#pvp-robot-bust" x="50" y="20" transform="rotate(0 50 20)" />

  <use href="#pvp-robot-bust" x="76" y="65" transform="rotate(120 76 65)" />

  <use href="#pvp-robot-bust" x="24" y="65" transform="rotate(240 24 65)" />

</svg>
