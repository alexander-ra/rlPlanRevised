<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .stroke-primary { 
      stroke: #1e293b; /* Same professional Slate Gray/Blue */
      stroke-width: 2.5; 
      fill: none; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .fill-primary { 
      fill: #1e293b; 
    }
    .bg-rect {
      fill: #ffffff;
    }
  </style>

  <rect x="10" y="10" width="80" height="80" rx="8" ry="8" class="stroke-primary" fill="#ffffff" />
  
  <line x1="30" y1="10" x2="30" y2="90" stroke="#e2e8f0" stroke-width="1" />
  <line x1="50" y1="10" x2="50" y2="90" stroke="#e2e8f0" stroke-width="1" />
  <line x1="70" y1="10" x2="70" y2="90" stroke="#e2e8f0" stroke-width="1" />
  <line x1="10" y1="30" x2="90" y2="30" stroke="#e2e8f0" stroke-width="1" />
  <line x1="10" y1="50" x2="90" y2="50" stroke="#e2e8f0" stroke-width="1" />
  <line x1="10" y1="70" x2="90" y2="70" stroke="#e2e8f0" stroke-width="1" />

  <path d="M 25 75 C 25 60, 45 60, 45 45 L 45 25" class="stroke-primary" style="stroke-dasharray: 6 4;"/>

  <g transform="translate(25, 75)">
    <circle cx="0" cy="0" r="7" class="bg-rect stroke-primary"/>
    <circle cx="0" cy="0" r="3" class="fill-primary"/>
  </g>
  
  <rect x="41" y="41" width="8" height="8" rx="2" ry="2" class="fill-primary"/>

  <g transform="translate(45, 20)">
    <circle cx="0" cy="0" r="7" class="bg-rect stroke-primary"/>
    <line x1="-1.5" y1="-3" x2="-1.5" y2="4" class="stroke-primary" stroke-width="1.5"/>
    <path d="M -1.5 -3 L 3 -1.5 L -1.5 0 Z" class="fill-primary"/>
  </g>
</svg>
