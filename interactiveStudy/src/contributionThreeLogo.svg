<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .stroke-primary { 
      stroke: #1e293b; /* Consistent Slate Gray/Blue */
      stroke-width: 2.5; 
      fill: none; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .fill-primary { 
      fill: #1e293b; 
    }
    .bg-mask {
      fill: #ffffff; /* Acts as a mask for overlapping sections */
    }
  </style>

  <defs>
    <g id="podium-robot-bust">
      <path d="M -9 -7 L 9 -7 L 11 8 C 11 10, 8 12, 0 12 C -8 12, -11 10, -11 8 Z" class="bg-mask stroke-primary"/>
      
      <line x1="0" y1="-7" x2="0" y2="-16" class="stroke-primary" />
      <circle cx="0" cy="-16" r="3" class="fill-primary bg-mask" stroke="#1e293b" stroke-width="2.5"/>
      
      <circle cx="-5" cy="0" r="2" class="fill-primary" />
      <circle cx="5" cy="0" r="2" class="fill-primary" />
      
      <g transform="translate(-6, 5)">
        <rect x="0" y="0" width="2" height="4" rx="1" class="fill-primary"/>
        <rect x="4" y="0" width="2" height="4" rx="1" class="fill-primary"/>
        <rect x="8" y="0" width="2" height="4" rx="1" class="fill-primary"/>
      </g>
    </g>
  </defs>

  <line x1="5" y1="90" x2="95" y2="90" class="stroke-primary" />

  <use href="#podium-robot-bust" x="24" y="56" />
  <rect x="10" y="68" width="28" height="22" class="bg-mask stroke-primary" />
  <circle cx="20" cy="79" r="2" class="fill-primary" />
  <circle cx="28" cy="79" r="2" class="fill-primary" />

  <use href="#podium-robot-bust" x="76" y="68" />
  <rect x="62" y="80" width="28" height="10" class="bg-mask stroke-primary" />
  <circle cx="70" cy="85" r="2" class="fill-primary" />
  <circle cx="76" cy="85" r="2" class="fill-primary" />
  <circle cx="82" cy="85" r="2" class="fill-primary" />

  <use href="#podium-robot-bust" x="50" y="43" />
  <rect x="35" y="55" width="30" height="35" class="bg-mask stroke-primary" />
  <circle cx="50" cy="72.5" r="2.5" class="fill-primary" />

</svg>
